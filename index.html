        )}
      </div>
    </div>
  );
}

// ─── PARENT APP ──────────────────────────────────────────
function ParentApp({ user, profile, onLogout }) {
  const [children, setChildren] = useState([]);
  const [loading, setLoading] = useState(true);
  const [code, setCode] = useState("");
  const [linkMsg, setLinkMsg] = useState("");
  const [selected, setSelected] = useState(null);
  const [childData, setChildData] = useState(null);
  const [unlinkTarget, setUnlinkTarget] = useState(null);
  const [unlinking, setUnlinking] = useState(false);

  const loadChildren = async () => {
    setLoading(true);
    const snap = await db.collection("parentLinks").doc(user.uid).collection("children").get();
    const list = [];
    snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
    setChildren(list);
    setLoading(false);
  };

  useEffect(() => { loadChildren(); }, []);

  const doLink = async () => {
    setLinkMsg("");
    if (code.length !== 6) { setLinkMsg("Код должен содержать 6 цифр"); return; }
    const res = await linkParentToChildByCode(user.uid, code);
    if (res.ok) {
      setLinkMsg(`Привязан: ${res.name}`);
      setCode("");
      loadChildren();
    } else {
      setLinkMsg(res.error);
    }
  };

  // Открытие статистики ребёнка: сразу показываем локальную копию (кэш Firestore),
  // параллельно строго с сервера тянем свежие данные и по приходу обновляем экран.
  // openUidRef защищает от гонки: ответ для уже закрытого/другого ребёнка игнорируется.
  const openUidRef = useRef(null);
  const openChild = async (c) => {
    openUidRef.current = c.uid;
    setSelected(c);
    setChildData(null);
    let cacheShown = false;
    try {
      const cached = await loadUserData(c.uid, { allSessions: true, source: "cache" });
      if (cached && openUidRef.current === c.uid) {
        cacheShown = true;
        setChildData({ ...cached, freshness: { status: "updating", loadedAt: getServerLoadedAt(c.uid) } });
      }
    } catch (e) {} // кэша ещё нет (первый просмотр этого ребёнка) — ждём сервер
    try {
      const fresh = await loadUserData(c.uid, { allSessions: true, source: "server" });
      if (openUidRef.current !== c.uid) return;
      if (fresh) {
        const now = Date.now();
        setServerLoadedAt(c.uid, now);
        setChildData({ ...fresh, freshness: { status: "fresh", loadedAt: now } });
      } else if (!cacheShown) {
        setChildData({ unavailable: true });
      }
    } catch (e) {
      if (openUidRef.current !== c.uid) return;
      if (cacheShown) {
        setChildData(prev => prev && prev.freshness
          ? { ...prev, freshness: { ...prev.freshness, status: "offline" } } : prev);
      } else {
        setChildData({ unavailable: true });
      }
    }
  };
  const closeChild = () => { openUidRef.current = null; setSelected(null); setChildData(null); };

  const doUnlink = async () => {
    if (!unlinkTarget) return;
    setUnlinking(true);
    try {
      await unlinkChild(db, user.uid, unlinkTarget.uid);
      setChildren(prev => prev.filter(x => x.uid !== unlinkTarget.uid));
    } catch (e) {
      console.error("unlink failed", e);
    } finally {
      setUnlinking(false);
      setUnlinkTarget(null);
    }
  };

  if (selected && childData && childData.unavailable) {
    return (
      <div style={{...base, justifyContent:"center"}}>
        <div style={{fontSize:15, color:"#6B7280", textAlign:"center", padding:"0 28px", lineHeight:1.5, marginBottom:18}}>
          Не удалось загрузить данные: нет связи с сервером, а сохранённой копии на этом устройстве ещё нет.
        </div>
        <div style={{display:"flex", gap:10, justifyContent:"center"}}>
          <button onClick={() => openChild(selected)}
            style={{height:44, padding:"0 22px", borderRadius:12, background:PU, color:"#fff", border:"none", fontWeight:700, fontSize:15, cursor:"pointer"}}>
            Повторить
          </button>
          <button onClick={closeChild}
            style={{height:44, padding:"0 22px", borderRadius:12, background:"transparent", color:"#6B7280", border:"1.5px solid #D1D5DB", fontSize:15, cursor:"pointer"}}>
            Назад
          </button>
        </div>
      </div>
    );
  }
  if (selected && childData) {
    return <StatsView name={selected.name} facts={childData.facts} sessions={childData.sessions}
      profile={childData.profile} freshness={childData.freshness} onBack={closeChild} />;
  }
  if (selected && !childData) {
    return <div style={{...base, justifyContent:"center"}}><div style={{fontSize:16, color:"#6B7280"}}>Загрузка…</div></div>;
  }

  return (
    <div style={base}>
      <Header name={profile.name} badge="Родитель" onLogout={onLogout} />

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:14, padding:"14px", marginBottom:16}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:8}}>Привязать ребёнка по коду</div>
        <input value={code} onChange={e => setCode(e.target.value.replace(/\D/g,"").slice(0,6))}
          placeholder="6 цифр" inputMode="numeric"
          style={{width:"100%", boxSizing:"border-box", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:18, outline:"none", background:"#fff", letterSpacing:4, textAlign:"center", marginBottom:10}} />
        <button onClick={doLink}
          style={{width:"100%", height:48, borderRadius:12, background:PU, color:"#fff", border:"none", fontWeight:700, fontSize:16, cursor:"pointer"}}>
          Привязать
        </button>
        {linkMsg && <div style={{fontSize:13, color: linkMsg.startsWith("Привязан") ? GR : RD, marginTop:8, textAlign:"center"}}>{linkMsg}</div>}
      </div>

      <div style={{...W, marginBottom:12, fontSize:14, color:"#6B7280"}}>
        Мои дети {children.length > 0 && `(${children.length})`}
      </div>

      {loading ? (
        <div style={{...W, textAlign:"center", padding:20, color:"#9CA3AF"}}>Загрузка…</div>
      ) : children.length === 0 ? (
        <div style={{...W, textAlign:"center", padding:"30px 16px", color:"#9CA3AF", background:"#fff", borderRadius:14, border:"1.5px solid #E5E7EB"}}>
          Пока нет привязанных детей.<br/>Попроси код у ребёнка.
        </div>
      ) : (
        <div style={{...W, display:"flex", flexDirection:"column", gap:9}}>
          {children.map(c => (
            <div key={c.uid} onClick={() => openChild(c)} role="button"
              style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px 12px 16px", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:14, cursor:"pointer"}}>
              <div style={{flex:1, minWidth:0}}>
                <div style={{fontSize:16, fontWeight:700, color:"#1F2937"}}>{c.name}</div>
                <div style={{fontSize:11, color:"#9CA3AF"}}>привязан {fmtDay(c.linkedAt)}</div>
              </div>
              <button onClick={(e) => { e.stopPropagation(); setUnlinkTarget(c); }} aria-label="Отвязать"
                style={{width:32, height:32, marginRight:6, padding:0, borderRadius:8, background:"transparent", color:"#C2C5CC", fontSize:18, border:"none", cursor:"pointer", lineHeight:1}}>
                ×
              </button>
              <div style={{fontSize:18, color:"#9CA3AF"}}>›</div>
            </div>
          ))}
        </div>
      )}

      {unlinkTarget && (
        <div onClick={() => !unlinking && setUnlinkTarget(null)}
          style={{position:"fixed", inset:0, background:"rgba(17,17,27,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:"max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom))"}}>
          <div onClick={e => e.stopPropagation()}
            style={{background:"#fff", borderRadius:18, padding:"22px 20px", width:"100%", maxWidth:340, boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}}>
            <div style={{fontSize:17, fontWeight:700, color:"#1F2937", marginBottom:10, textAlign:"center"}}>
              Отвязать «{unlinkTarget.name}»?
            </div>
            <div style={{fontSize:13, color:"#6B7280", marginBottom:20, textAlign:"center", lineHeight:1.45}}>
              Его статистика сохранится, но больше не будет видна вам.
            </div>
            <div style={{display:"flex", gap:10}}>
              <button onClick={() => setUnlinkTarget(null)} disabled={unlinking}
                style={{flex:1, height:46, borderRadius:12, border:"1.5px solid #D1D5DB", background:"#fff", color:"#6B7280", fontSize:15, fontWeight:600, cursor: unlinking ? "default" : "pointer"}}>
                Отмена
              </button>
              <button onClick={doUnlink} disabled={unlinking}
                style={{flex:1, height:46, borderRadius:12, border:"none", background: unlinking ? "#9CA3AF" : RD, color:"#fff", fontSize:15, fontWeight:700, cursor: unlinking ? "default" : "pointer"}}>
                {unlinking ? "..." : "Отвязать"}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── ADMIN APP ───────────────────────────────────────────
// Форма смены пароля админа: проверяет текущий через хэш Firestore,
// обновляет пароль в Firebase Auth (для последующих логинов) и записывает новый хэш.
function AdminSettings({ onBack }) {
  const [cur, setCur] = useState("");
  const [n1, setN1] = useState("");
  const [n2, setN2] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [okMsg, setOkMsg] = useState("");

  // Прогон через orchestratePasswordChange гарантирует строгий порядок шагов и то,
  // что Firestore-хэш ОБНОВИТСЯ ТОЛЬКО ПОСЛЕ тестового signIn с новым паролем
  // (через вторичный Firebase-инстанс — основная сессия остаётся живой).
  const submit = async () => {
    setErr(""); setOkMsg("");
    const v = validatePasswordChange(cur, n1, n2, 8);
    if (!v.ok) { setErr(v.error); return; }
    setBusy(true);

    const email = auth.currentUser && auth.currentUser.email;
    const steps = {
      verifyCurrent: async () => {
        const ok = await verifyAdminPassword(cur);
        return ok ? { ok: true } : { ok: false, error: "Текущий пароль неверен" };
      },
      reauthenticate: async () => {
        // Безусловная реаутентификация — это требование Firebase Auth перед
        // sensitive-операциями (updatePassword). Делаем await, проверяем успех.
        const cred = firebase.auth.EmailAuthProvider.credential(email, cur);
        await auth.currentUser.reauthenticateWithCredential(cred);
        return { ok: true };
      },
      updateAuthPassword: async () => {
        await auth.currentUser.updatePassword(n1);
        return { ok: true };
      },
      testSignInSecondary: async () => {
        // Тестовый вход с НОВЫМ паролем через вторичный auth-инстанс. Если updatePassword
        // молча провалился, signIn вернёт invalid-credential — Firestore не тронем.
        const sec = getSecondaryAuth();
        try {
          await sec.signInWithEmailAndPassword(email, n1);
        } catch(e) {
          return { ok: false, error: "Тестовый вход с новым паролем не удался — Firestore не обновлён, попробуй ещё раз" };
        } finally {
          try { await sec.signOut(); } catch(e) {}
        }
        return { ok: true };
      },
      writeNewHash: async () => {
        const newHash = await sha256Hex(n1);
        await setStoredAdminPasswordHash(newHash);
        return { ok: true };
      },
    };

    try {
      const result = await orchestratePasswordChange(steps);
      if (!result.ok) {
        // На каждом шаге кроме writeNewHash ошибка означает: Firestore-хэш не тронут.
        // Это безопасно — Auth и Firestore либо в синке, либо вернутся при следующей попытке.
        console.error("password change failed at step", result.step, result.error);
        const msg = result.error
          || (result.step === "reauthenticate" ? "Повторная аутентификация не удалась"
          : result.step === "updateAuthPassword" ? "Не удалось обновить пароль в Firebase Auth"
          : "Ошибка");
        setErr(msg);
        return;
      }
      setOkMsg("Пароль изменён");
      setCur(""); setN1(""); setN2("");
    } catch(e) {
      console.error("change password crash", e);
      setErr("Не удалось сменить пароль");
    } finally {
      setBusy(false);
    }
  };

  const inputStyle = {width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff", boxSizing:"border-box"};

  return (
    <div style={base}>
      <div style={{...W, display:"flex", alignItems:"center", marginBottom:18}}>
        <button onClick={onBack} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>← Назад</button>
        <div style={{flex:1, textAlign:"center", fontSize:16, fontWeight:700, color:"#1F2937"}}>Настройки</div>
        <div style={{width:80}} />
      </div>

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"16px"}}>
        <div style={{fontSize:14, fontWeight:700, color:"#374151", marginBottom:12}}>Смена пароля админа</div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, color:"#6B7280", marginBottom:5}}>Текущий пароль</div>
          <input type="password" value={cur} onChange={e=>setCur(e.target.value)} style={inputStyle} />
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:12, color:"#6B7280", marginBottom:5}}>Новый пароль (минимум 8 символов)</div>
          <input type="password" value={n1} onChange={e=>setN1(e.target.value)} style={inputStyle} />
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:12, color:"#6B7280", marginBottom:5}}>Подтвердите новый пароль</div>
          <input type="password" value={n2} onChange={e=>setN2(e.target.value)} style={inputStyle} />
        </div>
        {err && <div style={{fontSize:13, color:RD, marginBottom:10}}>{err}</div>}
        {okMsg && <div style={{fontSize:13, color:GR, marginBottom:10}}>{okMsg}</div>}
        <button onClick={submit} disabled={busy}
          style={{width:"100%", height:44, borderRadius:12, background:PU, color:"#fff", fontSize:15, fontWeight:600, border:"none", cursor: busy?"default":"pointer", opacity: busy?0.6:1}}>
          {busy ? "Сохраняем…" : "Изменить пароль"}
        </button>
      </div>
    </div>
  );
}

function AdminApp({ user, profile, onLogout }) {
  const [users, setUsers] = useState([]);
  const [allSessions, setAllSessions] = useState([]);
  const [allFacts, setAllFacts] = useState({});
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [selectedData, setSelectedData] = useState(null);
  const [showSettings, setShowSettings] = useState(false);

  // Регистрационный график: период
  const [regPeriod, setRegPeriod] = useState("week"); // week|month|quarter|custom
  const [customFrom, setCustomFrom] = useState("");
  const [customTo, setCustomTo] = useState("");

  // Список игроков: поиск/фильтры/сортировка/пагинация
  const [search, setSearch] = useState("");
  const [roleFilter, setRoleFilter] = useState("all"); // all|child|parent
  const [regFilter, setRegFilter] = useState("all");   // all|day|week|month
  const [sortKey, setSortKey] = useState("lastLogin");
  const [sortDir, setSortDir] = useState("desc");
  const [page, setPage] = useState(1);
  const PAGE_SIZE = 50;

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
      const snap = await db.collection("users").get();
      // Данные по каждому игроку берём ПАРАЛЛЕЛЬНО (Promise.all) — админка на 25 игроках
      // открывается кратно быстрее последовательного `for await`.
      // Раньше стоял .limit(30) и sessionsCount = length — счётчик не мог превысить 30
      // у активных игроков. Плюс он же занижал «Сессий/Вопросов/Точность» и мог обрезать
      // пики 14-дневного графика активности. .count() в compat SDK 10.7.1 не реализован
      // (AggregateQuery только в модульном v9+), поэтому идём проще: один get() без лимита
      // даёт и точный snap.size, и отсортированные docs — из которых извлекаем lastActive
      // и 30-дневный срез для агрегатов уже в памяти.
      const cutoff30d = Date.now() - 30 * 86400000;
      const perUser = await Promise.all(snap.docs.map(async d => {
        const data = d.data();
        const userRef = db.collection("users").doc(d.id);
        // Ошибку по каждому подзапросу гасим — один сбой не валит всю админку.
        const safe = p => p.catch(() => null);
        const [sessSnap, factsSnap] = await Promise.all([
          safe(userRef.collection("sessions").orderBy("date", "desc").get()),
          safe(userRef.collection("facts").get()),
        ]);
        const sessionsCount = sessSnap ? sessSnap.size : 0;
        let lastDate = data.createdAt || 0;
        const recent = [];
        if (sessSnap && !sessSnap.empty) {
          lastDate = sessSnap.docs[0].data().date || lastDate;
          sessSnap.forEach(s => {
            const sd = s.data();
            if ((sd.date || 0) >= cutoff30d) {
              recent.push({ ...sd, _uid: d.id, _name: data.name });
            }
          });
        }
        const factsList = [];
        if (factsSnap) factsSnap.forEach(f => factsList.push({ id: f.id, data: f.data() }));
        return {
          user: { uid: d.id, ...data, lastActive: lastDate, sessionsCount },
          recent, factsList,
        };
      }));

      const list = perUser.map(x => x.user);
      const sessAll = perUser.flatMap(x => x.recent);
      const factsAggr = {};
      for (const x of perUser) {
        for (const { id, data: fd } of x.factsList) {
          const cur = factsAggr[id] || { c: 0, w: 0 };
          factsAggr[id] = { c: cur.c + (fd.c || 0), w: cur.w + (fd.w || 0) };
        }
      }
      setUsers(list);
      setAllSessions(sessAll);
      setAllFacts(factsAggr);
      } catch (e) {
        console.error("AdminApp load failed:", e);
      } finally {
        // ГАРАНТИЯ снятия «Загрузки…» даже при неожиданной ошибке —
        // страховка от бесконечного белого экрана.
        setLoading(false);
      }
    })();
  }, []);

  const openUser = async (u) => {
    setSelected(u);
    setSelectedData(null);
    const data = await loadUserData(u.uid, { allSessions: true });
    setSelectedData(data);
  };

  if (showSettings) return <AdminSettings onBack={() => setShowSettings(false)} />;

  if (selected && selectedData) {
    return <StatsView name={selected.name + " · " + (selected.role || "?")} facts={selectedData.facts} sessions={selectedData.sessions}
      profile={selectedData.profile} onBack={() => { setSelected(null); setSelectedData(null); }} />;
  }
  if (selected && !selectedData) {
    return <div style={{...base, justifyContent:"center"}}><div style={{fontSize:16, color:"#6B7280"}}>Загрузка…</div></div>;
  }

  // Точное «всего сессий» — сумма sessionsCount по всем игрокам (не length allSessions:
  // allSessions теперь содержит ТОЛЬКО последние 30 дней, для агрегатов активности).
  const totalSessions = users.reduce((s, u) => s + (u.sessionsCount || 0), 0);
  // «Вопросов» и «Точность» — за последние 30 дней (подписано отдельно на карточках).
  const totalQ = allSessions.reduce((s,x) => s+(x.total||0), 0);
  const totalC = allSessions.reduce((s,x) => s+(x.correct||0), 0);
  const acc = totalQ ? Math.round(totalC/totalQ*100) : 0;
  const now = Date.now();

  const roleCounts = countByRole(users);
  const active7d = countActiveSince(users, 7*86400000, now);
  const active30d = countActiveSince(users, 30*86400000, now);

  // Регистрации
  const reg1d = countRegistrationsSince(users, 86400000, now);
  const reg7d = countRegistrationsSince(users, 7*86400000, now);
  const reg30d = countRegistrationsSince(users, 30*86400000, now);
  const regChildren30 = countRegistrationsSince(users, 30*86400000, now, "child");
  const regParents30 = countRegistrationsSince(users, 30*86400000, now, "parent");

  // График регистраций по периоду
  let regChartStart, regChartEnd = now;
  if (regPeriod === "custom" && customFrom && customTo) {
    regChartStart = new Date(customFrom).getTime();
    regChartEnd = new Date(customTo + "T23:59:59").getTime();
  } else {
    const periodDays = regPeriod === "month" ? 30 : regPeriod === "quarter" ? 90 : 7;
    regChartStart = now - periodDays * 86400000;
  }
  const regBuckets = groupRegistrationsByDay(users, regChartStart, regChartEnd);
  const regKeys = Object.keys(regBuckets).sort();
  const regMax = Math.max(1, ...Object.values(regBuckets));

  // Активность по дням (последние 14 дней)
  const days = {};
  for (let i = 13; i >= 0; i--) {
    const d = new Date(now - i*86400000);
    const key = d.toISOString().slice(0,10);
    days[key] = 0;
  }
  allSessions.forEach(s => {
    const key = new Date(s.date).toISOString().slice(0,10);
    if (key in days) days[key] += (s.total || 0);
  });
  const dayKeys = Object.keys(days);
  const maxDay = Math.max(1, ...Object.values(days));

  // Глобально сложные таблицы
  const hardest = Object.entries(allFacts)
    .filter(([, f]) => f.c + f.w >= 5)
    .sort((a,b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w))
    .slice(0, 6);

  // Применение фильтров/поиска/сортировки/пагинации к списку игроков
  const regPeriodMs = regFilter === "all" ? null : ADMIN_PERIOD_MS[regFilter];
  const filtered = filterUsers(users, { search, role: roleFilter, registeredSinceMs: regPeriodMs, now });
  const sorted = sortUsers(filtered, sortKey, sortDir);
  const pageData = paginate(sorted, page, PAGE_SIZE);

  const toggleSort = (k) => {
    if (sortKey === k) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortKey(k); setSortDir(k === "name" || k === "role" ? "asc" : "desc"); }
    setPage(1);
  };
  const arrow = (k) => sortKey === k ? (sortDir === "asc" ? " ↑" : " ↓") : "";

  const card = (label, value) => (
    <div key={label} style={{background:"#fff", borderRadius:12, padding:"12px 4px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
      <div style={{fontSize:10, color:"#6B7280", marginBottom:4}}>{label}</div>
      <div style={{fontSize:18, fontWeight:800, color:"#1F2937"}}>{value}</div>
    </div>
  );

  const periodBtn = (id, label) => (
    <button key={id} onClick={() => setRegPeriod(id)}
      style={{flex:1, padding:"7px 6px", borderRadius:8, border:"1.5px solid "+(regPeriod===id?PU:"#D1D5DB"),
              background: regPeriod===id?PU:"#fff", color: regPeriod===id?"#fff":"#6B7280",
              fontSize:12, fontWeight:600, cursor:"pointer"}}>{label}</button>
  );

  return (
    <div style={base}>
      <Header name={profile.name} badge="Администратор" onLogout={onLogout} onSettings={() => setShowSettings(true)} />

      {loading ? (
        <div style={{...W, textAlign:"center", padding:24, color:"#9CA3AF"}}>Загрузка…</div>
      ) : (
        <>
          {/* Блок Аккаунты */}
          <div style={{...W, marginBottom:6, fontSize:12, color:"#6B7280", textTransform:"uppercase", letterSpacing:0.5}}>Аккаунты</div>
          <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:7, marginBottom:14}}>
            {card("Дети", roleCounts.child)}
            {card("Родители", roleCounts.parent)}
            {card("Активны 7д", active7d)}
            {card("Активны 30д", active30d)}
          </div>

          {/* Общая активность. Сессий — за всё время (точный count).
              Вопросов/Точность — за 30 дней (подписано на карточках), чтобы не таскать
              полную историю каждого игрока при открытии админки. */}
          <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:7, marginBottom:18}}>
            {card("Всего", users.length)}
            {card("Сессий", totalSessions)}
            {card("Вопросов 30д", totalQ)}
            {card("Точность 30д", `${acc}%`)}
          </div>

          {/* Блок Новые регистрации */}
          <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"14px", marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:"#374151"}}>Новые регистрации</div>
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:7, marginBottom:12}}>
              <div style={{textAlign:"center", padding:"8px 4px", background:"#F5F3FF", borderRadius:9}}>
                <div style={{fontSize:10, color:"#6B7280"}}>За сутки</div>
                <div style={{fontSize:18, fontWeight:800, color:"#1F2937"}}>{reg1d}</div>
              </div>
              <div style={{textAlign:"center", padding:"8px 4px", background:"#F5F3FF", borderRadius:9}}>
                <div style={{fontSize:10, color:"#6B7280"}}>За 7 дней</div>
                <div style={{fontSize:18, fontWeight:800, color:"#1F2937"}}>{reg7d}</div>
              </div>
              <div style={{textAlign:"center", padding:"8px 4px", background:"#F5F3FF", borderRadius:9}}>
                <div style={{fontSize:10, color:"#6B7280"}}>За 30 дней</div>
                <div style={{fontSize:18, fontWeight:800, color:"#1F2937"}}>{reg30d}</div>
              </div>
            </div>
            <div style={{display:"flex", gap:10, fontSize:11, color:"#6B7280", marginBottom:10}}>
              <span>детских за 30д: <b style={{color:"#1F2937"}}>{regChildren30}</b></span>
              <span>родительских за 30д: <b style={{color:"#1F2937"}}>{regParents30}</b></span>
            </div>

            <div style={{display:"flex", gap:5, marginBottom:10}}>
              {periodBtn("week","7 дней")}
              {periodBtn("month","30 дней")}
              {periodBtn("quarter","90 дней")}
              {periodBtn("custom","Свой")}
            </div>
            {regPeriod === "custom" && (
              <div style={{display:"flex", gap:6, marginBottom:10}}>
                <input type="date" value={customFrom} onChange={e=>setCustomFrom(e.target.value)}
                  style={{flex:1, padding:"7px 9px", border:"1.5px solid #D1D5DB", borderRadius:8, fontSize:13}} />
                <input type="date" value={customTo} onChange={e=>setCustomTo(e.target.value)}
                  style={{flex:1, padding:"7px 9px", border:"1.5px solid #D1D5DB", borderRadius:8, fontSize:13}} />
              </div>
            )}

            <div style={{display:"flex", alignItems:"flex-end", gap:2, height:80}}>
              {regKeys.map(k => {
                const v = regBuckets[k];
                const h = Math.max(2, Math.round(v/regMax*70));
                return (
                  <div key={k} style={{flex:1, width:"100%", height:h, background: v ? GR : "#E5E7EB", borderRadius:3, transition:"height 0.3s"}} title={`${k}: ${v} регистраций`} />
                );
              })}
            </div>
            {regKeys.length > 0 && (
              <div style={{display:"flex", justifyContent:"space-between", fontSize:9, color:"#9CA3AF", marginTop:4}}>
                <span>{fmtDay(regChartStart)}</span>
                <span>{fmtDay(regChartEnd)}</span>
              </div>
            )}
          </div>

          {/* Активность по дням */}
          <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"14px", marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:"#374151"}}>Активность за 14 дней</div>
            <div style={{display:"flex", alignItems:"flex-end", gap:3, height:80}}>
              {dayKeys.map(k => {
                const v = days[k];
                const h = Math.max(2, Math.round(v/maxDay*70));
                return (
                  <div key={k} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
                    <div style={{width:"100%", height:h, background: v ? PU : "#E5E7EB", borderRadius:3, transition:"height 0.3s"}} title={`${k}: ${v} ответов`} />
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex", justifyContent:"space-between", fontSize:9, color:"#9CA3AF", marginTop:4}}>
              <span>{fmtDay(now - 13*86400000)}</span>
              <span>сегодня</span>
            </div>
          </div>

          {hardest.length > 0 && (
            <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"14px", marginBottom:16}}>
              <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:"#374151"}}>Самые сложные примеры (глобально)</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {hardest.map(([k, f]) => {
                  const [a,b] = k.split("x");
                  const p = Math.round(f.c/(f.c+f.w)*100);
                  return (
                    <span key={k} style={{padding:"6px 11px", background:"#FEF2F2", color:"#991B1B", borderRadius:9, fontSize:14, fontWeight:600}}>
                      {a}×{b}={Number(a)*Number(b)} · {p}%
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          {/* Список игроков с поиском/фильтрами/сортировкой */}
          <div style={{...W, marginBottom:10, fontSize:13, color:"#6B7280"}}>
            Все игроки ({pageData.total}{pageData.total !== users.length ? ` из ${users.length}` : ""})
          </div>

          <div style={{...W, display:"flex", flexDirection:"column", gap:6, marginBottom:10}}>
            <input value={search} onChange={e=>{setSearch(e.target.value); setPage(1);}} placeholder="🔍 Поиск по имени"
              style={{padding:"9px 12px", border:"1.5px solid #D1D5DB", borderRadius:9, fontSize:14, outline:"none"}} />
            <div style={{display:"flex", gap:6}}>
              <select value={roleFilter} onChange={e=>{setRoleFilter(e.target.value); setPage(1);}}
                style={{flex:1, padding:"7px 8px", border:"1.5px solid #D1D5DB", borderRadius:8, fontSize:13, background:"#fff"}}>
                <option value="all">Все роли</option>
                <option value="child">Только дети</option>
                <option value="parent">Только родители</option>
                <option value="admin">Только админы</option>
              </select>
              <select value={regFilter} onChange={e=>{setRegFilter(e.target.value); setPage(1);}}
                style={{flex:1, padding:"7px 8px", border:"1.5px solid #D1D5DB", borderRadius:8, fontSize:13, background:"#fff"}}>
                <option value="all">За всё время</option>
                <option value="day">Регистрация за сутки</option>
                <option value="week">за неделю</option>
                <option value="month">за месяц</option>
              </select>
            </div>
            <div style={{display:"flex", gap:5, fontSize:11, flexWrap:"wrap"}}>
              {[
                ["name","Имя"], ["role","Роль"], ["createdAt","Регистрация"],
                ["lastLogin","Последний вход"], ["sessionsCount","Сессий"], ["lastActive","Активность"]
              ].map(([k,l]) => (
                <button key={k} onClick={()=>toggleSort(k)}
                  style={{padding:"4px 8px", borderRadius:7, border:"1px solid "+(sortKey===k?PU:"#D1D5DB"),
                          background: sortKey===k ? "#EEEDFE":"#fff", color: sortKey===k ? PU:"#6B7280",
                          fontSize:11, cursor:"pointer"}}>
                  {l}{arrow(k)}
                </button>
              ))}
            </div>
          </div>

          <div style={{...W, display:"flex", flexDirection:"column", gap:7}}>
            {pageData.items.map(u => (
              <button key={u.uid} onClick={() => openUser(u)}
                style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:12, cursor:"pointer", textAlign:"left"}}>
                <div style={{flex:1, minWidth:0}}>
                  <div style={{fontSize:15, fontWeight:700, color:"#1F2937"}}>
                    {u.name} <span style={{fontSize:11, color:"#9CA3AF", fontWeight:400}}>· {u.role}</span>
                  </div>
                  <div style={{fontSize:11, color:"#9CA3AF"}}>
                    {u.createdAt ? `рег. ${fmtDay(u.createdAt)}` : "рег. ?"}
                    {" · "}
                    {u.lastLogin ? `вход ${fmtD(u.lastLogin)}` : "вход не зафиксирован"}
                  </div>
                  <div style={{fontSize:11, color:"#9CA3AF"}}>
                    {u.sessionsCount ? `${u.sessionsCount} сессий` : "нет сессий"}
                    {u.lastActive ? ` · акт. ${fmtD(u.lastActive)}` : ""}
                  </div>
                </div>
                <div style={{fontSize:18, color:"#9CA3AF"}}>›</div>
              </button>
            ))}
            {pageData.items.length === 0 && (
              <div style={{padding:"22px 10px", textAlign:"center", color:"#9CA3AF", fontSize:13}}>
                Ничего не найдено
              </div>
            )}
          </div>

          {pageData.totalPages > 1 && (
            <div style={{...W, display:"flex", justifyContent:"center", alignItems:"center", gap:8, marginTop:12}}>
              <button onClick={()=>setPage(Math.max(1, pageData.page - 1))} disabled={pageData.page === 1}
                style={{padding:"6px 12px", borderRadius:8, border:"1.5px solid #D1D5DB", background:"#fff", cursor: pageData.page===1?"default":"pointer", opacity: pageData.page===1?0.4:1, fontSize:13}}>← Назад</button>
              <span style={{fontSize:13, color:"#6B7280"}}>Стр. {pageData.page} из {pageData.totalPages}</span>
              <button onClick={()=>setPage(Math.min(pageData.totalPages, pageData.page + 1))} disabled={pageData.page === pageData.totalPages}
                style={{padding:"6px 12px", borderRadius:8, border:"1.5px solid #D1D5DB", background:"#fff", cursor: pageData.page===pageData.totalPages?"default":"pointer", opacity: pageData.page===pageData.totalPages?0.4:1, fontSize:13}}>Вперёд →</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
if ('serviceWorker' in navigator) {
  // Когда новый SW активируется и берёт под контроль страницу — перезагружаем,
  // чтобы пользователь сразу получил свежий index.html, а не залипший в кэше.
  var _swReloadGuard = false;
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    if (_swReloadGuard) return;
    _swReloadGuard = true;
    window.location.reload();
  });
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) {
        console.log('SW registered:', reg.scope);
      })
      .catch(function(e) {
        console.log('SW registration failed:', e);
      });
    // На каждой загрузке просим SW докачать недостающую озвучку (инкрементально).
    navigator.serviceWorker.ready.then(function(reg) {
      if (reg.active) reg.active.postMessage('warm-audio');
    }).catch(function() {});
  });
}
</script>
</body>
</html>
