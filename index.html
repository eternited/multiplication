<script>
// Снимаем сплэш, как только React вставил первого потомка в #root. Плюс страховка
// по таймауту 3с — если React по любой причине не поднялся, пользователь не залипнет
// на сплэше навсегда (увидит пустой экран/системную ошибку и сможет перезагрузить).
(function () {
  var splash = document.getElementById('splash');
  var root = document.getElementById('root');
  if (!splash || !root) return;
  var removed = false;
  function hide() {
    if (removed) return;
    removed = true;
    splash.classList.add('splash-hidden');
    setTimeout(function () { if (splash && splash.parentNode) splash.parentNode.removeChild(splash); }, 400);
  }
  if (root.children.length > 0) { hide(); return; }
  if ('MutationObserver' in window) {
    var mo = new MutationObserver(function () {
      if (root.children.length > 0) { mo.disconnect(); hide(); }
    });
    mo.observe(root, { childList: true });
  }
  setTimeout(hide, 3000);
})();
</script>

// ─── AUDIO ────────────────────────────────────────────────
// AudioContext создаётся ЛЕНИВО при первом жесте пользователя.
// На iOS Safari контекст рождается "suspended" и требует resume()
// внутри пользовательского жеста, плюс играем неслышный буфер для разблокировки.
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
let _unlocked = false;

function ensureCtx() {
  if (_ctx || !AudioCtx) return _ctx;
  try {
    _ctx = new AudioCtx();
    setupContextStateWatch();
  } catch(e) { _ctx = null; }
  return _ctx;
}

// Авто-resume: если контекст ушёл в suspended (например после выхода из беззвучного режима
// на iOS/Android или смены аудио-маршрута), сразу пробуем разбудить.
function setupContextStateWatch() {
  if (!_ctx) return;
  try {
    _ctx.onstatechange = function() {
      if (_ctx && _ctx.state === "suspended") {
        try { _ctx.resume().catch(function(){}); } catch(e) {}
      }
    };
  } catch(e) {}
}

function tryResume() {
  if (!_ctx) return;
  // resume() вызываем ТОЛЬКО когда контекст реально приостановлен — не плодим вызовы
  if (_ctx.state === "suspended") {
    try { _ctx.resume().catch(()=>{}); } catch(e) {}
  }
}

function unlockAudio() {
  if (_unlocked) return;
  const ctx = ensureCtx();
  if (!ctx) return;
  tryResume();
  // прогрев — неслышный буфер для iOS Safari
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
  _unlocked = true;

    return;

    }
    duration = duration || 0.015;

    const osc = _ctx.createOscillator();
    const gain = _ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = 35;

    gain.gain.setValueAtTime(0, _ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.8, _ctx.currentTime + 0.001);
    gain.gain.linearRampToValueAtTime(0, _ctx.currentTime + duration);

    osc.connect(gain);
    gain.connect(_ctx.destination);

    osc.start(_ctx.currentTime);
    osc.stop(_ctx.currentTime + duration + 0.01);
  } catch(e) {}
}

const playSound = (type) => {
  try {
    // Тактильная отдача — работает даже в беззвучном режиме.
    // Android Chrome/Firefox: navigator.vibrate. iOS Safari: низкочастотный
    // импульс через Taptic Engine (см. hapticPulse). Вызываем оба параллельно —
    // на каждой платформе сработает только подходящий канал.
    if (navigator.vibrate) {
      const pattern = type === "wrong"   ? [30, 50, 30]
                    : type === "eq"      ? 25
                    : type === "levelup" ? [40, 80, 40]
                    : type === "fanfare" ? [50, 60, 50, 60, 90] // ритм под «Ta-da-DA»
                    : 12; // num, del — короткий тап по клавише
      navigator.vibrate(pattern);
    }
    const hapticDur = type === "wrong"   ? 0.04
                    : type === "eq"      ? 0.025
                    : type === "levelup" ? 0.05
                    : type === "fanfare" ? 0.06
                    : 0.012; // num, del
    hapticPulse(hapticDur);
    const ctx = ensureCtx();
    if (!ctx) return;
    tryResume(); // дешёво, если уже running
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.connect(g);

    if (type === "num") {
      o.type = "sine";
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.07);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.09);
    } else if (type === "del") {
      o.type = "sine";
      o.frequency.setValueAtTime(320, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.12);
    } else if (type === "eq") {
      [0, 0.1].forEach((delay, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "triangle";
        o2.frequency.setValueAtTime(i === 0 ? 440 : 550, ctx.currentTime + delay);
        g2.gain.setValueAtTime(0.20, ctx.currentTime + delay);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        o2.start(ctx.currentTime + delay);
        o2.stop(ctx.currentTime + delay + 0.15);
      });
      return;
    } else if (type === "wrong") {
      o.type = "sawtooth";
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.35);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.38);
      return;
    } else if (type === "levelup") {
      // Восходящий арпеджио C-E-G-C — радостный аккорд достижения
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "triangle";
        const t = ctx.currentTime + i * 0.09;
        o2.frequency.setValueAtTime(freq, t);
        g2.gain.setValueAtTime(0.22, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o2.start(t);
        o2.stop(t + 0.35);
      });
      return;
    } else if (type === "fanfare") {
      // Торжественные фанфары для повышения звания: два восходящих призыва
      // трубного тембра (square с чуть детюненной parallel-нотой) + финальный
      // мажорный аккорд C-E-G-C с длинным хвостом. Играется автоматически при
      // появлении экрана результатов, если ребёнок повысил звание.
      const t0 = ctx.currentTime;
      const callNotes = [
        // «Ta-da-DA» дважды, вверх
        [523.25, t0 + 0.00, 0.13, 0.20],   // C5
        [659.25, t0 + 0.13, 0.13, 0.22],   // E5
        [783.99, t0 + 0.26, 0.20, 0.26],   // G5 — долгая
        [659.25, t0 + 0.55, 0.11, 0.20],   // E5
        [783.99, t0 + 0.66, 0.11, 0.22],   // G5
        [1046.5, t0 + 0.77, 0.30, 0.30],   // C6 — кульминация
      ];
      callNotes.forEach(([freq, at, dur, peak]) => {
        // основной трубный тон
        const oM = ctx.createOscillator();
        const gM = ctx.createGain();
        oM.connect(gM); gM.connect(ctx.destination);
        oM.type = "square";
        oM.frequency.setValueAtTime(freq, at);
        gM.gain.setValueAtTime(0.001, at);
        gM.gain.exponentialRampToValueAtTime(peak, at + 0.02);
        gM.gain.exponentialRampToValueAtTime(0.001, at + dur);
        oM.start(at);
        oM.stop(at + dur + 0.02);
        // октавой ниже (triangle) — придаёт «духовому» тембру плотность
        const oD = ctx.createOscillator();
        const gD = ctx.createGain();
        oD.connect(gD); gD.connect(ctx.destination);
        oD.type = "triangle";
        oD.frequency.setValueAtTime(freq / 2, at);
        gD.gain.setValueAtTime(0.001, at);
        gD.gain.exponentialRampToValueAtTime(peak * 0.55, at + 0.02);
        gD.gain.exponentialRampToValueAtTime(0.001, at + dur);
        oD.start(at);
        oD.stop(at + dur + 0.02);
      });
      // Финальный мажорный аккорд с медленным затуханием (после кульминации)
      const chordAt = t0 + 1.10;
      [261.63, 329.63, 392.00, 523.25].forEach(freq => {
        const oC = ctx.createOscillator();
        const gC = ctx.createGain();
        oC.connect(gC); gC.connect(ctx.destination);
        oC.type = "triangle";
        oC.frequency.setValueAtTime(freq, chordAt);
        gC.gain.setValueAtTime(0.001, chordAt);
        gC.gain.exponentialRampToValueAtTime(0.16, chordAt + 0.04);
        gC.gain.exponentialRampToValueAtTime(0.001, chordAt + 0.90);
        oC.start(chordAt);
        oC.stop(chordAt + 0.92);
      });
      return;
    }
  } catch(e) {}
};

window.playSound = playSound;
</script>

<script id="game-logic">
// ─── ЧИСТАЯ ИГРОВАЯ ЛОГИКА (тестируется в Node, см. автотесты) ───
(function(global){
  const NUMS = [2,3,4,5,6,7,8,9,10];
  const SES_OPTS = [5, 10, 15, 20];

  // ── Звания (прогрессирующие пороги) ──
  const RANKS = [
    {min: 0,      emoji: "🌱", name: "Новичок"},
    {min: 500,    emoji: "🛸", name: "Пилот"},
    {min: 1500,   emoji: "⭐", name: "Штурман"},
    {min: 4000,   emoji: "🚀", name: "Капитан"},
    {min: 9000,   emoji: "🌟", name: "Командир"},
    {min: 20000,  emoji: "🪐", name: "Адмирал галактики"},
    {min: 40000,  emoji: "☄️", name: "Легенда галактики"},
  ];

  function rankIndex(xp){
    xp = xp || 0;
    let idx = 0;
    for (let i = 0; i < RANKS.length; i++) if (xp >= RANKS[i].min) idx = i;
    return idx;
  }
  function getRank(xp){
    xp = xp || 0;
    const index = rankIndex(xp);
    const cur = RANKS[index];
    const next = RANKS[index + 1] || null;
    const into = xp - cur.min;
    const span = next ? next.min - cur.min : 1;
    const pct = next ? Math.min(100, Math.round(into / span * 100)) : 100;
    return { cur, next, into, span, pct, index };
  }
  // Повышение звания: индекс вырос
  function isLevelUp(oldXP, newXP){ return rankIndex(newXP) > rankIndex(oldXP); }

  // ── XP / комбо ──
  function comboMultiplier(comboAfter){ return comboAfter >= 10 ? 3 : comboAfter >= 5 ? 2 : 1; }
  function nextCombo(prevCombo, correct){ return correct ? (prevCombo || 0) + 1 : 0; }
  // Очки за один ответ: correct — верно ли, fast — быстрее 3с, comboAfter — комбо ПОСЛЕ этого ответа
  function computeAnswerXP(correct, fast, comboAfter){
    if (!correct) return 0;
    const base = fast ? 15 : 10;
    return base * comboMultiplier(comboAfter);
  }
  // Бонус за полную сессию из 20 вопросов
  function sessionBonus(total){ return total === 20 ? 50 : 0; }

  // ── Цепочки бейджей ──
  const CHAINS = {
    combo:        [10, 20, 30, 50, 100],
    daystreak:    [3, 5, 10, 20, 30, 50, 100],
    totalcorrect: [100, 250, 500, 1000, 2500, 5000],
    totalxp:      [1000, 5000, 10000, 25000, 50000, 100000],
    perfect:      [1, 5, 10, 25, 50],
    dailycorrect: [20, 50, 100, 200],
    tables:       [1, 3, 6, 9],
  };
  const CHAIN_ORDER = ["combo","daystreak","totalcorrect","totalxp","perfect","dailycorrect","tables"];
  const CHAIN_TITLES = {
    combo: "Серии без ошибок",
    daystreak: "Дни подряд",
    totalcorrect: "Верные ответы",
    totalxp: "Опыт",
    perfect: "Идеальные сессии",
    dailycorrect: "Рекорд за день",
    tables: "Освоение таблиц",
  };
  // Эмодзи и названия для каждого порога цепочки
  const BADGE_META = {
    combo:        {emojis:["🔥","⚡","💥","🌟","☄️"],       label: n => `Серия ${n}`,    desc: n => `${n} правильных подряд`},
    daystreak:    {emojis:["📅","🗓️","🔆","🌈","🏅","👑","💎"], label: n => `${n} дней подряд`, desc: n => `Заходил ${n} дней подряд`},
    totalcorrect: {emojis:["💯","🎯","🏆","🥇","🌠","🪐"],  label: n => `${n} верных`,   desc: n => `${n} правильных ответов всего`},
    totalxp:      {emojis:["⭐","🌟","✨","🚀","🛸","🌌"],   label: n => `${n} очков`,    desc: n => `${n} XP за всё время`},
    perfect:      {emojis:["🎖️","🏵️","🏆","👑","💎"],       label: n => n === 1 ? "Идеальная сессия" : `${n} идеальных`, desc: n => n === 1 ? "Сессия 20 из 20" : `${n} сессий по 20 из 20`},
    dailycorrect: {emojis:["☀️","🌞","🔥","🚀"],            label: n => `${n} за день`,  desc: n => `${n} верных за один день`},
    tables:       {emojis:["🎯","📚","🧠","🎓"],            label: n => n === 1 ? "Первая таблица" : n === 9 ? "Все таблицы" : `${n} таблицы`, desc: n => `Освоено таблиц на 90%+: ${n}`},
  };

  // Полный список бейджей
  const BADGES = [];
  for (const chain of CHAIN_ORDER){
    CHAINS[chain].forEach((threshold, i) => {
      const meta = BADGE_META[chain];
      BADGES.push({
        id: `${chain}_${threshold}`,
        chain, threshold,
        emoji: meta.emojis[i] || meta.emojis[meta.emojis.length - 1],
        name: meta.label(threshold),
        desc: meta.desc(threshold),
      });
    });
  }
  const BADGE_BY_ID = Object.fromEntries(BADGES.map(b => [b.id, b]));

  // Соответствие stat → значение из stats
  const CHAIN_STAT = {
    combo: "maxCombo",
    daystreak: "streakDays",
    totalcorrect: "totalCorrect",
    totalxp: "totalXP",
    perfect: "perfectSessions",
    dailycorrect: "dailyCorrect",
    tables: "tablesMastered",
  };

  // Какие бейджи должны быть открыты при данной статистике
  function computeUnlockedBadges(stats){
    const out = [];
    for (const chain of CHAIN_ORDER){
      const val = stats[CHAIN_STAT[chain]] || 0;
      for (const threshold of CHAINS[chain]){
        if (val >= threshold) out.push(`${chain}_${threshold}`);
      }
    }
    return out;
  }

  // Миграция старых достижений в систему цепочек
  const LEGACY_MAP = {
    combo10: "combo_10",
    correct100: "totalcorrect_100",
    master_table: "tables_1",
    streak3: "daystreak_3",
    perfect_session: "perfect_1",
  };
  function migrateLegacy(achievements){
    const out = new Set();
    for (const id of (achievements || [])){
      if (LEGACY_MAP[id]) out.add(LEGACY_MAP[id]);
      else if (BADGE_BY_ID[id]) out.add(id);
      // first_session и прочие неизвестные id отбрасываются (нет цепочки)
    }
    return [...out];
  }

  // Объединить владение без дубликатов; вернуть {all, added}
  function mergeOwned(existingMigrated, unlocked){
    const have = new Set(existingMigrated);
    const added = [];
    for (const id of unlocked){ if (!have.has(id)){ have.add(id); added.push(id); } }
    return { all: [...have], added };
  }

  // Только полученные бейджи, сгруппированные по цепочкам, в порядке цепочек.
  // Используется в детальной статистике, которую видят родитель и админ — без силуэтов.
  function ownedBadgesByChain(achievements){
    const owned = new Set(migrateLegacy(achievements));
    const result = [];
    for (const chain of CHAIN_ORDER){
      const inChain = CHAINS[chain]
        .map(t => BADGE_BY_ID[`${chain}_${t}`])
        .filter(b => owned.has(b.id));
      if (inChain.length) result.push({ chain, title: CHAIN_TITLES[chain], badges: inChain });
    }
    return result;
  }

  // Отвязать ребёнка: удаляет ТОЛЬКО parentLinks/{parentUid}/children/{childUid}.
  // Документ users/{childUid} и его поддокументы НЕ трогаются.
  function unlinkChild(db, parentUid, childUid){
    if (!db || !parentUid || !childUid) {
      return Promise.reject(new Error("unlinkChild: db/parentUid/childUid обязательны"));
    }
    return db.collection("parentLinks").doc(parentUid).collection("children").doc(childUid).delete();
  }

  // Видимые бейджи цепочки: все полученные + первый неполученный (замок). Остальные скрыты.
  function visibleChainBadges(chain, ownedSet){
    const list = CHAINS[chain].map(t => BADGE_BY_ID[`${chain}_${t}`]);
    const out = [];
    let lockedShown = false;
    for (const b of list){
      if (ownedSet.has(b.id)){ out.push({...b, owned: true}); }
      else if (!lockedShown){ out.push({...b, owned: false}); lockedShown = true; }
      else break; // всё после первого замка скрываем
    }
    return out;
  }

  // ── Серия дней ──
  // Дата календарного дня считается в ЛОКАЛЬНОЙ таймзоне пользователя, не в UTC.
  // Иначе игрок, играющий поздно вечером (например, в 23:00 МСК = 20:00 UTC) и снова на
  // следующий день в 01:00 МСК (= 22:00 UTC того же UTC-дня), теряет инкремент стрика —
  // или, наоборот, два разных Moscow-дня могут отстоять в UTC на 2 суток и обнулить стрик.
  function todayStr(now){
    const d = now || new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }
  function computeStreak(lastActiveDate, prevStreak, today){
    today = today || todayStr();
    if (lastActiveDate === today) return prevStreak || 1;
    const [y, m, d] = today.split("-").map(Number);
    const t = new Date(y, m - 1, d);
    t.setDate(t.getDate() - 1);
    const yesterday = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
    if (lastActiveDate === yesterday) return (prevStreak || 0) + 1;
    return 1;
  }

  // Что реально показывать в UI: streakDays из профиля обновляется только по факту
  // завершения новой сессии. Между сессиями значение может «висеть» устаревшим.
  //  - lastActiveDate == сегодня → серия живая, показываем streakDays
  //  - lastActiveDate == вчера   → серия ещё жива (ожидает продления сегодня), показываем streakDays
  //  - иначе                     → серия уже оборвана (пропущено ≥ 2 суток) → 0
  // Функция чистая — не мутирует БД. Данные в базе исправятся автоматически
  // при следующей сессии; для отображения нужна честная картинка немедленно.
  function effectiveStreak(streakDays, lastActiveDate, today){
    const s = streakDays || 0;
    if (!s || !lastActiveDate) return 0;
    today = today || todayStr();
    if (lastActiveDate === today) return s;
    const [y, m, d] = today.split("-").map(Number);
    const t = new Date(y, m - 1, d);
    t.setDate(t.getDate() - 1);
    const yesterday = `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
    if (lastActiveDate === yesterday) return s;
    return 0;
  }

  // ── Верных за календарный день (сброс при новом дне) ──
  function updateDailyCorrect(prevCount, prevDate, today, addCorrect){
    today = today || todayStr();
    if (prevDate === today) return { dailyCorrect: (prevCount || 0) + addCorrect, dailyDate: today };
    return { dailyCorrect: addCorrect, dailyDate: today };
  }

  // ── Освоенные таблицы (все 9 примеров пройдены, точность ≥ 90%) ──
  function countTablesMastered(facts){
    let count = 0;
    for (const a of NUMS){
      let c = 0, w = 0, attempted = 0;
      for (const b of NUMS){
        const f = (facts || {})[`${a}x${b}`];
        if (f && f.c + f.w > 0){ c += f.c; w += f.w; attempted++; }
      }
      if (attempted === NUMS.length && c + w > 0 && c / (c + w) >= 0.9) count++;
    }
    return count;
  }

  // ── Выбор примера (адаптивный вес, без повтора подряд) ──
  function wt(f){ return !f || f.c + f.w === 0 ? 0.65 : Math.max(0.1, 1 - f.c / (f.c + f.w + 0.5)); }
  function pick(tbs, facts, lastFact, rng){
    rng = rng || Math.random;
    const pool = tbs.flatMap(a => NUMS.map(b => ({a, b, k:`${a}x${b}`})));
    const filtered = lastFact ? pool.filter(p => p.k !== lastFact.k) : pool;
    const usable = filtered.length > 0 ? filtered : pool;
    const ws = usable.map(p => wt(facts[p.k]));
    const sum = ws.reduce((s, w) => s + w, 0);
    let r = rng() * sum;
    for (let i = 0; i < usable.length; i++){ r -= ws[i]; if (r <= 0) return usable[i]; }
    return usable[usable.length - 1];
  }

  // ── Чистый расчёт всех обновлений по итогам сессии ──
  // profile — текущее состояние профиля (или {} для нового пользователя)
  // acc — накопленное в памяти за сессию:
  //   { startDate, startedAt, endedAt, factsDelta, factsFull, sCor, sTot, sXP, maxCombo, sTimes, tables }
  function computeSessionCommit(profile, acc){
    const p = profile || {};
    const completionBonus = sessionBonus(acc.sTot);
    const sessionXP = (acc.sXP || 0) + completionBonus;

    const prevTotalXP = p.totalXP || 0;
    const newTotalXP = prevTotalXP + sessionXP;
    const newTotalCorrect = (p.totalCorrect || 0) + (acc.sCor || 0);
    const newBest = Math.max(p.bestSessionXP || 0, sessionXP);
    // currentStreak — серия правильных подряд МЕЖДУ сессиями. Используется только для бейджей.
    // Множитель XP (×2/×3) на неё не смотрит — он считается в React от in-session combo, который стартует с 0.
    // Без ошибок: серия продолжается → prev + sCor. С ошибками: серия порвана → новая серия = finalCombo
    // (правильные после последней ошибки в этой сессии). Без finalCombo (backward-compat) → 0.
    let newCurrentStreak;
    if (acc.finalCombo == null) {
      newCurrentStreak = 0;
    } else {
      const hadErrors = (acc.sCor || 0) < (acc.sTot || 0);
      newCurrentStreak = hadErrors ? acc.finalCombo : ((p.currentStreak || 0) + (acc.sCor || 0));
    }
    // maxCombo учитывает и пик in-session, и накопленную межсессионную серию — иначе combo_30/50/100
    // были бы недостижимы при лимите сессии в 20 вопросов.
    const newMaxCombo = Math.max(p.maxCombo || 0, acc.maxCombo || 0, newCurrentStreak);
    const isPerfect = (acc.sTot === 20 && acc.sCor === 20);
    const newPerfect = (p.perfectSessions || 0) + (isPerfect ? 1 : 0);
    const daily = updateDailyCorrect(p.dailyCorrect, p.dailyDate, acc.startDate, acc.sCor || 0);
    const tablesMastered = countTablesMastered(acc.factsFull || {});
    // streakDays считаем по дню СТАРТА сессии — стрик растёт только за завершённую сессию,
    // а не за пустой заход в приложение.
    const newStreakDays = computeStreak(p.lastActiveDate, p.streakDays, acc.startDate);

    const stats = {
      maxCombo: newMaxCombo, streakDays: newStreakDays, totalCorrect: newTotalCorrect,
      totalXP: newTotalXP, perfectSessions: newPerfect, dailyCorrect: daily.dailyCorrect, tablesMastered
    };
    const ownedBefore = migrateLegacy(p.achievements);
    const unlocked = computeUnlockedBadges(stats);
    const { all, added } = mergeOwned(ownedBefore, unlocked);

    const times = acc.sTimes || [];
    const avgTime = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length*10)/10 : null;
    const minTime = times.length ? Math.round(Math.min(...times)*10)/10 : null;
    const maxTime = times.length ? Math.round(Math.max(...times)*10)/10 : null;

    const session = {
      date: acc.startedAt,
      dur: Math.max(0, Math.round(((acc.endedAt || acc.startedAt) - acc.startedAt) / 1000)),
      correct: acc.sCor || 0, total: acc.sTot || 0,
      tables: [...(acc.tables || [])],
      avgTime, minTime, maxTime, xp: sessionXP
    };

    const profileUpdates = {
      totalXP: newTotalXP, bestSessionXP: newBest, totalCorrect: newTotalCorrect,
      maxCombo: newMaxCombo, currentStreak: newCurrentStreak, perfectSessions: newPerfect,
      dailyCorrect: daily.dailyCorrect, dailyDate: daily.dailyDate,
      streakDays: newStreakDays, lastActiveDate: acc.startDate,
      tablesMastered, achievements: all
    };

    return {
      session, profileUpdates,
      factsUpdates: acc.factsDelta || {},
      sessionXP, completionBonus,
      newAchievements: added,
      leveledUp: isLevelUp(prevTotalXP, newTotalXP),
      newRank: getRank(newTotalXP).cur,
      newTotalXP,
    };
  }

  // Начальные настройки выбора тренировки: берём из профиля, иначе дефолты.
  // Невалидные/устаревшие значения отбрасываются.
  function pickInitialSettings(profile, defaults){
    defaults = defaults || { tables: [2,3,4,5], sessionLength: 20 };
    const lt = profile && profile.lastTables;
    let tables = null;
    if (Array.isArray(lt) && lt.length > 0){
      const filtered = lt.filter(n => Number.isInteger(n) && n >= 2 && n <= 10);
      // убираем дубликаты, сохраняя порядок
      const seen = new Set();
      tables = filtered.filter(n => seen.has(n) ? false : (seen.add(n), true));
    }
    if (!tables || tables.length === 0) tables = [...defaults.tables];

    const ls = profile && profile.lastSessionLength;
    const sessionLength = SES_OPTS.includes(ls) ? ls : defaults.sessionLength;

    return { tables, sessionLength };
  }

  // ── Режим изучения таблиц ──
  // Полный столбик таблицы умножения для множителя a (b от 1 до 10).
  function tableRows(a){
    const rows = [];
    for (let b = 1; b <= 10; b++) rows.push({ a, b, p: a * b });
    return rows;
  }

  // Фильтрация сессий по периоду. now передаваемо для детерминированных тестов.
  // Границы инклюзивные: сессия ровно 24ч назад попадает в "day" (s.date >= cutoff).
  const PERIOD_MS = { day: 86400000, week: 7 * 86400000, month: 30 * 86400000 };
  function filterSessionsByPeriod(sessions, period, now){
    if (!Array.isArray(sessions)) return [];
    if (period === "all" || !period) return sessions.slice();
    const ms = PERIOD_MS[period];
    if (!ms) return sessions.slice();
    const cutoff = (now == null ? Date.now() : now) - ms;
    return sessions.filter(s => (s && (s.date || 0)) >= cutoff);
  }

  // Агрегаты по подмножеству сессий: всего, верных, точность.
  function aggregateSessions(sessions){
    if (!Array.isArray(sessions) || sessions.length === 0) {
      return { count: 0, totalQ: 0, totalC: 0, accuracy: 0 };
    }
    let totalQ = 0, totalC = 0;
    for (const s of sessions){ totalQ += (s.total || 0); totalC += (s.correct || 0); }
    const accuracy = totalQ > 0 ? Math.round(totalC / totalQ * 100) : 0;
    return { count: sessions.length, totalQ, totalC, accuracy };
  }

  // Защёлка: первый вызов commit() возвращает true, остальные — false
  function makeSaveGate(){
    let saved = false;
    return {
      isSaved(){ return saved; },
      commit(){ if (saved) return false; saved = true; return true; },
      reset(){ saved = false; }
    };
  }

  // ── Админ-помощники (чистые функции для тестов) ──
  const ADMIN_PERIOD_MS = {
    day: 86400000, week: 7*86400000, month: 30*86400000, quarter: 90*86400000, all: Infinity
  };

  function countByRole(users){
    const r = { child: 0, parent: 0, admin: 0, other: 0 };
    if (!Array.isArray(users)) return r;
    for (const u of users) {
      const role = (u && u.role) || "other";
      if (r[role] != null) r[role]++; else r.other++;
    }
    return r;
  }

  // "Активен за период" — по lastLogin (если есть) или по lastActive (фолбэк для старых профилей).
  function countActiveSince(users, periodMs, now){
    if (!Array.isArray(users) || !(periodMs > 0)) return 0;
    const cutoff = (now == null ? Date.now() : now) - periodMs;
    let n = 0;
    for (const u of users) {
      const ts = (u && (u.lastLogin || u.lastActive)) || 0;
      if (ts >= cutoff) n++;
    }
    return n;
  }

  function countRegistrationsSince(users, periodMs, now, role){
    if (!Array.isArray(users) || !(periodMs > 0)) return 0;
    const cutoff = (now == null ? Date.now() : now) - periodMs;
    let n = 0;
    for (const u of users) {
      if (!u || !u.createdAt) continue;
      if (role && u.role !== role) continue;
      if (u.createdAt >= cutoff) n++;
    }
    return n;
  }

  // Бакеты регистраций по дням (локальная дата). Включает дни без регистраций (0).
  function groupRegistrationsByDay(users, startMs, endMs, role){
    const buckets = {};
    const dayMs = 86400000;
    const dayKey = (ts) => {
      const d = new Date(ts);
      const y = d.getFullYear();
      const m = String(d.getMonth()+1).padStart(2,"0");
      const dd = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${dd}`;
    };
    // Подготовим пустые бакеты на все дни от startMs до endMs включительно.
    const sDay = new Date(startMs); sDay.setHours(0,0,0,0);
    const eDay = new Date(endMs); eDay.setHours(0,0,0,0);
    for (let t = sDay.getTime(); t <= eDay.getTime(); t += dayMs) {
      buckets[dayKey(t)] = 0;
    }
    if (Array.isArray(users)) {
      for (const u of users) {
        if (!u || !u.createdAt) continue;
        if (role && u.role !== role) continue;
        if (u.createdAt < startMs || u.createdAt > endMs) continue;
        const k = dayKey(u.createdAt);
        if (k in buckets) buckets[k]++;
      }
    }
    return buckets;
  }

  function filterUsers(users, opts){
    if (!Array.isArray(users)) return [];
    const o = opts || {};
    const search = (o.search || "").trim().toLowerCase();
    const role = o.role && o.role !== "all" ? o.role : null;
    const periodMs = o.registeredSinceMs > 0 ? o.registeredSinceMs : null;
    const cutoff = periodMs ? ((o.now == null ? Date.now() : o.now) - periodMs) : null;
    return users.filter(u => {
      if (!u) return false;
      if (role && u.role !== role) return false;
      if (search && !String(u.name || "").toLowerCase().includes(search)) return false;
      if (cutoff != null && (!u.createdAt || u.createdAt < cutoff)) return false;
      return true;
    });
  }

  function sortUsers(users, key, dir){
    const arr = Array.isArray(users) ? users.slice() : [];
    const d = dir === "asc" ? 1 : -1;
    const num = v => (typeof v === "number" ? v : 0);
    const str = v => String(v == null ? "" : v).toLowerCase();
    arr.sort((a, b) => {
      switch (key) {
        case "name": {
          const av = str(a.name), bv = str(b.name);
          return av < bv ? -d : av > bv ? d : 0;
        }
        case "role": {
          const av = str(a.role), bv = str(b.role);
          return av < bv ? -d : av > bv ? d : 0;
        }
        case "createdAt":   return (num(a.createdAt) - num(b.createdAt)) * d;
        case "lastLogin":   return ((num(a.lastLogin) || num(a.lastActive)) - (num(b.lastLogin) || num(b.lastActive))) * d;
        case "sessionsCount": return (num(a.sessionsCount) - num(b.sessionsCount)) * d;
        case "lastActive":  return (num(a.lastActive) - num(b.lastActive)) * d;
        default: return 0;
      }
    });
    return arr;
  }

  function paginate(arr, page, pageSize){
    const list = Array.isArray(arr) ? arr : [];
    const ps = pageSize > 0 ? pageSize : 50;
    const totalPages = Math.max(1, Math.ceil(list.length / ps));
    const p = Math.min(Math.max(1, page || 1), totalPages);
    const start = (p - 1) * ps;
    return { items: list.slice(start, start + ps), totalPages, page: p, total: list.length };
  }

  function validatePasswordChange(current, next1, next2, minLen){
    const min = minLen > 0 ? minLen : 8;
    if (!current) return { ok: false, error: "Введите текущий пароль" };
    if (!next1 || next1.length < min) return { ok: false, error: `Новый пароль минимум ${min} символов` };
    if (next1 !== next2) return { ok: false, error: "Пароли не совпадают" };
    if (next1 === current) return { ok: false, error: "Новый пароль совпадает с текущим" };
    return { ok: true };
  }

  // ── Восстановление пароля админа ──
  // Документ adminRecovery/request: { requestedAt, newPassword }. Свежим считается ≤ maxAgeMs (по умолчанию 1ч).
  function isRecoveryFresh(doc, now, maxAgeMs){
    if (!doc || !doc.requestedAt) return false;
    const t = typeof doc.requestedAt === "number" ? doc.requestedAt
            : (doc.requestedAt && typeof doc.requestedAt.toMillis === "function") ? doc.requestedAt.toMillis()
            : Number(doc.requestedAt);
    if (!isFinite(t)) return false;
    const cur = (now == null ? Date.now() : now);
    const max = maxAgeMs > 0 ? maxAgeMs : 3600000;
    const age = cur - t;
    return age >= 0 && age <= max;
  }

  // Решение, что делать со ссылкой на восстановление при вводе пароля:
  //  "apply"  — свежий запрос + введённый пароль совпадает с newPassword
  //  "reject" — свежий запрос, но пароль другой
  //  "noop"   — записи нет или устарела
  function decideRecoveryAction(doc, enteredPassword, now, maxAgeMs){
    if (!isRecoveryFresh(doc, now, maxAgeMs)) return "noop";
    if (typeof doc.newPassword !== "string" || !doc.newPassword) return "noop";
    return String(doc.newPassword) === String(enteredPassword) ? "apply" : "reject";
  }

  // Оркестратор смены пароля. Чистый: получает инжектируемые шаги (для тестов или реал-кода).
  // ГАРАНТИЯ: writeNewHash вызывается ТОЛЬКО после успеха всех предыдущих шагов в строгом порядке.
  // Любая ошибка ниже writeNewHash оставит Firestore-хэш нетронутым (синхронизирован с Auth).
  async function orchestratePasswordChange(steps){
    const order = ["verifyCurrent", "reauthenticate", "updateAuthPassword", "testSignInSecondary", "writeNewHash"];
    for (const key of order) {
      const fn = steps && steps[key];
      if (typeof fn !== "function") return { ok: false, step: key, error: "step missing" };
      try {
        const res = await fn();
        if (res && res.ok === false) return { ok: false, step: key, error: res.error || "step failed" };
      } catch(e) {
        return { ok: false, step: key, error: (e && e.message) ? e.message : String(e) };
      }
    }
    return { ok: true };
  }

  // Хэш SHA-256 → hex. Использует Web Crypto API; в тестах принимает инжектируемый subtle.
  async function sha256Hex(text, subtleImpl){
    const subtle = subtleImpl
      || (typeof crypto !== "undefined" && crypto.subtle)
      || (typeof globalThis !== "undefined" && globalThis.crypto && globalThis.crypto.subtle);
    if (!subtle) throw new Error("Web Crypto API недоступен");
    const enc = new TextEncoder().encode(String(text));
    const buf = await subtle.digest("SHA-256", enc);
    const bytes = new Uint8Array(buf);
    let hex = "";
    for (let i = 0; i < bytes.length; i++) hex += bytes[i].toString(16).padStart(2, "0");
    return hex;
  }

  // Восстановление профиля при запуске для УЖЕ залогиненного пользователя.
  // Железное правило: сетевые проблемы не должны выкидывать на форму входа.
  // Чистая функция с инжектируемыми шагами (тестируется без Firebase):
  //   getCache()    → профиль из локального кэша Firestore или null (может бросать);
  //   getServer()   → Promise<профиль | null>; null = профиль удалён, throw = сеть;
  //   getSnapshot() → запасная копия профиля из localStorage или null;
  //   apply(p, src) → вход в приложение (src: "cache" | "server" | "snapshot");
  //   onDeleted()   → профиль удалён на сервере (разлогин);
  //   onNoProfile() → профиля нет нигде (экран «нет связи», НЕ форма входа);
  //   timeoutMs     → сколько ждать сервер, когда показать больше нечего.
  // Сервер применяется, КОГДА БЫ ни ответил: даже если уже вошли из кэша/снапшота,
  // поздний ответ обновит данные (или разлогинит, если аккаунт удалён).
  async function restoreProfileFlow(s) {
    let entered = false;
    try {
      const cached = await s.getCache();
      if (cached) { s.apply(cached, "cache"); entered = true; }
    } catch (e) {} // кэша нет — не страшно
    const serverP = (async () => {
      const p = await s.getServer();
      if (p === null) { s.onDeleted(); return null; }
      s.apply(p, "server");
      return p;
    })();
    serverP.catch(() => {}); // поздний сетевой отказ не должен стать unhandled rejection
    if (entered) return "cache";
    try {
      await Promise.race([
        serverP,
        new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), s.timeoutMs || 8000)),
      ]);
      return "server";
    } catch (e) {
      const snap = s.getSnapshot ? s.getSnapshot() : null;
      if (snap) { s.apply(snap, "snapshot"); return "snapshot"; }
      s.onNoProfile();
      return "none";
    }
  }

  // Человеческие сообщения об ошибках входа/регистрации вместо английских из Firebase.
  function authErrorMessage(code, fallback) {
    const map = {
      "auth/network-request-failed": "Нет соединения с сервером. Для входа и регистрации нужен интернет — офлайн работает только уже выполненный вход.",
      "auth/too-many-requests": "Слишком много попыток. Подожди немного и попробуй снова.",
      "auth/email-already-in-use": "Такое имя уже занято",
      "auth/wrong-password": "Неверный пароль",
      "auth/user-not-found": "Пользователь не найден",
      "auth/invalid-credential": "Неверное имя или пароль",
      "auth/invalid-login-credentials": "Неверное имя или пароль",
      "auth/weak-password": "Слабый пароль",
      "auth/invalid-email": "Недопустимое имя",
    };
    return map[code] || fallback || "Ошибка";
  }

  // Плашка свежести данных на экране статистики ребёнка (родительский аккаунт).
  // status: "fresh" — сервер только что подтвердил данные;
  //         "updating" — показана локальная копия, запрос к серверу ещё идёт;
  //         "offline" — сервер недоступен, осталась локальная копия.
  // loadedAt — timestamp последней УСПЕШНОЙ загрузки с сервера (null, если неизвестен).
  // fmt — инжектируемый форматтер даты (в тестах — заглушка).
  function freshnessBanner(status, loadedAt, fmt){
    const when = loadedAt ? (fmt ? fmt(loadedAt) : String(loadedAt)) : null;
    if (status === "fresh")
      return { tone: "ok", text: "✓ Данные актуальны — загружены " + (when || "только что") };
    if (status === "offline")
      return { tone: "warn", text: "📡 Нет связи — показаны сохранённые данные" + (when ? " от " + when : "") };
    return { tone: "wait", text: "⏳ Показаны сохранённые данные" + (when ? " от " + when : "") + " — обновляю…" };
  }

  const GAME = {
    NUMS, SES_OPTS, RANKS, rankIndex, getRank, isLevelUp,
    comboMultiplier, nextCombo, computeAnswerXP, sessionBonus,
    CHAINS, CHAIN_ORDER, CHAIN_TITLES, BADGES, BADGE_BY_ID,
    computeUnlockedBadges, migrateLegacy, mergeOwned, visibleChainBadges, ownedBadgesByChain,
    todayStr, computeStreak, effectiveStreak, updateDailyCorrect, countTablesMastered,
    wt, pick, unlinkChild,
    computeSessionCommit, makeSaveGate, pickInitialSettings,
    filterSessionsByPeriod, aggregateSessions, PERIOD_MS,
    tableRows,
    ADMIN_PERIOD_MS, countByRole, countActiveSince, countRegistrationsSince,
    groupRegistrationsByDay, filterUsers, sortUsers, paginate,
    validatePasswordChange, sha256Hex,
    isRecoveryFresh, decideRecoveryAction, orchestratePasswordChange,
    freshnessBanner, restoreProfileFlow, authErrorMessage,
  };
  global.GAME = GAME;
  if (typeof module !== "undefined" && module.exports) module.exports = GAME;
})(typeof window !== "undefined" ? window : globalThis);
</script>


<script type="text/babel">

// ─── HELPERS ─────────────────────────────────────────────
const nameToEmail = (n) => n.trim().toLowerCase().replace(/\s+/g, "_") + "@multiplication.app";
const gen6 = () => String(Math.floor(100000 + Math.random() * 900000));

const G = window.GAME;
const { getRank, isLevelUp, computeAnswerXP, comboMultiplier, nextCombo, sessionBonus,
        CHAIN_ORDER, CHAIN_TITLES, BADGE_BY_ID, computeUnlockedBadges, migrateLegacy,
        mergeOwned, visibleChainBadges, ownedBadgesByChain, todayStr, computeStreak, effectiveStreak, updateDailyCorrect,
        countTablesMastered, pick, computeSessionCommit, makeSaveGate,

        ADMIN_PERIOD_MS, countByRole, countActiveSince, countRegistrationsSince,
        groupRegistrationsByDay, filterUsers, sortUsers, paginate,

        isRecoveryFresh, decideRecoveryAction, orchestratePasswordChange } = G;

const hc = f => {
  if (!f || f.c+f.w===0) return {bg:"#E5E7EB", tx:"#9CA3AF"};
  const a = f.c/(f.c+f.w);
  if (a >= 0.85) return {bg:"#4ADE80", tx:"#166534"};
  if (a >= 0.65) return {bg:"#86EFAC", tx:"#14532D"};
  if (a >= 0.40) return {bg:"#FCA5A5", tx:"#7F1D1D"};
  return {bg:"#F87171", tx:"#7F1D1D"};
};

const fmtD = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"});
const fmtDay = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short"});
const fmtS = s => s < 60 ? `${s}с` : `${Math.floor(s/60)}м ${s%60}с`;

// ─── FIRESTORE I/O ───────────────────────────────────────
// opts.source: "cache" — только локальный кэш Firestore (мгновенно; бросает ошибку,
//              если профиля в кэше ещё нет — например, при первом просмотре);
//              "server" — строго сервер (бросает ошибку офлайн; нужен там, где важно
//              отличить свежие данные от кэша — обычный get() при плохой сети после
//              долгой паузы МОЛЧА отдаёт кэш, и устаревшее неотличимо от актуального);
//              не задан — стандартное поведение SDK (сервер с фолбэком на кэш).
// Три запроса идут параллельно: последовательные await утраивали сетевую задержку.
async function loadUserData(uid, opts) {
  const allSessions = !!(opts && opts.allSessions);
  const source = opts && opts.source;
  const g = ref => source ? ref.get({ source }) : ref.get();
  const userRef = db.collection("users").doc(uid);
  // Для родителя/админа грузим ВСЕ сессии (фильтр по периоду — на клиенте).
  // Для ребёнка/прочих остаётся лимит 50, чтобы не тянуть всё ради собственных нужд.
  let q = userRef.collection("sessions").orderBy("date", "desc");
  if (!allSessions) q = q.limit(50);
  const [userDoc, factsSnap, sessSnap] = await Promise.all([
    g(userRef),
    g(userRef.collection("facts")),
    g(q),
  ]);
  if (!userDoc.exists) return null;
  const profile = userDoc.data();
  const facts = {};
  factsSnap.forEach(d => facts[d.id] = d.data());
  const sessions = [];
  sessSnap.forEach(d => sessions.push({id: d.id, ...d.data()}));
  return { uid, profile, facts, sessions };
}

// Когда данные пользователя в последний раз были УСПЕШНО получены с сервера —
// для плашки свежести на экране статистики. localStorage переживает перезапуски PWA.
const serverLoadedAtKey = uid => "xm_serverLoadedAt_" + uid;

  try { const v = localStorage.getItem(serverLoadedAtKey(uid)); return v ? Number(v) : null; }
  catch(e) { return null; }

}

// Запасная копия профиля для офлайн-входа: iOS может вычистить кэш Firestore (IndexedDB),
// тогда залогиненный пользователь без сети остался бы без профиля. localStorage живучее.
const profileSnapKey = uid => "xm_profile_" + uid;
function getProfileSnapshot(uid) {
  try { const v = localStorage.getItem(profileSnapKey(uid)); return v ? JSON.parse(v) : null; }
  catch(e) { return null; }
}
function saveProfileSnapshot(uid, p) {
  try { localStorage.setItem(profileSnapKey(uid), JSON.stringify(p)); } catch(e) {}
}

// Идемпотентное создание кода привязки: резервирование кода и запись inviteCode в профиль
// идут одной транзакцией. Иначе параллельные вызовы (например, из AuthScreen.submit и из
// ChildApp.useEffect, который монтируется сразу после регистрации) создают разные коды,
// один из которых остаётся осиротевшим в коллекции inviteCodes.
async function ensureInviteCode(uid, profile) {
  const userRef = db.collection("users").doc(uid);
  // Переданный profile может быть устаревшим (race с регистрацией) — перечитываем.
  const freshSnap = await userRef.get();
  if (freshSnap.exists && freshSnap.data().inviteCode) return freshSnap.data().inviteCode;
  const childName = (freshSnap.exists && freshSnap.data().name) || profile.name;

  for (let attempt = 0; attempt < 6; attempt++) {
    const code = gen6();
    try {
      const result = await db.runTransaction(async (tx) => {
        // Внутри транзакции снова смотрим профиль — параллельный вызов мог уже записать код.
        const userSnap = await tx.get(userRef);
        if (userSnap.exists && userSnap.data().inviteCode) {
          return { existing: userSnap.data().inviteCode };
        }
        const codeRef = db.collection("inviteCodes").doc(code);
        const codeSnap = await tx.get(codeRef);
        if (codeSnap.exists) return { collision: true };
        tx.set(codeRef, { childUid: uid, childName, createdAt: Date.now(), used: false });
        tx.update(userRef, { inviteCode: code });
        return { created: code };
      });
      if (result && result.existing) return result.existing;
      if (result && result.created) return result.created;
      // collision — пробуем сгенерировать другой 6-значный код
    } catch(e) {}
  }
  return null;
}

async function linkParentToChildByCode(parentUid, code) {
  const ref = db.collection("inviteCodes").doc(code);
  const snap = await ref.get();
  if (!snap.exists) return { ok: false, error: "Код не найден" };
  const { childUid, childName } = snap.data();
  if (!childUid) return { ok: false, error: "Код устарел, попроси у ребёнка новый" };
  // У старых кодов childName мог не записаться — тянем из профиля ребёнка как fallback.
  let name = childName;
  if (!name) {
    const childSnap = await db.collection("users").doc(childUid).get();
    name = childSnap.exists ? (childSnap.data().name || "") : "";
    if (!name) return { ok: false, error: "Код устарел, попроси у ребёнка новый" };
  }
  await db.collection("parentLinks").doc(parentUid).collection("children").doc(childUid).set({
    name, linkedAt: Date.now()
  });
  await ref.update({ used: true, lastLinkedAt: Date.now() });
  return { ok: true, name };
}

// ─── ADMIN PASSWORD ──────────────────────────────────────
// Источник истины для пароля админа — хэш SHA-256 в Firestore (adminConfig/main).
// Захардкоженного фолбэка нет. Если хэша нет — приложение покажет экран первичной
// настройки. Если рассинхрон между Auth и хэшем — восстановление через adminRecovery.
async function getStoredAdminPasswordHash() {
  try {
    const snap = await db.collection("adminConfig").doc("main").get();
    if (snap.exists) return snap.data().passwordHash || null;
  } catch(e) {}
  return null;
}

async function setStoredAdminPasswordHash(hash) {
  await db.collection("adminConfig").doc("main")
    .set({ passwordHash: hash, updatedAt: Date.now() }, { merge: true });
}

async function verifyAdminPassword(plain) {
  const stored = await getStoredAdminPasswordHash();
  if (!stored) return false; // нет хэша → не валидно (отправит на setup-флоу)
  const inputHash = await sha256Hex(plain);
  return inputHash === stored;
}

// Читает документ adminRecovery/request. Возвращает данные или null.
async function getAdminRecoveryRequest() {
  try {
    const snap = await db.collection("adminRecovery").doc("request").get();
    if (snap.exists) return snap.data();
  } catch(e) {}
  return null;
}

async function deleteAdminRecoveryRequest() {
  try { await db.collection("adminRecovery").doc("request").delete(); } catch(e) {}
}

// Вторичный Firebase-инстанс для тестового signIn без выхода из основного.
// Лениво инициализируется; держим один на всё приложение.
function getSecondaryAuth() {
  let app;
  try { app = firebase.app("secondary"); }
  catch(e) {
    app = firebase.initializeApp(firebaseConfig, "secondary");
  }
  return app.auth();
}

// ─── APP ─────────────────────────────────────────────────
const W = {width:"100%", maxWidth:420, boxSizing:"border-box"};
// base — скроллящийся экран; padding учитывает safe-area-inset для устройств с чёлкой / нижней полоской жестов
const base = {minHeight:"100dvh", background:"#F5F3FF", display:"flex", flexDirection:"column", alignItems:"center",
  padding:"max(24px, env(safe-area-inset-top)) 16px max(48px, env(safe-area-inset-bottom))", boxSizing:"border-box"};

function App() {
  const [authState, setAuthState] = useState("loading");
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);

  // true, когда Firebase подтвердил сохранённую сессию. Пока профиль едет по сети,
  // страховка ниже НЕ имеет права показать форму входа — пользователь-то залогинен.
  const authedRef = useRef(false);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (!u) { authedRef.current = false; setAuthState("guest"); setUser(null); setProfile(null); return; }
      authedRef.current = true;
      const userRef = db.collection("users").doc(u.uid);
      const apply = (p, src) => {
        if (src === "server") saveProfileSnapshot(u.uid, p);
        setUser(u); setProfile(p);
        setAuthState(p.role || "child");
      };
      // Кэш → мгновенный вход; сервер → свежий профиль (когда бы ни ответил);
      // localStorage-снапшот → запасной вход; совсем ничего → экран «нет связи».
      // Сетевые проблемы больше НИКОГДА не выкидывают залогиненного на форму входа.
      await G.restoreProfileFlow({
        getCache: () => userRef.get({ source: "cache" }).then(d => d.exists ? d.data() : null),
        getServer: () => userRef.get({ source: "server" }).then(d => {
          if (!d.exists) return null;
          // Фиксируем факт входа (без блокировки UI). Старые профили без lastLogin получат поле тут же.
          const now = Date.now();
          userRef.update({ lastLogin: now }).catch(()=>{});
          return { ...d.data(), lastLogin: now };
        }),
        getSnapshot: () => getProfileSnapshot(u.uid),
        apply,
        onDeleted: () => { auth.signOut(); }, // профиль удалён на сервере → честный разлогин
        onNoProfile: () => setAuthState("noprofile"),
        timeoutMs: 8000,
      });
    });
    return () => unsub();
  }, []);

  // Страховка от вечной "Загрузки…": если Firebase за 3с не отдал auth-состояние
  // (нет сети И нет локального токена) — показываем форму входа. Но только если
  // сохранённой сессии действительно нет: залогиненному форму входа не показываем,
  // даже когда профиль ещё едет по плохой сети (authedRef).
  useEffect(() => {
    const t = setTimeout(() => {
      setAuthState(s => (s === "loading" && !authedRef.current ? "guest" : s));
    }, 3000);
    return () => clearTimeout(t);
  }, []);

  const logout = () => auth.signOut();

  if (authState === "loading") return (
    <div style={{...base, justifyContent:"center"}}>
      <div style={{fontSize:18, color:"#6B7280"}}>Загрузка…</div>
    </div>
  );

  // Залогинен, но профиль недоступен нигде (первый запуск на новом устройстве без сети).
  if (authState === "noprofile") return (
    <div style={{...base, justifyContent:"center"}}>
      <div style={{fontSize:15, color:"#6B7280", textAlign:"center", padding:"0 28px", lineHeight:1.5, marginBottom:18}}>
        Вход выполнен, но профиль загрузить не удалось: нет связи с сервером,
        а на этом устройстве профиль ещё не сохранялся. Проверь интернет и попробуй снова.
      </div>
      <div style={{display:"flex", gap:10, justifyContent:"center"}}>
        <button onClick={() => window.location.reload()}
          style={{height:44, padding:"0 22px", borderRadius:12, background:PU, color:"#fff", border:"none", fontWeight:700, fontSize:15, cursor:"pointer"}}>
          Повторить
        </button>
        <button onClick={logout}
          style={{height:44, padding:"0 22px", borderRadius:12, background:"transparent", color:"#6B7280", border:"1.5px solid #D1D5DB", fontSize:15, cursor:"pointer"}}>
          Выйти
        </button>
      </div>
    </div>
  );

  if (authState === "guest") return <AuthScreen />;
  if (authState === "child") return <ChildApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "parent") return <ParentApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "admin") return <AdminApp user={user} profile={profile} onLogout={logout} />;
  return null;
}

// ─── AUTH SCREEN ─────────────────────────────────────────
function AuthScreen() {
  const [tab, setTab] = useState("login");
  const [name, setName] = useState("");
  const [pass, setPass] = useState("");
  const [role, setRole] = useState("child");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);
  // Когда хэша админа нет в Firestore — переключаемся в режим первичной настройки.
  const [setupMode, setSetupMode] = useState(false);
  const [setupP1, setSetupP1] = useState("");
  const [setupP2, setSetupP2] = useState("");
  // Индикатор сети: первый вход/регистрация без интернета невозможны — предупреждаем.
  const [online, setOnline] = useState(typeof navigator === "undefined" ? true : navigator.onLine);
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  const adminEmail = () => nameToEmail(ADMIN_NAME);

  const doAdminSetup = async () => {
    setErr("");
    if (!setupP1 || setupP1.length < 8) { setErr("Минимум 8 символов"); return; }
    if (setupP1 !== setupP2) { setErr("Пароли не совпадают"); return; }
    setBusy(true);
    try {
      const email = adminEmail();
      const newHash = await sha256Hex(setupP1);
      let uid;
      try {
        const cred = await auth.createUserWithEmailAndPassword(email, setupP1);
        uid = cred.user.uid;
        await db.collection("users").doc(uid).set({
          name: ADMIN_NAME, role: "admin", createdAt: Date.now()
        });
      } catch(e) {
        if (e.code === "auth/email-already-in-use") {
          // Аккаунт в Auth уже есть, но Firestore-хэша нет (например, его удалили).
          // Без знания Auth-пароля войти не можем — нужна процедура восстановления.
          setErr("Аккаунт админа существует в Auth, но настройка утеряна. Восстанови через Firebase Console: adminRecovery/request.");
          setBusy(false);
          return;
        }
        throw e;
      }
      await setStoredAdminPasswordHash(newHash);
      // После set профиля + хэша — onAuthStateChanged автоматически введёт в AdminApp.
    } catch(e) {
      console.error("admin setup failed", e);
      setErr(e && e.message ? e.message : "Не удалось создать админа");
    } finally {
      setBusy(false);
    }
  };

  // Восстановление: если есть свежий adminRecovery/request с newPassword==pass — пытаемся signIn
  // (Auth-пароль должен быть тоже обновлён владельцем в Console). Если всё ok — синхронизируем
  // хэш и удаляем recovery-доку. Возвращает true, если вход выполнен.
  const tryAdminRecovery = async (email, pass) => {
    const rec = await getAdminRecoveryRequest();
    const action = decideRecoveryAction(rec, pass, Date.now(), ADMIN_RECOVERY_MAX_AGE_MS);
    if (action !== "apply") return false;
    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch(e) {
      // Owner забыл также обновить пароль в Auth.
      setErr("Восстановление: пароль в Firebase Auth не совпадает. Обнови его в Firebase Console → Authentication.");
      return true; // recovery попытка считается обработанной — не падаем дальше.
    }
    // Auth-пароль теперь точно знаем — синхронизируем хэш и удаляем recovery.
    try {
      const newHash = await sha256Hex(pass);
      await setStoredAdminPasswordHash(newHash);
    } catch(e) {}
    await deleteAdminRecoveryRequest();
    return true;
  };

  const submit = async () => {
    setErr("");
    const n = name.trim();
    if (!n) { setErr("Введите имя"); return; }
    if (pass.length < 6) { setErr("Пароль минимум 6 символов"); return; }
    setBusy(true);
    try {
      const isAdminName = n.toLowerCase() === ADMIN_NAME;
      const email = nameToEmail(n);
      if (tab === "login") {
        if (isAdminName) {
          // 1) Сначала — попытка восстановления, если есть свежий adminRecovery/request.
          //    Это покрывает прошлый баг (рассинхрон Auth↔Firestore-хэш).
          const handled = await tryAdminRecovery(email, pass);
          if (handled) { setBusy(false); return; }

          // 2) Проверяем хэш в Firestore. Если хэша нет — отправляем на первичную настройку.
          const stored = await getStoredAdminPasswordHash();
          if (!stored) {
            setSetupMode(true);
            setSetupP1(pass);
            setSetupP2("");
            setBusy(false);
            return;
          }
          const okPass = await verifyAdminPassword(pass);
          if (!okPass) { setErr("Неверный пароль"); setBusy(false); return; }
          // 3) Логин в Firebase Auth. Если Auth-пароль рассинхронизирован — приходит invalid-credential.
          try { await auth.signInWithEmailAndPassword(email, pass); }
          catch(e) {
            if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/invalid-login-credentials" || e.code === "auth/wrong-password") {
              setErr("Пароль рассинхронизирован с Firebase Auth. Используй процедуру восстановления (adminRecovery/request в Console).");
              setBusy(false);
              return;
            }
            throw e;
          }
        } else {
          await auth.signInWithEmailAndPassword(email, pass);
        }
      } else {
        if (n.toLowerCase() === ADMIN_NAME) { setErr("Имя 'admin' зарезервировано"); setBusy(false); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const profile = { name: n, role, createdAt: Date.now() };
        await db.collection("users").doc(cred.user.uid).set(profile);
        if (role === "child") {
          await ensureInviteCode(cred.user.uid, profile);
        }
      }
    } catch(e) {
      setErr(G.authErrorMessage(e.code, e.message));
    }
    setBusy(false);
  };

  if (setupMode) {
    const inputStyle = {width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff", boxSizing:"border-box"};
    return (
      <div style={base}>
        <div style={{fontSize:52, marginBottom:4, textAlign:"center"}}>🔧</div>
        <h1 style={{fontSize:22, fontWeight:700, color:PU, margin:"0 0 2px", textAlign:"center"}}>Первичная настройка админа</h1>
        <p style={{fontSize:13, color:"#6B7280", margin:"0 0 18px", textAlign:"center", maxWidth:360}}>
          Аккаунт администратора ещё не создан. Задай пароль — он будет сохранён только в виде SHA-256 хэша.
        </p>
        <div style={{...W, marginBottom:12}}>
          <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Новый пароль (минимум 8 символов)</div>
          <input type="password" value={setupP1} onChange={e=>setSetupP1(e.target.value)} style={inputStyle} />
        </div>
        <div style={{...W, marginBottom:14}}>
          <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Подтверждение</div>
          <input type="password" value={setupP2} onChange={e=>setSetupP2(e.target.value)} style={inputStyle} />
        </div>
        {err && <div style={{...W, color:RD, fontSize:14, marginBottom:12, textAlign:"center"}}>{err}</div>}
        <button onClick={doAdminSetup} disabled={busy}
          style={{...W, height:52, borderRadius:14, background: busy ? "#9CA3AF" : PU, color:"#fff", fontSize:16, fontWeight:700, border:"none", cursor: busy ? "default" : "pointer", marginBottom:10}}>
          {busy ? "Создаём…" : "Создать"}
        </button>
        <button onClick={() => { setSetupMode(false); setErr(""); }} disabled={busy}
          style={{...W, height:40, borderRadius:10, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor: busy ? "default" : "pointer"}}>
          Отмена
        </button>
      </div>
    );
  }

  return (
    <div style={base}>
      <div style={{fontSize:52, marginBottom:4, textAlign:"center"}}>✖️</div>
      <h1 style={{fontSize:26, fontWeight:700, color:PU, margin:"0 0 2px", textAlign:"center"}}>Таблица умножения</h1>
      <p style={{fontSize:14, color:"#6B7280", margin:"0 0 24px"}}>Умная тренировка</p>

      {!online && (
        <div style={{...W, background:"#FFFBEB", border:"1.5px solid #FCD34D", borderRadius:12, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#92400E", textAlign:"center"}}>
          📡 Нет сети. Для первого входа требуется интернет — если ты уже заходил раньше, приложение откроется само.
        </div>
      )}

      <div style={{...W, display:"flex", marginBottom:18, background:"#fff", borderRadius:12, padding:4, border:"1.5px solid #E5E7EB"}}>
        {["login","register"].map(t => (
          <button key={t} onClick={() => { setTab(t); setErr(""); }}
            style={{flex:1, height:42, borderRadius:9, border:"none", background: tab===t ? PU : "transparent", color: tab===t ? "#fff" : "#6B7280", fontSize:15, fontWeight:600, cursor:"pointer"}}>
            {t === "login" ? "Войти" : "Создать аккаунт"}
          </button>
        ))}
      </div>

      <div style={{...W, marginBottom:14}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Имя</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Вася"
          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      <div style={{...W, marginBottom: tab === "register" ? 14 : 18}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Пароль</div>
        <input value={pass} onChange={e => setPass(e.target.value)} type="password" placeholder="Минимум 6 символов"
          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      {tab === "register" && (
        <div style={{...W, marginBottom:18}}>
          <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Кто ты?</div>
          <div style={{display:"flex", gap:9}}>
            {[["child","Я ребёнок"], ["parent","Я родитель"]].map(([v,l]) => {
              const sel = role === v;
              return (
                <button key={v} onClick={() => setRole(v)}
                  style={{flex:1, height:48, borderRadius:13, border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: sel ? PL : "#fff", color: sel ? PU : "#6B7280", fontWeight: sel ? 700 : 500, fontSize:15, cursor:"pointer"}}>
                  {l}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {err && <div style={{...W, color:RD, fontSize:14, marginBottom:12, textAlign:"center"}}>{err}</div>}

      <button onClick={submit} disabled={busy}
        style={{...W, height:56, borderRadius:16, background: busy ? "#9CA3AF" : PU, color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor: busy ? "default" : "pointer"}}>
        {busy ? "..." : (tab === "login" ? "Войти" : "Создать аккаунт")}
      </button>

      <OfflineBadge />
    </div>
  );
}
