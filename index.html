}

// ─── OFFLINE BADGE ───────────────────────────────────────
// Готовность офлайн-режима: проверяем ФАКТИЧЕСКОЕ содержимое кэшей (критический shell
// и счётчик озвучки), а не факт установки SW. Пока кэш греется — поллим раз в 3с.
function OfflineBadge() {
  const [st, setSt] = useState(null); // { shell: bool, audio: number }
  useEffect(() => {
    if (!("caches" in window)) return;
    let alive = true, timer = null;
    const SHELL_KEYS = [
      "index.html", "manifest.json",
      "vendor/react.production.min.js", "vendor/react-dom.production.min.js", "vendor/babel.min.js",
      "vendor/firebase-app-compat.js", "vendor/firebase-auth-compat.js", "vendor/firebase-firestore-compat.js"
    ];
    const check = async () => {
      try {
        const res = await Promise.all(SHELL_KEYS.map(u => caches.match(u)));
        const shell = res.every(Boolean);
        let audio = 0;
        for (const n of await caches.keys()) {
          if (n.indexOf("audio") === -1) continue;
          audio = (await (await caches.open(n)).keys()).length;
        }
        if (alive) setSt({ shell, audio });
        return shell && audio >= 90;
      } catch (e) { return true; } // проверить не смогли — бейдж просто не показываем
    };
    check().then(done => {
      if (done || !alive) return;
      timer = setInterval(() => check().then(d => { if (d && timer) { clearInterval(timer); timer = null; } }), 3000);
    });
    return () => { alive = false; if (timer) clearInterval(timer); };
  }, []);
  if (!st) return null;
  const full = st.shell && st.audio >= 90;
  const text = !st.shell ? "⏳ Готовим офлайн-режим… не выключай интернет"
    : full ? "✓ Офлайн-режим полностью готов"
    : `✓ Офлайн готов · озвучка ${st.audio}/90`;
  return <div style={{fontSize:11.5, color: st.shell ? "#16A34A" : "#92400E", textAlign:"center", marginTop:14}}>{text}</div>;
}

// ─── CHILD APP ───────────────────────────────────────────
function ChildApp({ user, profile, onLogout }) {
  const [sc, setSc] = useState("home");
  const [prof, setProf] = useState(profile);
  const [facts, setFacts] = useState({});
  const [sessions, setSessions] = useState([]);
  const [inviteCode, setInviteCode] = useState(profile.inviteCode || "");
  const initSettings = pickInitialSettings(profile);
  const [tbs, setTbs] = useState(initSettings.tables);
  const [ses, setSes] = useState(initSettings.sessionLength);
  const [fact, setFact] = useState(null);
  const [ans, setAns] = useState("");
  const [ph, setPh] = useState("q");
  const [sCor, setSCor] = useState(0);
  const [sTot, setSTot] = useState(0);
  const [sXP, setSXP] = useState(0);
  const [combo, setCombo] = useState(0);
  const [xpPop, setXpPop] = useState(null);
  const [resultData, setResultData] = useState(null);
  const [showLevelUp, setShowLevelUp] = useState(false);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [saving, setSaving] = useState(false);
  const [online, setOnline] = useState(typeof navigator === "undefined" ? true : navigator.onLine);
  const t0 = useRef(null);
  const qTime = useRef(null);
  const sTimes = useRef([]);
  const maxCombo = useRef(0);
  const factsDeltaRef = useRef({});
  const saveGateRef = useRef(null);
  const startDateRef = useRef(null);
  const commitSessionRef = useRef(null);

  // Живой статус сети — для пометки «сохранено на устройстве» на экране результатов.
  useEffect(() => {
    const on = () => setOnline(true), off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  // Фанфары при повышении звания — играются автоматически один раз, как только
  // открывается экран результатов с активным showLevelUp. Дальше по кнопке «Класс!»
  // отдельно звучит короткий levelup-акцент (там же снимаем showLevelUp).
  useEffect(() => {
    if (showLevelUp) window.playSound("fanfare");
  }, [showLevelUp]);

  // ── Режим изучения таблиц + воспроизведение MP3 ──
  const [studyTable, setStudyTable] = useState(2);
  const [studyActiveRow, setStudyActiveRow] = useState(-1);
  const [studyPlayingAll, setStudyPlayingAll] = useState(false);
  const currentAudioRef = useRef(null);
  const playAllAbortRef = useRef(false);
  const studyTouchX = useRef(null);
  const audioCacheRef = useRef({});         // key "axb" → Audio (предзагруженный)
  const audioCacheLoadedRef = useRef(false); // предзагрузка делается один раз

  // Предзагрузка всех 90 mp3 при первом заходе на экран изучения.
  // Цель — прогреть HTTP-кэш браузера, чтобы любой последующий new Audio(url)
  // получил данные мгновенно. Сами объекты держим в audioCacheRef, чтобы их
  // не уничтожил GC до окончания загрузки — но для воспроизведения НЕ используем
  // (избегаем play/pause-гонок на shared-элементах + iOS-ограничения на
  // элементы, созданные не в user-gesture).
  useEffect(() => {
    if (sc !== "study") return;
    if (audioCacheLoadedRef.current) return;
    audioCacheLoadedRef.current = true;
    for (let a = 2; a <= 10; a++) {
      for (let b = 1; b <= 10; b++) {
        const key = `${a}x${b}`;
        if (!audioCacheRef.current[key]) {
          try {
            const audio = new Audio(`audio/${key}.mp3`);
            audio.preload = "auto";
            audio.load();
            audioCacheRef.current[key] = audio; // удерживаем ссылку, не для воспроизведения
          } catch(e) {}
        }
      }
    }
  }, [sc]);

  const stopCurrentAudio = () => {
    const a = currentAudioRef.current;
    if (a) {
      // Свежий элемент при следующем воспроизведении — этот просто заглушаем и забываем.
      // currentTime НЕ трогаем: на не до конца загруженном элементе это бросает ошибку.
      try { a.pause(); } catch(e) {}
      try { a.onended = null; a.onerror = null; } catch(e) {}
      currentAudioRef.current = null;
    }
  };

  const playClipFor = (a, b) => {
    try {
      stopCurrentAudio();
      // Каждое воспроизведение — НОВЫЙ Audio: предотвращает AbortError при rapid taps
      // (старый и новый элементы независимы) и unlock-проблему на iOS (элемент создаётся
      // внутри user-gesture). HTTP-кэш браузера уже прогрет, так что new Audio() мгновенен.
      const audio = new Audio(`audio/${a}x${b}.mp3`);
      currentAudioRef.current = audio;
      const p = audio.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
      return audio;
    } catch(e) { return null; }
  };

  const tapStudyRow = (idx, a, b) => {
    if (studyPlayingAll) return;
    setStudyActiveRow(idx);
    setTimeout(() => setStudyActiveRow(prev => prev === idx ? -1 : prev), 600);
    playClipFor(a, b);
  };

  const stopPlayAll = () => {
    playAllAbortRef.current = true;
    stopCurrentAudio();
    setStudyPlayingAll(false);
    setStudyActiveRow(-1);
  };

  const playWholeTable = (a) => {
    if (studyPlayingAll) { stopPlayAll(); return; }
    const rows = tableRows(a);
    setStudyPlayingAll(true);
    playAllAbortRef.current = false;
    let i = 0;
    const playNext = () => {
      if (playAllAbortRef.current) return;
      if (i >= rows.length) { setStudyPlayingAll(false); setStudyActiveRow(-1); return; }
      setStudyActiveRow(i);
      const r = rows[i];
      const audio = playClipFor(r.a, r.b);
      const advance = () => {
        if (playAllAbortRef.current) return;
        i++;
        setTimeout(playNext, 200); // пауза 200 мс между файлами
      };
      if (!audio) { advance(); return; }
      audio.onended = advance;
      audio.onerror = advance;
    };
    playNext();
  };

  const onStudyTouchStart = (e) => { studyTouchX.current = e.touches[0]?.clientX ?? null; };
  const onStudyTouchEnd = (e) => {
    const start = studyTouchX.current; studyTouchX.current = null;
    if (start == null) return;
    const dx = (e.changedTouches[0]?.clientX ?? start) - start;
    if (Math.abs(dx) < 60) return;
    const tables = [...G.NUMS]; // 2..10
    const idx = tables.indexOf(studyTable);
    if (idx < 0) return;
    if (dx < 0 && idx < tables.length - 1) { stopPlayAll(); setStudyTable(tables[idx+1]); }
    else if (dx > 0 && idx > 0) { stopPlayAll(); setStudyTable(tables[idx-1]); }
  };

  // Выход со страницы изучения — остановить воспроизведение
  useEffect(() => {
    if (sc !== "study") {
      playAllAbortRef.current = true;
      stopCurrentAudio();
      if (studyPlayingAll) setStudyPlayingAll(false);
    }
  }, [sc]);

  useEffect(() => {
    (async () => {
      const data = await loadUserData(user.uid);
      let p = data ? {...data.profile} : {...profile};
      if (data) { setFacts(data.facts); setSessions(data.sessions); }
      // streakDays/lastActiveDate здесь больше НЕ обновляем — это делается
      // только в commitSession при завершении полной сессии (см. computeSessionCommit).
      setProf(p);
      // Применяем сохранённые настройки тренировки из свежего профиля,
      // если они отличаются от того, что было получено через prop при маунте.
      const fresh = pickInitialSettings(p);
      setTbs(fresh.tables);
      setSes(fresh.sessionLength);
      if (!p.inviteCode) {
        const c = await ensureInviteCode(user.uid, p);
        if (c) setInviteCode(c);
      } else {
        setInviteCode(p.inviteCode);
      }
    })();
  }, []);

  const R = useRef({});
  R.current = {sc, ph, ans, fact, sCor, sTot, tbs, ses, facts, combo, sXP, prof, sessions, saving};
  const sf = useRef(null), pf = useRef(null);

  pf.current = d => {
    if (R.current.ph !== "q") return;
    if (d === "del") {
      window.playSound("del");
      setAns(a => a.slice(0,-1));
      return;
    }
    if (R.current.ans.length >= 3) return;
    window.playSound("num");
    setAns(a => a + d);
  };

  // Идемпотентный коммит сессии: одной пачкой пишет facts-дельту, сессию и агрегаты профиля.
  // Защищён saveGateRef — повторные вызовы (visibilitychange + beforeunload + последний answer) не задвоят данные.
  commitSessionRef.current = async () => {
    if (!saveGateRef.current || !saveGateRef.current.commit()) return; // уже сохранили
    if ((R.current.sTot || 0) === 0) return;

    setSaving(true);
    const r = R.current;
    const acc = {
      startDate: startDateRef.current,
      startedAt: t0.current,
      endedAt: Date.now(),
      factsDelta: {...factsDeltaRef.current},
      factsFull: r.facts,
      sCor: r.sCor, sTot: r.sTot, sXP: r.sXP,
      maxCombo: maxCombo.current,
      finalCombo: r.combo || 0, // живая серия на момент окончания → станет новым currentStreak
      sTimes: [...sTimes.current],
      tables: r.tbs,
    };
    const result = computeSessionCommit(r.prof, acc);

    // Оптимистичный UI: переключаемся на результаты сразу
    setProf(prev => ({...(prev || {}), ...result.profileUpdates}));
    setSessions(prev => [result.session, ...prev].slice(0, 50));
    setResultData({
      sessionXP: result.sessionXP, completionBonus: result.completionBonus,
      newAch: result.newAchievements, totalXP: result.newTotalXP,
      levelUp: result.leveledUp, newRank: result.newRank,
    });
    setShowLevelUp(result.leveledUp);
    setSc("results");

    // Фоновая запись одним батчем. НЕ ждём (await) завершения: офлайн Firestore
    // применяет запись в локальный кэш IndexedDB мгновенно, но промис не резолвит
    // до восстановления сети. Если бы мы ждали — офлайн навсегда залипали бы в
    // «Сохранение…» и нельзя было начать вторую тренировку. Данные не теряются:
    // очередь записи переживает перезапуск и синхронизируется при появлении сети.
    try {
      const userRef = db.collection("users").doc(user.uid);
      const batch = db.batch();
      for (const [k, v] of Object.entries(acc.factsDelta)) {
        batch.set(userRef.collection("facts").doc(k), v);
      }
      batch.set(userRef.collection("sessions").doc(), result.session);
      batch.update(userRef, result.profileUpdates);
      batch.commit().catch(e => console.error("Не удалось синхронизировать сессию:", e));
    } catch (e) {
      console.error("Ошибка формирования батча сессии:", e);
    }
    setSaving(false);
  };

  // Раньше здесь стоял «сейф-нет» на visibilitychange/pagehide/beforeunload —
  // при любом уходе вкладки в фон commitSession завершал сессию досрочно.
  // На телефоне это стреляло при КАЖДОЙ блокировке экрана: ребёнок ответил на 5/20,
  // экран погас — сессия сохранилась как «5 из 20, 25%», в результатах одна звезда.
  // Оставляем только beforeunload (реальное закрытие вкладки на десктопе). Блокировка
  // экрана и переход в другое приложение больше не завершают тренировку — при
  // разблокировке ребёнок продолжит с текущего вопроса.
  //
  // + qTime.current сбрасывается при возврате в вкладку, если ребёнок в фазе «q»:
  // время, проведённое с погашенным экраном, не должно добавляться к «сколько думал
  // над вопросом». Иначе средний ответ = 3 минуты после первой же блокировки.
  useEffect(() => {
    const flushOnUnload = () => {
      const r = R.current;
      if (r.sc === "train" && (r.sTot || 0) > 0 && saveGateRef.current && !saveGateRef.current.isSaved()) {
        commitSessionRef.current && commitSessionRef.current();
      }
    };
    const onVisibleAgain = () => {
      if (document.hidden) return;
      const r = R.current;
      if (r.sc === "train" && r.ph === "q") qTime.current = Date.now();
    };
    document.addEventListener("visibilitychange", onVisibleAgain);
    window.addEventListener("beforeunload", flushOnUnload);
    return () => {
      document.removeEventListener("visibilitychange", onVisibleAgain);
      window.removeEventListener("beforeunload", flushOnUnload);
    };
  }, []);

  sf.current = () => {
    const {ph, ans, fact, sCor, sTot, tbs, ses, facts, combo, sXP} = R.current;
    if (ph !== "q" || !ans || !fact) return;
    const elapsedMs = qTime.current ? (Date.now() - qTime.current) : 0;
    sTimes.current.push(elapsedMs / 1000);
    const ok = parseInt(ans) === fact.a * fact.b;
    window.playSound(ok ? "eq" : "wrong");
    const o = facts[fact.k] || {c:0, w:0};
    const nf = {c: o.c+(ok?1:0), w: o.w+(ok?0:1), t: Date.now()};
    const updatedFacts = {...facts, [fact.k]: nf};
    setFacts(updatedFacts);
    // Накапливаем дельту в памяти, в Firestore запишем одной пачкой в конце сессии.
    factsDeltaRef.current[fact.k] = nf;

    // Начисление XP и комбо
    const fast = elapsedMs < 3000;
    const newCombo = nextCombo(combo, ok);
    const gained = computeAnswerXP(ok, fast, newCombo);
    setCombo(newCombo);
    maxCombo.current = Math.max(maxCombo.current, newCombo);
    const newSXP = sXP + gained;
    setSXP(newSXP);
    if (gained > 0) setXpPop({ amount: gained, fast, mult: comboMultiplier(newCombo), key: Date.now() });

    const nT = sTot+1, nC = sCor+(ok?1:0);
    setSTot(nT); setSCor(nC); setPh(ok ? "ok" : "err");
    setTimeout(() => {
      if (nT >= ses) {
        commitSessionRef.current && commitSessionRef.current();
      } else {
        setFact(pick(tbs, updatedFacts, fact)); setAns(""); setPh("q");
        qTime.current = Date.now();
      }
    }, ok ? 900 : 1800);
  };

  useEffect(() => {
    if (sc !== "train") return;
    const h = e => {
      if (e.key >= "0" && e.key <= "9") pf.current(e.key);
      else if (e.key === "Backspace") pf.current("del");
      else if (e.key === "Enter") sf.current();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [sc]);

  const startTrain = () => {
    if (!tbs.length) return;
    if (saving) return; // защита от гонки: не стартуем новую сессию, пока пишем предыдущую
    // Запоминаем выбранный режим в профиле, чтобы при следующем заходе подставить как дефолт.
    const lastTables = [...tbs];
    const lastSessionLength = ses;
    if (prof.lastTables?.join(",") !== lastTables.join(",") || prof.lastSessionLength !== lastSessionLength) {
      db.collection("users").doc(user.uid).update({ lastTables, lastSessionLength }).catch(()=>{});
      setProf(prev => ({...(prev || {}), lastTables, lastSessionLength}));
    }
    t0.current = Date.now();
    startDateRef.current = todayStr(); // календарный день фиксируем по моменту старта
    sTimes.current = [];
    // combo (множитель XP) — чисто внутрисессионный счётчик: ВСЕГДА с 0.
    // currentStreak (для бейджей) живёт в profile, не смешивается с combo.
    maxCombo.current = 0;
    factsDeltaRef.current = {};
    saveGateRef.current = makeSaveGate();
    setSCor(0); setSTot(0);
    setSXP(0); setCombo(0); setXpPop(null); setResultData(null); setShowLevelUp(false);
    setFact(pick(tbs, facts));
    setAns(""); setPh("q"); setSc("train");
    qTime.current = Date.now();
  };

  // ── HOME ────────────────────────────────────────────────
  if (sc === "home") {
   const rk = getRank(prof.totalXP);
   return (
    <div style={base}>
      <Header name={profile.name} badge="Ученик" onLogout={onLogout} onSettings={() => setSettingsOpen(true)} />

      {settingsOpen && (
        <div onClick={() => setSettingsOpen(false)}
          style={{position:"fixed", inset:0, background:"rgba(17,17,27,0.55)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:100, padding:"max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom))"}}>
          <div onClick={e => e.stopPropagation()}
            style={{background:"#fff", borderRadius:20, padding:"26px 22px", width:"100%", maxWidth:340, textAlign:"center", boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}}>
            <div style={{fontSize:18, fontWeight:700, color:"#1F2937", marginBottom:20}}>Настройки</div>
            <div style={{fontSize:12, color:"#6B7280", marginBottom:10, textTransform:"uppercase", letterSpacing:1}}>Код для родителя</div>
            <div style={{fontSize:36, fontWeight:800, color:PU, letterSpacing:8, marginBottom:22, fontFamily:"monospace"}}>
              {inviteCode || "…"}
            </div>
            <button onClick={() => setSettingsOpen(false)}
              style={{width:"100%", height:48, borderRadius:12, background:PU, color:"#fff", fontSize:16, fontWeight:700, border:"none", cursor:"pointer"}}>
              Закрыть
            </button>
          </div>
        </div>
      )}

      <button onClick={() => setSc("achievements")}
        style={{...W, marginBottom:18, padding:"14px 16px", borderRadius:16, border:"none", cursor:"pointer", textAlign:"left",
          background:"linear-gradient(135deg, #534AB7 0%, #7C6FE8 100%)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 4px 14px rgba(83,74,183,0.3)"}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <span style={{fontSize:34}}>{rk.cur.emoji}</span>
          <div>
            <div style={{fontSize:11, opacity:0.8}}>Твоё звание</div>
            <div style={{fontSize:18, fontWeight:800}}>{rk.cur.name}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20, fontWeight:800}}>⭐ {prof.totalXP || 0}</div>
          <div style={{fontSize:11, opacity:0.8}}>очков</div>
        </div>
      </button>

      <div style={{...W, marginBottom:22}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Таблицы для тренировки</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:9}}>
          {NUMS.map(n => {
            const s = tbs.includes(n);
            return (
              <button key={n}
                onClick={() => setTbs(p => s ? (p.length > 1 ? p.filter(x => x!==n) : p) : [...p, n])}
                style={{width:54, height:54, borderRadius:13, border: s ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: s ? PL : "#fff", color: s ? PU : "#6B7280", fontWeight: s ? 700 : 400, fontSize:17, cursor:"pointer"}}>
                ×{n}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{...W, marginBottom:22}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Количество примеров</div>
        <div style={{display:"flex", gap:9}}>
          {SES_OPTS.map(n => {
            const sel = ses === n;
            return (
              <button key={n} onClick={() => setSes(n)}
                style={{flex:1, height:48, borderRadius:13, border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: sel ? PL : "#fff", color: sel ? PU : "#6B7280", fontWeight: sel ? 700 : 400, fontSize:16, cursor:"pointer"}}>
                {n}
              </button>
            );
          })}
        </div>
      </div>

      <button onClick={startTrain} disabled={!tbs.length || saving}
        style={{...W, height:56, borderRadius:16, background: (tbs.length && !saving) ? PU : "#9CA3AF", color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor: saving ? "default" : "pointer", marginBottom:10}}>
        {saving ? "Сохранение…" : "Начать тренировку ▶"}
      </button>
      <button onClick={() => setSc("study")}
        style={{...W, height:50, borderRadius:14, background:PL, color:PU, fontSize:16, fontWeight:700, border:`2px solid ${PU}33`, cursor:"pointer", marginBottom:10}}>
        📖 Изучать таблицы
      </button>
      <button onClick={() => setSc("achievements")}
        style={{...W, height:50, borderRadius:14, background:"#fff", color:PU, fontSize:16, fontWeight:700, border:`2px solid ${PL}`, cursor:"pointer"}}>
        🏆 Мои достижения
      </button>

      <OfflineBadge />
    </div>
   );
  }

  // ── ACHIEVEMENTS ───────────────────────────────────────
  if (sc === "achievements") {
    const rk = getRank(prof.totalXP);
    const owned = new Set(migrateLegacy(prof.achievements));
    return (
      <div style={base}>
        <div style={{...W, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
          <h2 style={{fontSize:20, fontWeight:700, margin:0, color:PU}}>Мои достижения</h2>
          <button onClick={() => setSc("home")} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Назад</button>
        </div>

        <div style={{...W, borderRadius:20, padding:"26px 20px", marginBottom:16, textAlign:"center",
          background:"linear-gradient(135deg, #2E2A5E 0%, #534AB7 60%, #7C6FE8 100%)", color:"#fff", boxShadow:"0 6px 20px rgba(83,74,183,0.35)"}}>
          <div style={{fontSize:60, marginBottom:6, animation:"rankPop 0.5s ease-out"}}>{rk.cur.emoji}</div>
          <div style={{fontSize:24, fontWeight:800, marginBottom:4}}>{rk.cur.name}</div>
          <div style={{fontSize:13, opacity:0.85, marginBottom:16}}>
            {rk.next ? `${prof.totalXP || 0} / ${rk.next.min} XP до звания ${rk.next.name}` : "Максимальное звание достигнуто! 🎉"}
          </div>
          <div style={{height:12, background:"rgba(255,255,255,0.25)", borderRadius:7, overflow:"hidden"}}>
            <div style={{height:"100%", width:`${rk.pct}%`, background:"linear-gradient(90deg, #FCD34D, #FBBF24)", borderRadius:7, transition:"width 0.5s"}} />
          </div>
        </div>

        <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:18}}>
          {[
            ["Всего очков", `⭐ ${prof.totalXP || 0}`],
            ["Рекорд за игру", `🚀 ${prof.bestSessionXP || 0}`],
            ["Серия дней", `🔥 ${effectiveStreak(prof.streakDays, prof.lastActiveDate)}`]
          ].map(([l,v]) => (
            <div key={l} style={{background:"#fff", borderRadius:14, padding:"14px 6px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
              <div style={{fontSize:18, fontWeight:800, color:"#1F2937", marginBottom:4}}>{v}</div>
              <div style={{fontSize:10, color:"#6B7280"}}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{...W, fontSize:13, color:"#6B7280", marginBottom:14}}>
          Значки ({owned.size} получено)
        </div>

        {CHAIN_ORDER.map(chain => {
          const badges = visibleChainBadges(chain, owned);
          if (!badges.length) return null;
          return (
            <div key={chain} style={{...W, marginBottom:20}}>
              <div style={{fontSize:14, fontWeight:700, color:"#374151", marginBottom:10}}>{CHAIN_TITLES[chain]}</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:10}}>
                {badges.map(b => (
                  <div key={b.id} style={{flex:"1 1 0", minWidth:96, maxWidth:140, padding:"14px 10px", borderRadius:16, textAlign:"center",
                    background: b.owned ? "#fff" : "#F3F4F6",
                    border: b.owned ? `2px solid ${PL}` : "1.5px dashed #D1D5DB",
                    boxShadow: b.owned ? "0 3px 10px rgba(83,74,183,0.12)" : "none"}}>
                    <div style={{fontSize:30, marginBottom:5, filter: b.owned ? "none" : "grayscale(1)", opacity: b.owned ? 1 : 0.55}}>
                      {b.owned ? b.emoji : "🔒"}
                    </div>
                    <div style={{fontSize:13, fontWeight:700, color: b.owned ? "#1F2937" : "#9CA3AF", marginBottom:2}}>
                      {b.name}
                    </div>
                    <div style={{fontSize:10, color: b.owned ? "#6B7280" : "#A8AEB8"}}>
                      {b.desc}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}

        <button onClick={() => setSc("home")}
          style={{...W, height:52, borderRadius:14, background:PU, color:"#fff", fontSize:16, fontWeight:700, border:"none", cursor:"pointer", marginTop:20}}>
          ← К тренировке
        </button>
      </div>
    );
  }

  // ── STUDY (изучение таблиц с озвучкой) ────────────────
  if (sc === "study") {
    const rows = tableRows(studyTable);
    return (
      <div className="fit-screen study-screen" style={{background:"#F5F3FF"}}>
        <div className="col study-block" style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10}}>
          <h2 style={{fontSize:18, fontWeight:700, color:PU, margin:0}}>📖 Изучение таблиц</h2>
          <button onClick={() => setSc("home")} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Назад</button>
        </div>

        <div className="col study-block" style={{marginBottom:10}}>
          <div style={{display:"flex", flexWrap:"wrap", gap:"clamp(4px, 1.5vw, 7px)", justifyContent:"center"}}>
            {G.NUMS.map(n => {
              const sel = n === studyTable;
              return (
                <button key={n} onClick={() => { if (n !== studyTable) { stopPlayAll(); setStudyTable(n); } }}
                  style={{minWidth:"clamp(32px, 8.5vw, 44px)", height:"clamp(36px, 5dvh, 42px)", padding:"0 6px", borderRadius:10,
                    border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB",
                    background: sel ? PL : "#fff", color: sel ? PU : "#6B7280",
                    fontWeight: sel ? 700 : 500, fontSize:"clamp(13px, 3.5vw, 15px)", cursor:"pointer"}}>
                  ×{n}
                </button>
              );
            })}
          </div>
        </div>

        <div className="col study-block" style={{marginBottom:8}}>
          <button onClick={() => playWholeTable(studyTable)}
            style={{width:"100%", height:"clamp(36px, 5dvh, 42px)", borderRadius:11,
              background: studyPlayingAll ? RD : "#fff", color: studyPlayingAll ? "#fff" : PU,
              fontSize:14, fontWeight:700,
              border: studyPlayingAll ? `1.5px solid ${RD}` : `1.5px solid ${PL}`, cursor:"pointer"}}>
            {studyPlayingAll ? "■ Остановить" : `▶ Озвучить таблицу ×${studyTable}`}
          </button>
        </div>

        <div className="col study-list"
          onTouchStart={onStudyTouchStart} onTouchEnd={onStudyTouchEnd}>
          {rows.map((r, i) => {
            const active = i === studyActiveRow;
            return (
              <div key={i} onClick={() => tapStudyRow(i, r.a, r.b)} role="button" className="study-row"
                style={{background: active ? PL : "transparent",
                  color: active ? PU : "#1F2937", fontWeight: active ? 800 : 700}}>
                <span className="study-lhs">{r.a} × {r.b}</span>
                <span className="study-eq">=</span>
                <span className="study-rhs">{r.p}</span>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── TRAIN ──────────────────────────────────────────────
  if (sc === "train" && fact) {
    const pct = (sTot / ses) * 100;
    const bgMap = {ok:"#F0FDF4", err:"#FFF1F2", q:"#F5F3FF"};
    const numRows = [["1","2","3"],["4","5","6"],["7","8","9"],["del","0","ok"]];
    return (
      <div className="fit-screen" style={{background: bgMap[ph]||bgMap.q, transition:"background 0.3s"}}>
        <div className="col" style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
          <div style={{fontSize:14, fontWeight:700, color:"#1F2937"}}>{profile.name}</div>
          <button onClick={() => setSc("home")} style={{height:32, padding:"0 12px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:13, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Стоп</button>
        </div>

        <div className="col" style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8, minHeight:28}}>
          <span style={{fontSize:16, fontWeight:800, color:PU}}>⭐ {sXP} XP</span>
          {combo >= 5 && (
            <span style={{padding:"4px 12px", borderRadius:20, color:"#fff", fontWeight:800, fontSize:13,
              background: combo >= 10 ? "linear-gradient(135deg,#F97316,#EF4444)" : "linear-gradient(135deg,#FBBF24,#F59E0B)",
              animation:"comboPulse 0.7s ease-in-out infinite"}}>
              🔥 Комбо ×{combo >= 10 ? 3 : 2}
            </span>
          )}
        </div>

        <div className="col" style={{marginBottom:"clamp(10px, 2dvh, 18px)"}}>
          <div style={{display:"flex", justifyContent:"space-between", fontSize:13, color:"#6B7280", marginBottom:6}}>
            <span>Ответов: {sTot} / {ses}</span>
            <span style={{color:GR, fontWeight:700}}>✓ {sCor}</span>
          </div>
          <div style={{height:8, background:"#E5E7EB", borderRadius:5, overflow:"hidden"}}>
            <div style={{height:"100%", width:`${pct}%`, background:PU, borderRadius:5, transition:"width 0.4s"}} />
          </div>
        </div>

        <div className="col train-q-card" style={{position:"relative", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:22, textAlign:"center", boxShadow:"0 4px 16px rgba(0,0,0,0.07)"}}>
          {xpPop && (
            <div key={xpPop.key} onAnimationEnd={() => setXpPop(null)}
              style={{position:"absolute", left:0, right:0, bottom:"60%", textAlign:"center", pointerEvents:"none", zIndex:5,
                fontSize:28, fontWeight:800, color: xpPop.fast ? "#F59E0B" : GR,
                textShadow:"0 2px 6px rgba(0,0,0,0.12)", animation:"xpFloat 0.9s ease-out forwards"}}>
              +{xpPop.amount}{xpPop.mult > 1 ? ` ×${xpPop.mult}` : (xpPop.fast ? " ⚡" : "")}
            </div>
          )}
          <div className="train-q-text" style={{fontWeight:800, color:"#1F2937"}}>
            {fact.a} × {fact.b} = ?
          </div>
          <div className="train-a-box" style={{display:"flex", alignItems:"center", justifyContent:"center", background:"#F9FAFB", borderRadius:14, fontWeight:800,
            color: ph==="ok" ? GR : ph==="err" ? RD : PU,
            border: ph==="ok" ? `2.5px solid ${GR}` : ph==="err" ? `2.5px solid ${RD}` : `2.5px solid ${PU}`,
            transition:"all 0.25s"}}>
            {ph==="ok" && `✓ ${fact.a * fact.b}`}
            {ph==="err" && (
              <span style={{display:"inline-flex", alignItems:"baseline", gap:14}}>
                <span style={{color:RD, textDecoration:"line-through", textDecorationThickness:"3px"}}>{ans}</span>
                <span style={{color:"#9CA3AF", fontWeight:600}}>→</span>
                <span style={{color:GR}}>{fact.a * fact.b}</span>
              </span>
            )}
            {ph==="q" && (ans || <span style={{color:"#D1D5DB", fontSize:"0.8em"}}>—</span>)}
          </div>
        </div>

        <div className="col numpad-grid">
          {numRows.flat().map((d, i) => {
            if (d === "ok") return (
              <button key="ok" onClick={() => sf.current()} className="numpad-btn"
                style={{background: ans ? PU : "#E5E7EB", color: ans ? "#fff" : "#9CA3AF", fontSize:"clamp(24px, 6vw, 30px)", fontWeight:800, cursor: ans ? "pointer" : "default"}}>
                =
              </button>
            );
            if (d === "del") return (
              <button key="del" onClick={() => pf.current("del")} className="numpad-btn"
                style={{background:"#E5E7EB", color:"#4B5563", fontSize:"clamp(20px, 5vw, 22px)", fontWeight:600, cursor:"pointer"}}>
                ←
              </button>
            );
            return (
              <button key={d} onClick={() => pf.current(d)} className="numpad-btn"
                style={{background:"#fff", color:"#1F2937", fontSize:"clamp(24px, 6vw, 30px)", border:"1.5px solid #E5E7EB", cursor:"pointer", boxShadow:"0 2px 6px rgba(0,0,0,0.07)"}}>
                {d}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ── RESULTS ────────────────────────────────────────────
  if (sc === "results") {
    const pct = Math.round((sCor / ses) * 100);
    const st = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
    const msg = pct >= 90 ? "Отлично!" : pct >= 70 ? "Хорошо! Так держать!" : "Продолжай — всё получится!";
    const weak = Object.entries(facts)
      .filter(([k, f]) => { const [a] = k.split("x").map(Number); return tbs.includes(a) && f.c+f.w > 0 && f.c/(f.c+f.w) < 0.5; })
      .sort((a, b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w)).slice(0, 6);
    return (
      <div style={base}>
        {showLevelUp && resultData && resultData.newRank && (
          <div
            style={{position:"fixed", inset:0, zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:"max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom))", overflow:"hidden",
              background:"radial-gradient(circle at 50% 40%, #3B3680 0%, #1B1840 70%, #11101F 100%)"}}>
            {Array.from({length: 16}).map((_, i) => {
              const left = (i * 6.3 + (i % 3) * 4) % 100;
              const delay = (i % 8) * 0.18;
              const dur = 1.6 + (i % 5) * 0.25;
              const emoji = ["⭐","✨","🌟","🎉","💫","🪐"][i % 6];
              return (
                <span key={i} style={{position:"absolute", top:0, left:`${left}%`, fontSize: 16 + (i % 4) * 6,
                  animation:`confettiFall ${dur}s linear ${delay}s infinite`, pointerEvents:"none"}}>{emoji}</span>
              );
            })}
            <div style={{position:"relative", textAlign:"center", color:"#fff", maxWidth:340, width:"100%"}}>
              <div style={{fontSize:15, fontWeight:700, letterSpacing:2, opacity:0.85, marginBottom:10, textTransform:"uppercase"}}>Новый уровень!</div>
              <div style={{fontSize:96, marginBottom:10, animation:"celebPop 0.6s ease-out"}}>{resultData.newRank.emoji}</div>
              <div style={{fontSize:13, opacity:0.85, marginBottom:4}}>Новое звание</div>
              <div style={{fontSize:30, fontWeight:800, marginBottom:28}}>{resultData.newRank.name}!</div>
              <button onClick={() => { window.playSound("levelup"); setShowLevelUp(false); }}
                style={{width:"100%", height:54, borderRadius:16, border:"none", cursor:"pointer", fontSize:18, fontWeight:800,
                  color:"#2E2A5E", background:"linear-gradient(90deg,#FCD34D,#FBBF24)", animation:"glowPulse 1.6s ease-in-out infinite"}}>
                Класс! 🚀
              </button>
            </div>
          </div>
        )}

        <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:22, padding:"34px 22px", marginBottom:14, textAlign:"center"}}>
          <div style={{fontSize:44, color:"#F59E0B", letterSpacing:7, marginBottom:14}}>{"★".repeat(st) + "☆".repeat(3-st)}</div>
          <div style={{fontSize:22, fontWeight:700, color:PU, marginBottom:10}}>{msg}</div>
          <div style={{fontSize:40, fontWeight:800, color:"#1F2937", marginBottom:4}}>{sCor} / {ses}</div>
          <div style={{fontSize:15, color:"#6B7280"}}>правильных ответов ({pct}%)</div>
        </div>

        {resultData && (() => {
          const rk = getRank(resultData.totalXP);
          return (
            <div style={{...W, borderRadius:20, padding:"20px", marginBottom:14, color:"#fff",
              background:"linear-gradient(135deg, #2E2A5E 0%, #534AB7 60%, #7C6FE8 100%)", boxShadow:"0 5px 18px rgba(83,74,183,0.3)"}}>
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: resultData.newAch.length ? 16 : 14}}>
                <span style={{fontSize:15, opacity:0.9}}>Заработано за игру</span>
                <span style={{fontSize:30, fontWeight:800}}>+{resultData.sessionXP} ⭐</span>
              </div>
              {resultData.completionBonus > 0 && (
                <div style={{fontSize:12, opacity:0.85, marginBottom:14, textAlign:"right"}}>включая +{resultData.completionBonus} за полную сессию</div>
              )}

              {resultData.newAch.length > 0 && (
                <div style={{background:"rgba(255,255,255,0.14)", borderRadius:14, padding:"12px 14px", marginBottom:16}}>
                  <div style={{fontSize:12, opacity:0.9, marginBottom:8}}>Новые достижения!</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                    {resultData.newAch.map(id => {
                      const a = BADGE_BY_ID[id];
                      if (!a) return null;
                      return (
                        <span key={id} style={{display:"flex", alignItems:"center", gap:6, padding:"6px 11px", background:"rgba(255,255,255,0.2)", borderRadius:20, fontSize:13, fontWeight:700, animation:"rankPop 0.5s ease-out"}}>
                          <span style={{fontSize:17}}>{a.emoji}</span>{a.name}
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
                <span style={{fontSize:26}}>{rk.cur.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:15, fontWeight:800}}>{rk.cur.name}</div>
                  <div style={{fontSize:11, opacity:0.85}}>
                    {rk.next ? `${resultData.totalXP} / ${rk.next.min} XP до звания ${rk.next.name}` : "Максимальное звание!"}
                  </div>
                </div>
              </div>
              <div style={{height:9, background:"rgba(255,255,255,0.25)", borderRadius:5, overflow:"hidden"}}>
                <div style={{height:"100%", width:`${rk.pct}%`, background:"linear-gradient(90deg,#FCD34D,#FBBF24)", borderRadius:5, transition:"width 0.5s"}} />
              </div>
            </div>
          );
        })()}

        {weak.length > 0 && (
          <div style={{...W, marginBottom:18}}>
            <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Нужно ещё потренировать</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:7}}>
              {weak.map(([k]) => { const [a,b] = k.split("x"); return <span key={k} style={{padding:"6px 13px", background:"#FEF2F2", color:"#991B1B", borderRadius:9, fontSize:15, fontWeight:600}}>{a}×{b}={Number(a)*Number(b)}</span>; })}
            </div>
          </div>
        )}

        {!online && (
          <div style={{...W, fontSize:12, color:"#92400E", textAlign:"center", marginBottom:12, lineHeight:1.4}}>
            📴 Результат сохранён на устройстве — отправится в облако, когда появится интернет
          </div>
        )}

        <button onClick={startTrain} disabled={saving}
          style={{...W, height:56, borderRadius:16, background: saving ? "#9CA3AF" : PU, color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor: saving ? "default" : "pointer", marginBottom:12}}>
          {saving ? "Сохранение…" : "Тренироваться снова ▶"}
        </button>
        <button onClick={() => setSc("home")}
          style={{...W, height:46, borderRadius:13, background:"transparent", color:"#6B7280", fontSize:15, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>
          На главную
        </button>
      </div>
    );
  }

  return null;
}

// ─── STATS VIEW (used by parent & admin) ─────────────────
function StatsView({ facts, sessions, name, onBack, profile, freshness }) {
  const [period, setPeriod] = useState("week"); // day | week | month | all
  const filtered = useMemo(() => filterSessionsByPeriod(sessions || [], period), [sessions, period]);
  const aggr = useMemo(() => aggregateSessions(filtered), [filtered]);
  // Слабые места и тепловая карта — по всем фактам (общий прогресс, не фильтруется по периоду).
  const topBad = Object.entries(facts || {})
    .filter(([,f]) => f.c+f.w > 2)
    .sort((a,b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w))
    .slice(0, 5);

  const showGamify = profile && profile.role === "child";
  const rk = showGamify ? getRank(profile.totalXP) : null;
  const ownedGroups = showGamify ? ownedBadgesByChain(profile.achievements) : [];

  const PERIOD_LABELS = [["day","День"],["week","Неделя"],["month","Месяц"],["all","Всё время"]];

  return (
    <div style={base}>
      <div style={{...W, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
        <h2 style={{fontSize:22, fontWeight:700, margin:0, color:PU}}>{name}</h2>
        <button onClick={onBack} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Назад</button>
      </div>

      {freshness && (() => {
        const b = G.freshnessBanner(freshness.status, freshness.loadedAt, fmtD);
        const tones = {
          ok:   { bg:"#ECFDF5", tx:"#047857", bd:"#A7F3D0" },
          wait: { bg:"#FFFBEB", tx:"#92400E", bd:"#FDE68A" },
          warn: { bg:"#FEF2F2", tx:"#991B1B", bd:"#FECACA" },
        };
        const t = tones[b.tone] || tones.wait;
        return (
          <div style={{...W, marginBottom:12, padding:"7px 12px", borderRadius:10, fontSize:12, textAlign:"center",
            background:t.bg, color:t.tx, border:`1.5px solid ${t.bd}`}}>
            {b.text}
          </div>
        );
      })()}

      {showGamify && (
        <>
          <div style={{...W, borderRadius:18, padding:"18px 16px", marginBottom:12, color:"#fff",
            background:"linear-gradient(135deg, #2E2A5E 0%, #534AB7 60%, #7C6FE8 100%)", boxShadow:"0 4px 14px rgba(83,74,183,0.25)"}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12}}>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <span style={{fontSize:32}}>{rk.cur.emoji}</span>
                <div>
                  <div style={{fontSize:11, opacity:0.8}}>Звание</div>
                  <div style={{fontSize:17, fontWeight:800}}>{rk.cur.name}</div>
                </div>
              </div>
              <div style={{textAlign:"right"}}>

                  <div style={{fontSize:11, color:"#6B7280", marginBottom:7, textTransform:"uppercase", letterSpacing:0.5}}>{grp.title}</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:8}}>

                        <span style={{fontSize:16}}>{b.emoji}</span>{b.name}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </>

      <div style={{...W, display:"flex", gap:6, marginBottom:10, background:"#fff", padding:4, borderRadius:12, border:"1.5px solid #E5E7EB"}}>
        {PERIOD_LABELS.map(([v, l]) => {

          return (

                color: sel ? "#fff" : "#6B7280", fontSize:13, fontWeight: sel ? 700 : 500, cursor:"pointer"}}>
              {l}

        {[["Сессий", aggr.count], ["Вопросов", aggr.totalQ], ["Точность", `${aggr.accuracy}%`]].map(([l,v]) => (
          <div key={l} style={{background:"#fff", borderRadius:12, padding:"14px 8px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
            <div style={{fontSize:11, color:"#6B7280", marginBottom:5}}>{l}</div>
            <div style={{fontSize:24, fontWeight:800, color:"#1F2937"}}>{v}</div>
          </div>
        ))}

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 12px", marginBottom:16}}>
        <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:"#374151"}}>Тепловая карта усвоения</div>
        <div style={{display:"flex", gap:2, marginBottom:4}}>
          <div style={{width:22}} />
          {NUMS.map(b => <div key={b} style={{flex:1, textAlign:"center", fontSize:9, color:"#9CA3AF"}}>{b}</div>)}

            {NUMS.map(b => {
              const f = (facts || {})[`${a}x${b}`];
              const {bg, tx} = hc(f);
              const p = f && f.c+f.w > 0 ? Math.round(f.c/(f.c+f.w)*100) : null;
              return (
                <div key={b} title={`${a}×${b}=${a*b}: ${p !== null ? p+"%" : "—"}`}
                  style={{flex:1, height:28, borderRadius:4, background:bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, color:tx, fontWeight:700}}>
                  {p !== null ? `${p}%` : ""}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {topBad.length > 0 && (
        <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 14px", marginBottom:16}}>
          <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:"#374151"}}>Слабые места</div>
          {topBad.map(([k, f]) => {
            const [a, b] = k.split("x");
            const p = Math.round(f.c/(f.c+f.w)*100);
            return (
              <div key={k} style={{display:"flex", alignItems:"center", gap:12, marginBottom:8}}>

                </div>
                <span style={{fontSize:13, color:"#6B7280", minWidth:36, textAlign:"right"}}>{p}%</span>

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 14px"}}>

        </div>
        {filtered.length > 0 ? (
          <div style={{maxHeight:"50vh", overflowY:"auto", WebkitOverflowScrolling:"touch"}}>
            {filtered.map((s, i) => (
              <div key={s.id || i} style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 2px", borderBottom: i < filtered.length-1 ? "1px solid #F3F4F6" : "none"}}>

                  <div style={{fontSize:13, color:"#1F2937"}}>{fmtD(s.date)}</div>
                  <div style={{fontSize:11, color:"#9CA3AF"}}>×{(s.tables||[]).join(", ×")} · {fmtS(s.dur||0)}</div>
                  {s.avgTime != null && <div style={{fontSize:11, color:"#9CA3AF"}}>avg {s.avgTime}с · min {s.minTime}с · max {s.maxTime}с</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:17, fontWeight:700, color: s.correct/s.total>=0.8 ? GR : s.correct/s.total>=0.6 ? "#D97706" : RD}}>{Math.round(s.correct/s.total*100)}%</div>
                  <div style={{fontSize:11, color:"#9CA3AF"}}>{s.correct}/{s.total}</div>
                </div>

            За этот период сессий не было
