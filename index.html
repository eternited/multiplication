<script>
// ─── AUDIO ────────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
const getCtx = () => { if (!_ctx) _ctx = new AudioCtx(); return _ctx; };

const playSound = (type) => {
  try {
    const ctx = getCtx();
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.connect(g);

    if (type === "num") {
      o.type = "sine";
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.07);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.09);
    } else if (type === "del") {
      o.type = "sine";
      o.frequency.setValueAtTime(320, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.12);
    } else if (type === "eq") {
      [0, 0.1].forEach((delay, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "triangle";
        o2.frequency.setValueAtTime(i === 0 ? 660 : 880, ctx.currentTime + delay);
        g2.gain.setValueAtTime(0.20, ctx.currentTime + delay);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        o2.start(ctx.currentTime + delay);
        o2.stop(ctx.currentTime + delay + 0.15);
      });
      return;
    } else if (type === "wrong") {
      o.type = "sawtooth";
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.35);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.38);
      return;
    }
  } catch(e) {}
};

window.playSound = playSound;
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const auth = window._auth;
const db = window._db;
const ADMIN_NAME = window._ADMIN_NAME;
const ADMIN_PASS = window._ADMIN_PASS;

const SES_OPTS = [5, 10, 15, 20];
const NUMS = [2,3,4,5,6,7,8,9,10];
const PU = "#534AB7", PL = "#EEEDFE", GR = "#16A34A", RD = "#DC2626";

// ─── HELPERS ─────────────────────────────────────────────
const nameToEmail = (n) => n.trim().toLowerCase().replace(/\s+/g, "_") + "@multiplication.app";
const gen6 = () => String(Math.floor(100000 + Math.random() * 900000));

const wt = f => !f || f.c+f.w===0 ? 0.65 : Math.max(0.1, 1 - f.c/(f.c+f.w+0.5));
const pick = (tbs, facts) => {
  const pool = tbs.flatMap(a => NUMS.map(b => ({a, b, k:`${a}x${b}`})));
  const ws = pool.map(p => wt(facts[p.k]));
  const sum = ws.reduce((s,w) => s+w, 0);
  let r = Math.random() * sum;
  for (let i=0; i<pool.length; i++) { r -= ws[i]; if (r<=0) return pool[i]; }
  return pool[pool.length-1];
};

const hc = f => {
  if (!f || f.c+f.w===0) return {bg:"#E5E7EB", tx:"#9CA3AF"};
  const a = f.c/(f.c+f.w);
  if (a >= 0.85) return {bg:"#4ADE80", tx:"#166534"};
  if (a >= 0.65) return {bg:"#86EFAC", tx:"#14532D"};
  if (a >= 0.40) return {bg:"#FCA5A5", tx:"#7F1D1D"};
  return {bg:"#F87171", tx:"#7F1D1D"};
};

const fmtD = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"});
const fmtDay = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short"});
const fmtS = s => s < 60 ? `${s}с` : `${Math.floor(s/60)}м ${s%60}с`;

// ─── GAMIFICATION ────────────────────────────────────────
const RANKS = [
  {min: 0,     emoji: "🌱", name: "Новичок"},
  {min: 500,   emoji: "🛸", name: "Пилот"},
  {min: 1500,  emoji: "⭐", name: "Штурман"},
  {min: 3500,  emoji: "🚀", name: "Капитан"},
  {min: 7000,  emoji: "🌟", name: "Командир"},
  {min: 15000, emoji: "🪐", name: "Адмирал галактики"},
];

const getRank = (xp) => {
  xp = xp || 0;
  let cur = RANKS[0], next = null;
  for (let i = 0; i < RANKS.length; i++) {
    if (xp >= RANKS[i].min) { cur = RANKS[i]; next = RANKS[i+1] || null; }
  }
  const into = xp - cur.min;
  const span = next ? next.min - cur.min : 1;
  const pct = next ? Math.min(100, Math.round(into / span * 100)) : 100;
  return { cur, next, into, span, pct };
};

const ACHIEVEMENTS = [
  {id: "first_session",   emoji: "🔥", name: "Первый полёт",     desc: "Завершил первую сессию"},
  {id: "combo10",         emoji: "⚡", name: "Серия из 10",      desc: "10 правильных подряд"},
  {id: "correct100",      emoji: "💯", name: "Сотня",            desc: "100 правильных ответов"},
  {id: "master_table",    emoji: "🎯", name: "Мастер таблицы",   desc: "Таблица освоена на 90%+"},
  {id: "streak3",         emoji: "📅", name: "Три дня подряд",   desc: "Заходил 3 дня подряд"},
  {id: "perfect_session", emoji: "🏆", name: "Идеальная сессия", desc: "20 из 20 правильных"},
];
const ACH_BY_ID = Object.fromEntries(ACHIEVEMENTS.map(a => [a.id, a]));

const todayStr = () => new Date().toISOString().slice(0, 10);
const computeStreak = (lastActiveDate, prevStreak) => {
  const today = todayStr();
  if (lastActiveDate === today) return prevStreak || 1;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (lastActiveDate === yesterday) return (prevStreak || 0) + 1;
  return 1;
};

// Любая таблица освоена на 90%+ (все 9 примеров пройдены, общая точность ≥ 90%)
const anyTableMastered = (facts) => {
  for (const a of NUMS) {
    let c = 0, w = 0, attempted = 0;
    for (const b of NUMS) {
      const f = facts[`${a}x${b}`];
      if (f && f.c + f.w > 0) { c += f.c; w += f.w; attempted++; }
    }
    if (attempted === NUMS.length && c + w > 0 && c / (c + w) >= 0.9) return true;
  }
  return false;
};

const checkAchievements = (existing, ctx) => {
  const have = new Set(existing || []);
  const added = [];
  const give = id => { if (!have.has(id)) { have.add(id); added.push(id); } };
  if (ctx.totalSessions >= 1) give("first_session");
  if (ctx.maxCombo >= 10) give("combo10");
  if (ctx.totalCorrect >= 100) give("correct100");
  if (anyTableMastered(ctx.facts)) give("master_table");
  if (ctx.streakDays >= 3) give("streak3");
  if (ctx.nT === 20 && ctx.nC === 20) give("perfect_session");
  return { all: [...have], added };
};

// ─── FIRESTORE I/O ───────────────────────────────────────
async function loadUserData(uid) {
  const userDoc = await db.collection("users").doc(uid).get();
  if (!userDoc.exists) return null;
  const profile = userDoc.data();
  const factsSnap = await db.collection("users").doc(uid).collection("facts").get();
  const facts = {};
  factsSnap.forEach(d => facts[d.id] = d.data());
  const sessSnap = await db.collection("users").doc(uid).collection("sessions").orderBy("date", "desc").limit(50).get();
  const sessions = [];
  sessSnap.forEach(d => sessions.push({id: d.id, ...d.data()}));
  return { uid, profile, facts, sessions };
}

async function ensureInviteCode(uid, profile) {
  if (profile.inviteCode) return profile.inviteCode;
  for (let attempt = 0; attempt < 6; attempt++) {
    const code = gen6();
    const ref = db.collection("inviteCodes").doc(code);
    try {
      const exists = await ref.get();
      if (exists.exists) continue;
      await ref.set({ childUid: uid, childName: profile.name, createdAt: Date.now(), used: false });
      await db.collection("users").doc(uid).update({ inviteCode: code });
      return code;
    } catch(e) {}
  }
  return null;
}

async function linkParentToChildByCode(parentUid, code) {
  const ref = db.collection("inviteCodes").doc(code);
  const snap = await ref.get();
  if (!snap.exists) return { ok: false, error: "Код не найден" };
  const { childUid, childName } = snap.data();
  if (!childUid || !childName) return { ok: false, error: "Код устарел, попроси у ребёнка новый" };
  await db.collection("parentLinks").doc(parentUid).collection("children").doc(childUid).set({
    name: childName, linkedAt: Date.now()
  });
  await ref.update({ used: true, lastLinkedAt: Date.now() });
  return { ok: true, name: childName };
}

// ─── APP ─────────────────────────────────────────────────
const W = {width:"100%", maxWidth:420, boxSizing:"border-box"};
const base = {minHeight:"100vh", background:"#F5F3FF", display:"flex", flexDirection:"column", alignItems:"center", padding:"24px 16px 48px"};

function App() {
  const [authState, setAuthState] = useState("loading");
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (!u) { setAuthState("guest"); setUser(null); setProfile(null); return; }
      try {
        const doc = await db.collection("users").doc(u.uid).get();
        if (!doc.exists) { await auth.signOut(); setAuthState("guest"); return; }
        const p = doc.data();
        setUser(u); setProfile(p);
        setAuthState(p.role || "child");
      } catch(e) {
        console.error(e); setAuthState("guest");
      }
    });
    return () => unsub();
  }, []);

  const logout = () => auth.signOut();

  if (authState === "loading") return (
    <div style={{...base, justifyContent:"center"}}>
      <div style={{fontSize:18, color:"#6B7280"}}>Загрузка…</div>
    </div>
  );

  if (authState === "guest") return <AuthScreen />;
  if (authState === "child") return <ChildApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "parent") return <ParentApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "admin") return <AdminApp user={user} profile={profile} onLogout={logout} />;
  return null;
}

// ─── AUTH SCREEN ─────────────────────────────────────────
function AuthScreen() {
  const [tab, setTab] = useState("login");
  const [name, setName] = useState("");
  const [pass, setPass] = useState("");
  const [role, setRole] = useState("child");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr("");
    const n = name.trim();
    if (!n) { setErr("Введите имя"); return; }
    if (pass.length < 6) { setErr("Пароль минимум 6 символов"); return; }
    setBusy(true);
    try {
      const isAdminLogin = n.toLowerCase() === ADMIN_NAME && pass === ADMIN_PASS;
      const email = nameToEmail(n);
      if (tab === "login") {
        if (isAdminLogin) {
          try { await auth.signInWithEmailAndPassword(email, pass); }
          catch(e) {
            if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/invalid-login-credentials") {
              const cred = await auth.createUserWithEmailAndPassword(email, pass);
              await db.collection("users").doc(cred.user.uid).set({
                name: n, role: "admin", createdAt: Date.now()
              });
            } else throw e;
          }
        } else {
          await auth.signInWithEmailAndPassword(email, pass);
        }
      } else {
        if (n.toLowerCase() === ADMIN_NAME) { setErr("Имя 'admin' зарезервировано"); setBusy(false); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const profile = { name: n, role, createdAt: Date.now() };
        await db.collection("users").doc(cred.user.uid).set(profile);
        if (role === "child") {
          await ensureInviteCode(cred.user.uid, profile);
        }
      }
    } catch(e) {
      const map = {
        "auth/email-already-in-use": "Такое имя уже занято",
        "auth/wrong-password": "Неверный пароль",
        "auth/user-not-found": "Пользователь не найден",
        "auth/invalid-credential": "Неверное имя или пароль",
        "auth/invalid-login-credentials": "Неверное имя или пароль",
        "auth/weak-password": "Слабый пароль",
        "auth/invalid-email": "Недопустимое имя"
      };
      setErr(map[e.code] || e.message || "Ошибка");
    }
    setBusy(false);
  };

  return (
    <div style={base}>
      <div style={{fontSize:52, marginBottom:4, textAlign:"center"}}>✖️</div>
      <h1 style={{fontSize:26, fontWeight:700, color:PU, margin:"0 0 2px", textAlign:"center"}}>Таблица умножения</h1>
      <p style={{fontSize:14, color:"#6B7280", margin:"0 0 24px"}}>Умная тренировка</p>

      <div style={{...W, display:"flex", marginBottom:18, background:"#fff", borderRadius:12, padding:4, border:"1.5px solid #E5E7EB"}}>
        {["login","register"].map(t => (
          <button key={t} onClick={() => { setTab(t); setErr(""); }}
            style={{flex:1, height:42, borderRadius:9, border:"none", background: tab===t ? PU : "transparent", color: tab===t ? "#fff" : "#6B7280", fontSize:15, fontWeight:600, cursor:"pointer"}}>
            {t === "login" ? "Войти" : "Создать аккаунт"}
          </button>
        ))}
      </div>

      <div style={{...W, marginBottom:14}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Имя</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Вася"
          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      <div style={{...W, marginBottom: tab === "register" ? 14 : 18}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Пароль</div>
        <input value={pass} onChange={e => setPass(e.target.value)} type="password" placeholder="Минимум 6 символов"
          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      {tab === "register" && (
        <div style={{...W, marginBottom:18}}>
          <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Кто ты?</div>
          <div style={{display:"flex", gap:9}}>
            {[["child","Я ребёнок"], ["parent","Я родитель"]].map(([v,l]) => {
              const sel = role === v;
              return (
                <button key={v} onClick={() => setRole(v)}
                  style={{flex:1, height:48, borderRadius:13, border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: sel ? PL : "#fff", color: sel ? PU : "#6B7280", fontWeight: sel ? 700 : 500, fontSize:15, cursor:"pointer"}}>
                  {l}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {err && <div style={{...W, color:RD, fontSize:14, marginBottom:12, textAlign:"center"}}>{err}</div>}

      <button onClick={submit} disabled={busy}
        style={{...W, height:56, borderRadius:16, background: busy ? "#9CA3AF" : PU, color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor: busy ? "default" : "pointer"}}>
        {busy ? "..." : (tab === "login" ? "Войти" : "Создать аккаунт")}
      </button>
    </div>
  );
}

  const [sessions, setSessions] = useState([]);
  const [inviteCode, setInviteCode] = useState(profile.inviteCode || "");
  const [tbs, setTbs] = useState([2,3,4,5]);
  const [ses, setSes] = useState(20);
  const [fact, setFact] = useState(null);
  const [ans, setAns] = useState("");
  const [ph, setPh] = useState("q");
  const [sCor, setSCor] = useState(0);
  const [sTot, setSTot] = useState(0);
  const [sXP, setSXP] = useState(0);
  const [combo, setCombo] = useState(0);
  const [xpPop, setXpPop] = useState(null);
  const [resultData, setResultData] = useState(null);
  const t0 = useRef(null);
  const qTime = useRef(null);
  const sTimes = useRef([]);
  const maxCombo = useRef(0);

  useEffect(() => {
    (async () => {
      const data = await loadUserData(user.uid);
      let p = data ? {...data.profile} : {...profile};
      if (data) { setFacts(data.facts); setSessions(data.sessions); }
      // Обновляем серию дней при заходе
      const today = todayStr();
      if (p.lastActiveDate !== today) {
        const newStreak = computeStreak(p.lastActiveDate, p.streakDays);
        p.streakDays = newStreak;
        p.lastActiveDate = today;
        db.collection("users").doc(user.uid).update({ streakDays: newStreak, lastActiveDate: today }).catch(()=>{});
      }
      setProf(p);
      if (!p.inviteCode) {
        const c = await ensureInviteCode(user.uid, p);
        if (c) setInviteCode(c);
      } else {
        setInviteCode(p.inviteCode);
      }
    })();
  }, []);

  const R = useRef({});
  R.current = {ph, ans, fact, sCor, sTot, tbs, ses, facts, combo, sXP, prof, sessions};
  const sf = useRef(null), pf = useRef(null);

  pf.current = d => {
    if (R.current.ph !== "q") return;
    if (d === "del") {
      window.playSound("del");
      setAns(a => a.slice(0,-1));
      return;
    }
    if (R.current.ans.length >= 3) return;
    window.playSound("num");
    setAns(a => a + d);
  };

  const finishSession = (nC, nT, sessionXPBeforeBonus, finalFacts) => {
    const times = sTimes.current;
    const avgTime = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length*10)/10 : null;
    const minTime = times.length ? Math.round(Math.min(...times)*10)/10 : null;
    const maxTime = times.length ? Math.round(Math.max(...times)*10)/10 : null;
    const completionBonus = nT === 20 ? 50 : 0;
    const sessionXP = sessionXPBeforeBonus + completionBonus;
    setSXP(sessionXP);

    const s = {date: Date.now(), dur: Math.round((Date.now()-t0.current)/1000), correct: nC, total: nT, tables: [...R.current.tbs], avgTime, minTime, maxTime, xp: sessionXP};
    db.collection("users").doc(user.uid).collection("sessions").add(s).catch(()=>{});

    const p = R.current.prof || {};
    const newTotalXP = (p.totalXP || 0) + sessionXP;
    const newTotalCorrect = (p.totalCorrect || 0) + nC;
    const newBest = Math.max(p.bestSessionXP || 0, sessionXP);
    const totalSessions = (R.current.sessions || []).length + 1;
    const { all, added } = checkAchievements(p.achievements, {
      totalSessions, maxCombo: maxCombo.current, totalCorrect: newTotalCorrect,
      facts: finalFacts, streakDays: p.streakDays || 1, nC, nT
    });

    const updates = { totalXP: newTotalXP, bestSessionXP: newBest, totalCorrect: newTotalCorrect, achievements: all };
    db.collection("users").doc(user.uid).update(updates).catch(()=>{});

    setProf({...p, ...updates});
    setSessions(prev => [s, ...prev].slice(0, 50));
    setResultData({ sessionXP, completionBonus, newAch: added, totalXP: newTotalXP });
    setSc("results");
  };

  sf.current = () => {
    const {ph, ans, fact, sCor, sTot, tbs, ses, facts, combo, sXP} = R.current;
    if (ph !== "q" || !ans || !fact) return;
    const elapsedMs = qTime.current ? (Date.now() - qTime.current) : 0;
    sTimes.current.push(elapsedMs / 1000);
    const ok = parseInt(ans) === fact.a * fact.b;
    window.playSound(ok ? "eq" : "wrong");
    const o = facts[fact.k] || {c:0, w:0};
    const nf = {c: o.c+(ok?1:0), w: o.w+(ok?0:1), t: Date.now()};
    const updatedFacts = {...facts, [fact.k]: nf};
    setFacts(updatedFacts);
    db.collection("users").doc(user.uid).collection("facts").doc(fact.k).set(nf).catch(()=>{});

    // Начисление XP и комбо
    let gained = 0, newCombo = combo;
    const fast = elapsedMs < 3000;
    if (ok) {
      newCombo = combo + 1;
      const base = fast ? 15 : 10;
      const mult = newCombo >= 10 ? 3 : newCombo >= 5 ? 2 : 1;
      gained = base * mult;
    } else {
      newCombo = 0;
    }
    setCombo(newCombo);
    maxCombo.current = Math.max(maxCombo.current, newCombo);
    const newSXP = sXP + gained;
    setSXP(newSXP);
    if (gained > 0) setXpPop({ amount: gained, fast, mult: newCombo >= 10 ? 3 : newCombo >= 5 ? 2 : 1, key: Date.now() });

    const nT = sTot+1, nC = sCor+(ok?1:0);
    setSTot(nT); setSCor(nC); setPh(ok ? "ok" : "err");
    setTimeout(() => {
      if (nT >= ses) {
        finishSession(nC, nT, newSXP, updatedFacts);
      } else {
        setFact(pick(tbs, updatedFacts)); setAns(""); setPh("q");
        qTime.current = Date.now();
      }
    }, ok ? 900 : 1800);
  };

  useEffect(() => {
    if (sc !== "train") return;
    const h = e => {
      if (e.key >= "0" && e.key <= "9") pf.current(e.key);
      else if (e.key === "Backspace") pf.current("del");
      else if (e.key === "Enter") sf.current();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [sc]);

  const startTrain = () => {
    if (!tbs.length) return;
    t0.current = Date.now();
    sTimes.current = [];
    maxCombo.current = 0;
    setSCor(0); setSTot(0);
    setSXP(0); setCombo(0); setXpPop(null); setResultData(null);
    setFact(pick(tbs, facts));
    setAns(""); setPh("q"); setSc("train");
    qTime.current = Date.now();
  };

  // ── HOME ────────────────────────────────────────────────
  if (sc === "home") {
   const rk = getRank(prof.totalXP);
   return (
    <div style={base}>
      <Header name={profile.name} badge="Ученик" onLogout={onLogout} />

      <button onClick={() => setSc("achievements")}
        style={{...W, marginBottom:18, padding:"14px 16px", borderRadius:16, border:"none", cursor:"pointer", textAlign:"left",
          background:"linear-gradient(135deg, #534AB7 0%, #7C6FE8 100%)", color:"#fff", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 4px 14px rgba(83,74,183,0.3)"}}>
        <div style={{display:"flex", alignItems:"center", gap:12}}>
          <span style={{fontSize:34}}>{rk.cur.emoji}</span>
          <div>
            <div style={{fontSize:11, opacity:0.8}}>Твоё звание</div>
            <div style={{fontSize:18, fontWeight:800}}>{rk.cur.name}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:20, fontWeight:800}}>⭐ {prof.totalXP || 0}</div>
          <div style={{fontSize:11, opacity:0.8}}>очков</div>
        </div>
      </button>

      <div style={{...W, marginBottom:22}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Таблицы для тренировки</div>
        <div style={{display:"flex", flexWrap:"wrap", gap:9}}>
          {NUMS.map(n => {
            const s = tbs.includes(n);
            return (
              <button key={n}
                onClick={() => setTbs(p => s ? (p.length > 1 ? p.filter(x => x!==n) : p) : [...p, n])}
                style={{width:54, height:54, borderRadius:13, border: s ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: s ? PL : "#fff", color: s ? PU : "#6B7280", fontWeight: s ? 700 : 400, fontSize:17, cursor:"pointer"}}>
                ×{n}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{...W, marginBottom:22}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Количество примеров</div>
        <div style={{display:"flex", gap:9}}>
          {SES_OPTS.map(n => {
            const sel = ses === n;
            return (
              <button key={n} onClick={() => setSes(n)}
                style={{flex:1, height:48, borderRadius:13, border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: sel ? PL : "#fff", color: sel ? PU : "#6B7280", fontWeight: sel ? 700 : 400, fontSize:16, cursor:"pointer"}}>
                {n}
              </button>
            );
          })}
        </div>
      </div>

      <button onClick={startTrain}
        style={{...W, height:56, borderRadius:16, background: tbs.length ? PU : "#9CA3AF", color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor:"pointer", marginBottom:12}}>
        Начать тренировку ▶
      </button>
      <button onClick={() => setSc("achievements")}
        style={{...W, height:50, borderRadius:14, background:"#fff", color:PU, fontSize:16, fontWeight:700, border:`2px solid ${PL}`, cursor:"pointer"}}>
        🏆 Мои достижения
      </button>
    </div>
   );
  }

  // ── ACHIEVEMENTS ───────────────────────────────────────
  if (sc === "achievements") {
    const rk = getRank(prof.totalXP);
    const owned = new Set(prof.achievements || []);
    return (
      <div style={base}>
        <div style={{...W, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
          <h2 style={{fontSize:20, fontWeight:700, margin:0, color:PU}}>Мои достижения</h2>
          <button onClick={() => setSc("home")} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Назад</button>
        </div>

        <div style={{...W, borderRadius:20, padding:"26px 20px", marginBottom:16, textAlign:"center",
          background:"linear-gradient(135deg, #2E2A5E 0%, #534AB7 60%, #7C6FE8 100%)", color:"#fff", boxShadow:"0 6px 20px rgba(83,74,183,0.35)"}}>
          <div style={{fontSize:60, marginBottom:6, animation:"rankPop 0.5s ease-out"}}>{rk.cur.emoji}</div>
          <div style={{fontSize:24, fontWeight:800, marginBottom:4}}>{rk.cur.name}</div>
          <div style={{fontSize:13, opacity:0.85, marginBottom:16}}>
            {rk.next ? `${prof.totalXP || 0} / ${rk.next.min} XP до звания ${rk.next.name}` : "Максимальное звание достигнуто! 🎉"}
          </div>
          <div style={{height:12, background:"rgba(255,255,255,0.25)", borderRadius:7, overflow:"hidden"}}>
            <div style={{height:"100%", width:`${rk.pct}%`, background:"linear-gradient(90deg, #FCD34D, #FBBF24)", borderRadius:7, transition:"width 0.5s"}} />
          </div>
        </div>

        <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:18}}>
          {[
            ["Всего очков", `⭐ ${prof.totalXP || 0}`],
            ["Рекорд за игру", `🚀 ${prof.bestSessionXP || 0}`],
            ["Серия дней", `🔥 ${prof.streakDays || 0}`]
          ].map(([l,v]) => (
            <div key={l} style={{background:"#fff", borderRadius:14, padding:"14px 6px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
              <div style={{fontSize:18, fontWeight:800, color:"#1F2937", marginBottom:4}}>{v}</div>
              <div style={{fontSize:10, color:"#6B7280"}}>{l}</div>
            </div>
          ))}
        </div>

        <div style={{...W, fontSize:13, color:"#6B7280", marginBottom:10}}>
          Значки ({owned.size} / {ACHIEVEMENTS.length})
        </div>
        <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
          {ACHIEVEMENTS.map(a => {
            const got = owned.has(a.id);
            return (
              <div key={a.id} style={{padding:"16px 12px", borderRadius:16, textAlign:"center",
                background: got ? "#fff" : "#F3F4F6",
                border: got ? `2px solid ${PL}` : "1.5px solid #E5E7EB",
                boxShadow: got ? "0 3px 10px rgba(83,74,183,0.12)" : "none",
                opacity: got ? 1 : 0.85}}>
                <div style={{fontSize:34, marginBottom:6, filter: got ? "none" : "grayscale(1)"}}>
                  {got ? a.emoji : "🔒"}
                </div>
                <div style={{fontSize:14, fontWeight:700, color: got ? "#1F2937" : "#9CA3AF", marginBottom:3}}>
                  {got ? a.name : "Закрыто"}
                </div>
                <div style={{fontSize:11, color: got ? "#6B7280" : "#BCC0C7"}}>
                  {a.desc}
                </div>
              </div>
            );
          })}
        </div>

        <button onClick={() => setSc("home")}
          style={{...W, height:52, borderRadius:14, background:PU, color:"#fff", fontSize:16, fontWeight:700, border:"none", cursor:"pointer", marginTop:20}}>
          ← К тренировке
        </button>
      </div>
    );
  }

  // ── TRAIN ──────────────────────────────────────────────
  if (sc === "train" && fact) {
    const pct = (sTot / ses) * 100;
    const bgMap = {ok:"#F0FDF4", err:"#FFF1F2", q:"#F5F3FF"};
    const numRows = [["1","2","3"],["4","5","6"],["7","8","9"],["del","0","ok"]];
    return (
      <div style={{...base, background: bgMap[ph]||bgMap.q, transition:"background 0.3s"}}>
        <div style={{...W, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
          <div style={{fontSize:14, fontWeight:700, color:"#1F2937"}}>{profile.name}</div>
          <button onClick={() => setSc("home")} style={{height:32, padding:"0 12px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:13, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Стоп</button>
        </div>

        <div style={{...W, display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10, minHeight:30}}>
          <span style={{fontSize:16, fontWeight:800, color:PU}}>⭐ {sXP} XP</span>
          {combo >= 5 && (
            <span style={{padding:"4px 12px", borderRadius:20, color:"#fff", fontWeight:800, fontSize:13,
              background: combo >= 10 ? "linear-gradient(135deg,#F97316,#EF4444)" : "linear-gradient(135deg,#FBBF24,#F59E0B)",
              animation:"comboPulse 0.7s ease-in-out infinite"}}>
              🔥 Комбо ×{combo >= 10 ? 3 : 2}
            </span>
          )}
        </div>

        <div style={{...W, marginBottom:22}}>
          <div style={{display:"flex", justifyContent:"space-between", fontSize:14, color:"#6B7280", marginBottom:7}}>
            <span>Ответов: {sTot} / {ses}</span>
            <span style={{color:GR, fontWeight:700}}>✓ {sCor}</span>
          </div>
          <div style={{height:9, background:"#E5E7EB", borderRadius:5, overflow:"hidden"}}>
            <div style={{height:"100%", width:`${pct}%`, background:PU, borderRadius:5, transition:"width 0.4s"}} />
          </div>
        </div>

        <div style={{...W, position:"relative", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:22, padding:"34px 22px 26px", marginBottom:22, textAlign:"center", boxShadow:"0 4px 16px rgba(0,0,0,0.07)"}}>
          {xpPop && (
            <div key={xpPop.key} onAnimationEnd={() => setXpPop(null)}
              style={{position:"absolute", left:0, right:0, bottom:78, textAlign:"center", pointerEvents:"none", zIndex:5,
                fontSize:28, fontWeight:800, color: xpPop.fast ? "#F59E0B" : GR,
                textShadow:"0 2px 6px rgba(0,0,0,0.12)", animation:"xpFloat 0.9s ease-out forwards"}}>
              +{xpPop.amount}{xpPop.mult > 1 ? ` ×${xpPop.mult}` : (xpPop.fast ? " ⚡" : "")}
            </div>
          )}
          <div style={{fontSize:50, fontWeight:800, color:"#1F2937", letterSpacing:3, marginBottom:22}}>
            {fact.a} × {fact.b} = ?
          </div>
          <div style={{height:68, display:"flex", alignItems:"center", justifyContent:"center", background:"#F9FAFB", borderRadius:14, fontSize:38, fontWeight:800,
            color: ph==="ok" ? GR : ph==="err" ? RD : PU,
            border: ph==="ok" ? `2.5px solid ${GR}` : ph==="err" ? `2.5px solid ${RD}` : `2.5px solid ${PU}`,
            transition:"all 0.25s"}}>
            {ph==="ok" && `✓ ${fact.a * fact.b}`}
            {ph==="err" && `✗  ${fact.a * fact.b}`}
            {ph==="q" && (ans || <span style={{color:"#D1D5DB", fontSize:30}}>—</span>)}
          </div>
        </div>

        <div style={{...W, display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:11}}>
          {numRows.flat().map((d, i) => {
            if (d === "ok") return (
              <button key="ok" onClick={() => sf.current()}
                style={{height:72, borderRadius:16, background: ans ? PU : "#E5E7EB", color: ans ? "#fff" : "#9CA3AF", fontSize:30, fontWeight:800, border:"none", cursor: ans ? "pointer" : "default"}}>
                =
              </button>
            );
            if (d === "del") return (
              <button key="del" onClick={() => pf.current("del")}
                style={{height:72, borderRadius:16, background:"#E5E7EB", color:"#4B5563", fontSize:22, fontWeight:600, border:"none", cursor:"pointer"}}>
                ←
              </button>
            );
            return (
              <button key={d} onClick={() => pf.current(d)}
                style={{height:72, borderRadius:16, background:"#fff", color:"#1F2937", fontSize:30, fontWeight:700, border:"1.5px solid #E5E7EB", cursor:"pointer", boxShadow:"0 2px 6px rgba(0,0,0,0.07)"}}>
                {d}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ── RESULTS ────────────────────────────────────────────
  if (sc === "results") {
    const pct = Math.round((sCor / ses) * 100);
    const st = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
    const msg = pct >= 90 ? "Отлично!" : pct >= 70 ? "Хорошо! Так держать!" : "Продолжай — всё получится!";
    const weak = Object.entries(facts)
      .filter(([k, f]) => { const [a] = k.split("x").map(Number); return tbs.includes(a) && f.c+f.w > 0 && f.c/(f.c+f.w) < 0.5; })
      .sort((a, b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w)).slice(0, 6);
    return (
      <div style={base}>
        <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:22, padding:"34px 22px", marginBottom:14, textAlign:"center"}}>
          <div style={{fontSize:44, color:"#F59E0B", letterSpacing:7, marginBottom:14}}>{"★".repeat(st) + "☆".repeat(3-st)}</div>
          <div style={{fontSize:22, fontWeight:700, color:PU, marginBottom:10}}>{msg}</div>
          <div style={{fontSize:40, fontWeight:800, color:"#1F2937", marginBottom:4}}>{sCor} / {ses}</div>
          <div style={{fontSize:15, color:"#6B7280"}}>правильных ответов ({pct}%)</div>
        </div>

        {resultData && (() => {
          const rk = getRank(resultData.totalXP);
          return (
            <div style={{...W, borderRadius:20, padding:"20px", marginBottom:14, color:"#fff",
              background:"linear-gradient(135deg, #2E2A5E 0%, #534AB7 60%, #7C6FE8 100%)", boxShadow:"0 5px 18px rgba(83,74,183,0.3)"}}>
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom: resultData.newAch.length ? 16 : 14}}>
                <span style={{fontSize:15, opacity:0.9}}>Заработано за игру</span>
                <span style={{fontSize:30, fontWeight:800}}>+{resultData.sessionXP} ⭐</span>
              </div>
              {resultData.completionBonus > 0 && (
                <div style={{fontSize:12, opacity:0.85, marginBottom:14, textAlign:"right"}}>включая +{resultData.completionBonus} за полную сессию</div>
              )}

              {resultData.newAch.length > 0 && (
                <div style={{background:"rgba(255,255,255,0.14)", borderRadius:14, padding:"12px 14px", marginBottom:16}}>
                  <div style={{fontSize:12, opacity:0.9, marginBottom:8}}>Новые достижения!</div>
                  <div style={{display:"flex", flexWrap:"wrap", gap:8}}>
                    {resultData.newAch.map(id => {
                      const a = ACH_BY_ID[id];
                      return (
                        <span key={id} style={{display:"flex", alignItems:"center", gap:6, padding:"6px 11px", background:"rgba(255,255,255,0.2)", borderRadius:20, fontSize:13, fontWeight:700, animation:"rankPop 0.5s ease-out"}}>
                          <span style={{fontSize:17}}>{a.emoji}</span>{a.name}
                        </span>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:8}}>
                <span style={{fontSize:26}}>{rk.cur.emoji}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:15, fontWeight:800}}>{rk.cur.name}</div>
                  <div style={{fontSize:11, opacity:0.85}}>
                    {rk.next ? `${resultData.totalXP} / ${rk.next.min} XP до звания ${rk.next.name}` : "Максимальное звание!"}
                  </div>
                </div>
              </div>
              <div style={{height:9, background:"rgba(255,255,255,0.25)", borderRadius:5, overflow:"hidden"}}>
                <div style={{height:"100%", width:`${rk.pct}%`, background:"linear-gradient(90deg,#FCD34D,#FBBF24)", borderRadius:5, transition:"width 0.5s"}} />
              </div>
            </div>
          );
        })()}

        {weak.length > 0 && (
          <div style={{...W, marginBottom:18}}>
            <div style={{fontSize:13, color:"#6B7280", marginBottom:9}}>Нужно ещё потренировать</div>
            <div style={{display:"flex", flexWrap:"wrap", gap:7}}>
              {weak.map(([k]) => { const [a,b] = k.split("x"); return <span key={k} style={{padding:"6px 13px", background:"#FEF2F2", color:"#991B1B", borderRadius:9, fontSize:15, fontWeight:600}}>{a}×{b}={Number(a)*Number(b)}</span>; })}
            </div>
          </div>
        )}

        <button onClick={startTrain}
          style={{...W, height:56, borderRadius:16, background:PU, color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor:"pointer", marginBottom:12}}>
          Тренироваться снова ▶
        </button>
        <button onClick={() => setSc("home")}
          style={{...W, height:46, borderRadius:13, background:"transparent", color:"#6B7280", fontSize:15, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>
          На главную
        </button>
      </div>
    );
  }

  return null;
}

// ─── STATS VIEW (used by parent & admin) ─────────────────
function StatsView({ facts, sessions, name, onBack }) {
  const allQ = sessions.reduce((s,x) => s+(x.total||0), 0);
  const allC = sessions.reduce((s,x) => s+(x.correct||0), 0);
  const acc = allQ > 0 ? Math.round(allC/allQ*100) : 0;
  const topBad = Object.entries(facts || {})
    .filter(([,f]) => f.c+f.w > 2)
    .sort((a,b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w))
    .slice(0, 5);

  return (
    <div style={base}>
      <div style={{...W, display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:18}}>
        <h2 style={{fontSize:22, fontWeight:700, margin:0, color:PU}}>{name}</h2>
        <button onClick={onBack} style={{height:36, padding:"0 14px", borderRadius:9, background:"transparent", color:"#6B7280", fontSize:14, border:"1.5px solid #D1D5DB", cursor:"pointer"}}>Назад</button>
      </div>

      <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:9, marginBottom:18}}>
        {[["Сессий", sessions.length], ["Вопросов", allQ], ["Точность", `${acc}%`]].map(([l,v]) => (
          <div key={l} style={{background:"#fff", borderRadius:12, padding:"14px 8px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
            <div style={{fontSize:11, color:"#6B7280", marginBottom:5}}>{l}</div>
            <div style={{fontSize:24, fontWeight:800, color:"#1F2937"}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 12px", marginBottom:16}}>
        <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:"#374151"}}>Тепловая карта усвоения</div>
        <div style={{display:"flex", gap:2, marginBottom:4}}>
          <div style={{width:22}} />
          {NUMS.map(b => <div key={b} style={{flex:1, textAlign:"center", fontSize:9, color:"#9CA3AF"}}>{b}</div>)}
        </div>
        {NUMS.map(a => (
          <div key={a} style={{display:"flex", gap:2, marginBottom:2}}>
            <div style={{width:22, fontSize:9, color:"#9CA3AF", display:"flex", alignItems:"center"}}>{a}</div>
            {NUMS.map(b => {
              const f = (facts || {})[`${a}x${b}`];
              const {bg, tx} = hc(f);
              const p = f && f.c+f.w > 0 ? Math.round(f.c/(f.c+f.w)*100) : null;
              return (
                <div key={b} title={`${a}×${b}=${a*b}: ${p !== null ? p+"%" : "—"}`}
                  style={{flex:1, height:28, borderRadius:4, background:bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:8, color:tx, fontWeight:700}}>
                  {p !== null ? `${p}%` : ""}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {topBad.length > 0 && (
        <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 14px", marginBottom:16}}>
          <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:"#374151"}}>Слабые места</div>
          {topBad.map(([k, f]) => {
            const [a, b] = k.split("x");
            const p = Math.round(f.c/(f.c+f.w)*100);
            return (
              <div key={k} style={{display:"flex", alignItems:"center", gap:12, marginBottom:8}}>
                <span style={{fontWeight:700, fontSize:16, minWidth:68, color:"#1F2937"}}>{a}×{b}={Number(a)*Number(b)}</span>
                <div style={{flex:1, height:7, background:"#F3F4F6", borderRadius:4, overflow:"hidden"}}>
                  <div style={{height:"100%", width:`${p}%`, background: p>=65 ? GR : p>=40 ? "#F59E0B" : RD, borderRadius:4}} />
                </div>
                <span style={{fontSize:13, color:"#6B7280", minWidth:36, textAlign:"right"}}>{p}%</span>
              </div>
            );
          })}
        </div>
      )}

      {sessions.length > 0 ? (
        <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:18, padding:"16px 14px"}}>
          <div style={{fontSize:14, fontWeight:700, marginBottom:12, color:"#374151"}}>История сессий</div>
          {sessions.slice(0, 15).map((s, i) => (
            <div key={i} style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"9px 0", borderBottom: i < Math.min(sessions.length,15)-1 ? "1px solid #F3F4F6" : "none"}}>
              <div>
                <div style={{fontSize:13, color:"#1F2937"}}>{fmtD(s.date)}</div>
                <div style={{fontSize:11, color:"#9CA3AF"}}>×{(s.tables||[]).join(", ×")} · {fmtS(s.dur||0)}</div>
                {s.avgTime != null && <div style={{fontSize:11, color:"#9CA3AF"}}>avg {s.avgTime}с · min {s.minTime}с · max {s.maxTime}с</div>}
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:17, fontWeight:700, color: s.correct/s.total>=0.8 ? GR : s.correct/s.total>=0.6 ? "#D97706" : RD}}>{Math.round(s.correct/s.total*100)}%</div>
                <div style={{fontSize:11, color:"#9CA3AF"}}>{s.correct}/{s.total}</div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{...W, textAlign:"center", padding:"28px 0", color:"#9CA3AF", fontSize:15}}>
          Пока нет данных.
        </div>
      )}
    </div>
  );
}

// ─── PARENT APP ──────────────────────────────────────────
function ParentApp({ user, profile, onLogout }) {
  const [children, setChildren] = useState([]);
  const [loading, setLoading] = useState(true);
  const [code, setCode] = useState("");
  const [linkMsg, setLinkMsg] = useState("");
  const [selected, setSelected] = useState(null);
  const [childData, setChildData] = useState(null);

  const loadChildren = async () => {
    setLoading(true);
    const snap = await db.collection("parentLinks").doc(user.uid).collection("children").get();
    const list = [];
    snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
    setChildren(list);
    setLoading(false);
  };

  useEffect(() => { loadChildren(); }, []);

  const doLink = async () => {
    setLinkMsg("");
    if (code.length !== 6) { setLinkMsg("Код должен содержать 6 цифр"); return; }
    const res = await linkParentToChildByCode(user.uid, code);
    if (res.ok) {
      setLinkMsg(`Привязан: ${res.name}`);
      setCode("");
      loadChildren();
    } else {
      setLinkMsg(res.error);
    }
  };

  const openChild = async (c) => {
    setSelected(c);
    setChildData(null);
    const data = await loadUserData(c.uid);
    setChildData(data);
  };

  if (selected && childData) {
    return <StatsView name={selected.name} facts={childData.facts} sessions={childData.sessions} onBack={() => { setSelected(null); setChildData(null); }} />;
  }
  if (selected && !childData) {
    return <div style={{...base, justifyContent:"center"}}><div style={{fontSize:16, color:"#6B7280"}}>Загрузка…</div></div>;
  }

  return (
    <div style={base}>
      <Header name={profile.name} badge="Родитель" onLogout={onLogout} />

      <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:14, padding:"14px", marginBottom:16}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:8}}>Привязать ребёнка по коду</div>
        <input value={code} onChange={e => setCode(e.target.value.replace(/\D/g,"").slice(0,6))}
          placeholder="6 цифр" inputMode="numeric"
          style={{width:"100%", boxSizing:"border-box", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:18, outline:"none", background:"#fff", letterSpacing:4, textAlign:"center", marginBottom:10}} />
        <button onClick={doLink}
          style={{width:"100%", height:48, borderRadius:12, background:PU, color:"#fff", border:"none", fontWeight:700, fontSize:16, cursor:"pointer"}}>
          Привязать
        </button>
        {linkMsg && <div style={{fontSize:13, color: linkMsg.startsWith("Привязан") ? GR : RD, marginTop:8, textAlign:"center"}}>{linkMsg}</div>}
      </div>

      <div style={{...W, marginBottom:12, fontSize:14, color:"#6B7280"}}>
        Мои дети {children.length > 0 && `(${children.length})`}
      </div>

      {loading ? (
        <div style={{...W, textAlign:"center", padding:20, color:"#9CA3AF"}}>Загрузка…</div>
      ) : children.length === 0 ? (
        <div style={{...W, textAlign:"center", padding:"30px 16px", color:"#9CA3AF", background:"#fff", borderRadius:14, border:"1.5px solid #E5E7EB"}}>
          Пока нет привязанных детей.<br/>Попроси код у ребёнка.
        </div>
      ) : (
        <div style={{...W, display:"flex", flexDirection:"column", gap:9}}>
          {children.map(c => (
            <button key={c.uid} onClick={() => openChild(c)}
              style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 16px", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:14, cursor:"pointer", textAlign:"left"}}>
              <div>
                <div style={{fontSize:16, fontWeight:700, color:"#1F2937"}}>{c.name}</div>
                <div style={{fontSize:11, color:"#9CA3AF"}}>привязан {fmtDay(c.linkedAt)}</div>
              </div>
              <div style={{fontSize:18, color:"#9CA3AF"}}>›</div>
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ADMIN APP ───────────────────────────────────────────
function AdminApp({ user, profile, onLogout }) {
  const [users, setUsers] = useState([]);
  const [allSessions, setAllSessions] = useState([]);
  const [allFacts, setAllFacts] = useState({});
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(null);
  const [selectedData, setSelectedData] = useState(null);

  useEffect(() => {
    (async () => {
      setLoading(true);
      const snap = await db.collection("users").get();
      const list = [];
      const sessAll = [];
      const factsAggr = {};
      for (const d of snap.docs) {
        const data = d.data();
        list.push({ uid: d.id, ...data });
        try {
          const sSnap = await db.collection("users").doc(d.id).collection("sessions").orderBy("date", "desc").limit(30).get();
          const userSessions = [];
          sSnap.forEach(s => { const sd = s.data(); userSessions.push(sd); sessAll.push({...sd, _uid: d.id, _name: data.name}); });
          const lastDate = userSessions[0]?.date || data.createdAt || 0;
          list[list.length-1].lastActive = lastDate;
          list[list.length-1].sessionsCount = userSessions.length;
          const fSnap = await db.collection("users").doc(d.id).collection("facts").get();
          fSnap.forEach(f => {
            const fd = f.data();
            const cur = factsAggr[f.id] || {c:0, w:0};
            factsAggr[f.id] = { c: cur.c + (fd.c||0), w: cur.w + (fd.w||0) };
          });
        } catch(e) {}
      }
      list.sort((a, b) => (b.lastActive || 0) - (a.lastActive || 0));
      setUsers(list);
      setAllSessions(sessAll);
      setAllFacts(factsAggr);
      setLoading(false);
    })();
  }, []);

  const openUser = async (u) => {
    setSelected(u);
    setSelectedData(null);
    const data = await loadUserData(u.uid);
    setSelectedData(data);
  };

  if (selected && selectedData) {
    return <StatsView name={selected.name + " · " + (selected.role || "?")} facts={selectedData.facts} sessions={selectedData.sessions} onBack={() => { setSelected(null); setSelectedData(null); }} />;
  }
  if (selected && !selectedData) {
    return <div style={{...base, justifyContent:"center"}}><div style={{fontSize:16, color:"#6B7280"}}>Загрузка…</div></div>;
  }

  const totalSessions = allSessions.length;
  const totalQ = allSessions.reduce((s,x) => s+(x.total||0), 0);
  const totalC = allSessions.reduce((s,x) => s+(x.correct||0), 0);
  const acc = totalQ ? Math.round(totalC/totalQ*100) : 0;

  // Активность по дням (последние 14 дней)
  const days = {};
  const now = Date.now();
  for (let i = 13; i >= 0; i--) {
    const d = new Date(now - i*86400000);
    const key = d.toISOString().slice(0,10);
    days[key] = 0;
  }
  allSessions.forEach(s => {
    const key = new Date(s.date).toISOString().slice(0,10);
    if (key in days) days[key] += (s.total || 0);
  });
  const dayKeys = Object.keys(days);
  const maxDay = Math.max(1, ...Object.values(days));

  // Глобально сложные таблицы
  const hardest = Object.entries(allFacts)
    .filter(([, f]) => f.c + f.w >= 5)
    .sort((a,b) => a[1].c/(a[1].c+a[1].w) - b[1].c/(b[1].c+b[1].w))
    .slice(0, 6);

  return (
    <div style={base}>
      <Header name={profile.name} badge="Администратор" onLogout={onLogout} />

      {loading ? (
        <div style={{...W, textAlign:"center", padding:24, color:"#9CA3AF"}}>Загрузка…</div>
      ) : (
        <>
          <div style={{...W, display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:7, marginBottom:18}}>
            {[
              ["Игроков", users.length],
              ["Сессий", totalSessions],
              ["Вопросов", totalQ],
              ["Точность", `${acc}%`]
            ].map(([l,v]) => (
              <div key={l} style={{background:"#fff", borderRadius:12, padding:"12px 4px", textAlign:"center", border:"1.5px solid #E5E7EB"}}>
                <div style={{fontSize:10, color:"#6B7280", marginBottom:4}}>{l}</div>
                <div style={{fontSize:18, fontWeight:800, color:"#1F2937"}}>{v}</div>
              </div>
            ))}
          </div>

          <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"14px", marginBottom:16}}>
            <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:"#374151"}}>Активность за 14 дней</div>
            <div style={{display:"flex", alignItems:"flex-end", gap:3, height:80}}>
              {dayKeys.map(k => {
                const v = days[k];
                const h = Math.max(2, Math.round(v/maxDay*70));
                return (
                  <div key={k} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
                    <div style={{width:"100%", height:h, background: v ? PU : "#E5E7EB", borderRadius:3, transition:"height 0.3s"}} title={`${k}: ${v} ответов`} />
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex", justifyContent:"space-between", fontSize:9, color:"#9CA3AF", marginTop:4}}>
              <span>{fmtDay(now - 13*86400000)}</span>
              <span>сегодня</span>
            </div>
          </div>

          {hardest.length > 0 && (
            <div style={{...W, background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:16, padding:"14px", marginBottom:16}}>
              <div style={{fontSize:13, fontWeight:700, marginBottom:10, color:"#374151"}}>Самые сложные примеры (глобально)</div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {hardest.map(([k, f]) => {
                  const [a,b] = k.split("x");
                  const p = Math.round(f.c/(f.c+f.w)*100);
                  return (
                    <span key={k} style={{padding:"6px 11px", background:"#FEF2F2", color:"#991B1B", borderRadius:9, fontSize:14, fontWeight:600}}>
                      {a}×{b}={Number(a)*Number(b)} · {p}%
                    </span>
                  );
                })}
              </div>
            </div>
          )}

          <div style={{...W, marginBottom:10, fontSize:13, color:"#6B7280"}}>Все игроки</div>
          <div style={{...W, display:"flex", flexDirection:"column", gap:7}}>
            {users.map(u => (
              <button key={u.uid} onClick={() => openUser(u)}
                style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 14px", background:"#fff", border:"1.5px solid #E5E7EB", borderRadius:12, cursor:"pointer", textAlign:"left"}}>
                <div>
                  <div style={{fontSize:15, fontWeight:700, color:"#1F2937"}}>
                    {u.name} <span style={{fontSize:11, color:"#9CA3AF", fontWeight:400}}>· {u.role}</span>
                  </div>
                  <div style={{fontSize:11, color:"#9CA3AF"}}>
                    {u.lastActive ? `активен ${fmtD(u.lastActive)}` : "нет активности"}
                    {u.sessionsCount ? ` · ${u.sessionsCount} сессий` : ""}
                  </div>
                </div>
                <div style={{fontSize:18, color:"#9CA3AF"}}>›</div>
              </button>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
