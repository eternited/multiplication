<script>
// ─── AUDIO ────────────────────────────────────────────────
// AudioContext создаётся ЛЕНИВО при первом жесте пользователя.
// На iOS Safari контекст рождается "suspended" и требует resume()
// внутри пользовательского жеста, плюс играем неслышный буфер для разблокировки.
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let _ctx = null;
let _unlocked = false;

function ensureCtx() {
  if (_ctx || !AudioCtx) return _ctx;
  try { _ctx = new AudioCtx(); } catch(e) { _ctx = null; }
  return _ctx;
}

function tryResume() {
  if (!_ctx) return;
  // resume() вызываем ТОЛЬКО когда контекст реально приостановлен — не плодим вызовы
  if (_ctx.state === "suspended") {
    try { _ctx.resume().catch(()=>{}); } catch(e) {}
  }
}

function unlockAudio() {
  if (_unlocked) return;
  const ctx = ensureCtx();
  if (!ctx) return;
  tryResume();
  // прогрев — неслышный буфер для iOS Safari
  try {
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
  } catch(e) {}
  _unlocked = true;
}

// Одноразовый разблокировщик на первый жест на странице.
const _unlockEvents = ["touchstart", "touchend", "mousedown", "click", "keydown"];
function _onFirstGesture() {
  unlockAudio();
  _unlockEvents.forEach(ev => document.removeEventListener(ev, _onFirstGesture, true));
}
_unlockEvents.forEach(ev => document.addEventListener(ev, _onFirstGesture, { capture: true, passive: true }));

const playSound = (type) => {
  try {
    const ctx = ensureCtx();
    if (!ctx) return;
    tryResume(); // дешёво, если уже running
    const g = ctx.createGain();
    g.connect(ctx.destination);
    const o = ctx.createOscillator();
    o.connect(g);

    if (type === "num") {
      o.type = "sine";
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(330, ctx.currentTime + 0.07);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.09);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.09);
    } else if (type === "del") {
      o.type = "sine";
      o.frequency.setValueAtTime(320, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(180, ctx.currentTime + 0.1);
      g.gain.setValueAtTime(0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.12);
    } else if (type === "eq") {
      [0, 0.1].forEach((delay, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "triangle";
        o2.frequency.setValueAtTime(i === 0 ? 440 : 550, ctx.currentTime + delay);
        g2.gain.setValueAtTime(0.20, ctx.currentTime + delay);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + 0.15);
        o2.start(ctx.currentTime + delay);
        o2.stop(ctx.currentTime + delay + 0.15);
      });
      return;
    } else if (type === "wrong") {
      o.type = "sawtooth";
      o.frequency.setValueAtTime(300, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + 0.35);
      g.gain.setValueAtTime(0.18, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.38);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.38);
      return;
    } else if (type === "levelup") {
      // Восходящий арпеджио C-E-G-C — радостный аккорд достижения
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        const o2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.type = "triangle";
        const t = ctx.currentTime + i * 0.09;
        o2.frequency.setValueAtTime(freq, t);
        g2.gain.setValueAtTime(0.22, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o2.start(t);
        o2.stop(t + 0.35);
      });
      return;
    }
  } catch(e) {}
};

window.playSound = playSound;
</script>

<script id="game-logic">
// ─── ЧИСТАЯ ИГРОВАЯ ЛОГИКА (тестируется в Node, см. автотесты) ───
(function(global){
  const NUMS = [2,3,4,5,6,7,8,9,10];
  const SES_OPTS = [5, 10, 15, 20];

  // ── Звания (прогрессирующие пороги) ──
  const RANKS = [
    {min: 0,      emoji: "🌱", name: "Новичок"},
    {min: 500,    emoji: "🛸", name: "Пилот"},
    {min: 1500,   emoji: "⭐", name: "Штурман"},
    {min: 4000,   emoji: "🚀", name: "Капитан"},
    {min: 9000,   emoji: "🌟", name: "Командир"},
    {min: 20000,  emoji: "🪐", name: "Адмирал галактики"},
    {min: 40000,  emoji: "☄️", name: "Легенда галактики"},
  ];

  function rankIndex(xp){
    xp = xp || 0;
    let idx = 0;
    for (let i = 0; i < RANKS.length; i++) if (xp >= RANKS[i].min) idx = i;
    return idx;
  }
  function getRank(xp){
    xp = xp || 0;
    const index = rankIndex(xp);
    const cur = RANKS[index];
    const next = RANKS[index + 1] || null;
    const into = xp - cur.min;
    const span = next ? next.min - cur.min : 1;
    const pct = next ? Math.min(100, Math.round(into / span * 100)) : 100;
    return { cur, next, into, span, pct, index };
  }
  // Повышение звания: индекс вырос
  function isLevelUp(oldXP, newXP){ return rankIndex(newXP) > rankIndex(oldXP); }

  // ── XP / комбо ──
  function comboMultiplier(comboAfter){ return comboAfter >= 10 ? 3 : comboAfter >= 5 ? 2 : 1; }
  function nextCombo(prevCombo, correct){ return correct ? (prevCombo || 0) + 1 : 0; }
  // Очки за один ответ: correct — верно ли, fast — быстрее 3с, comboAfter — комбо ПОСЛЕ этого ответа
  function computeAnswerXP(correct, fast, comboAfter){
    if (!correct) return 0;
    const base = fast ? 15 : 10;
    return base * comboMultiplier(comboAfter);
  }
  // Бонус за полную сессию из 20 вопросов
  function sessionBonus(total){ return total === 20 ? 50 : 0; }

  // ── Цепочки бейджей ──
  const CHAINS = {
    combo:        [10, 20, 30, 50, 100],
    daystreak:    [3, 5, 10, 20, 30, 50, 100],
    totalcorrect: [100, 250, 500, 1000, 2500, 5000],
    totalxp:      [1000, 5000, 10000, 25000, 50000, 100000],
    perfect:      [1, 5, 10, 25, 50],
    dailycorrect: [20, 50, 100, 200],
    tables:       [1, 3, 6, 9],
  };
  const CHAIN_ORDER = ["combo","daystreak","totalcorrect","totalxp","perfect","dailycorrect","tables"];
  const CHAIN_TITLES = {
    combo: "Серии без ошибок",
    daystreak: "Дни подряд",
    totalcorrect: "Верные ответы",
    totalxp: "Опыт",
    perfect: "Идеальные сессии",
    dailycorrect: "Рекорд за день",
    tables: "Освоение таблиц",
  };
  // Эмодзи и названия для каждого порога цепочки
  const BADGE_META = {
    combo:        {emojis:["🔥","⚡","💥","🌟","☄️"],       label: n => `Серия ${n}`,    desc: n => `${n} правильных подряд`},
    daystreak:    {emojis:["📅","🗓️","🔆","🌈","🏅","👑","💎"], label: n => `${n} дней подряд`, desc: n => `Заходил ${n} дней подряд`},
    totalcorrect: {emojis:["💯","🎯","🏆","🥇","🌠","🪐"],  label: n => `${n} верных`,   desc: n => `${n} правильных ответов всего`},
    totalxp:      {emojis:["⭐","🌟","✨","🚀","🛸","🌌"],   label: n => `${n} очков`,    desc: n => `${n} XP за всё время`},
    perfect:      {emojis:["🎖️","🏵️","🏆","👑","💎"],       label: n => n === 1 ? "Идеальная сессия" : `${n} идеальных`, desc: n => n === 1 ? "Сессия 20 из 20" : `${n} сессий по 20 из 20`},
    dailycorrect: {emojis:["☀️","🌞","🔥","🚀"],            label: n => `${n} за день`,  desc: n => `${n} верных за один день`},
    tables:       {emojis:["🎯","📚","🧠","🎓"],            label: n => n === 1 ? "Первая таблица" : n === 9 ? "Все таблицы" : `${n} таблицы`, desc: n => `Освоено таблиц на 90%+: ${n}`},
  };

  // Полный список бейджей
  const BADGES = [];
  for (const chain of CHAIN_ORDER){
    CHAINS[chain].forEach((threshold, i) => {
      const meta = BADGE_META[chain];
      BADGES.push({
        id: `${chain}_${threshold}`,
        chain, threshold,
        emoji: meta.emojis[i] || meta.emojis[meta.emojis.length - 1],
        name: meta.label(threshold),
        desc: meta.desc(threshold),
      });
    });
  }
  const BADGE_BY_ID = Object.fromEntries(BADGES.map(b => [b.id, b]));

  // Соответствие stat → значение из stats
  const CHAIN_STAT = {
    combo: "maxCombo",
    daystreak: "streakDays",
    totalcorrect: "totalCorrect",
    totalxp: "totalXP",
    perfect: "perfectSessions",
    dailycorrect: "dailyCorrect",
    tables: "tablesMastered",
  };

  // Какие бейджи должны быть открыты при данной статистике
  function computeUnlockedBadges(stats){
    const out = [];
    for (const chain of CHAIN_ORDER){
      const val = stats[CHAIN_STAT[chain]] || 0;
      for (const threshold of CHAINS[chain]){
        if (val >= threshold) out.push(`${chain}_${threshold}`);
      }
    }
    return out;
  }

  // Миграция старых достижений в систему цепочек
  const LEGACY_MAP = {
    combo10: "combo_10",
    correct100: "totalcorrect_100",
    master_table: "tables_1",
    streak3: "daystreak_3",
    perfect_session: "perfect_1",
  };
  function migrateLegacy(achievements){
    const out = new Set();
    for (const id of (achievements || [])){
      if (LEGACY_MAP[id]) out.add(LEGACY_MAP[id]);
      else if (BADGE_BY_ID[id]) out.add(id);
      // first_session и прочие неизвестные id отбрасываются (нет цепочки)
    }
    return [...out];
  }

  // Объединить владение без дубликатов; вернуть {all, added}
  function mergeOwned(existingMigrated, unlocked){
    const have = new Set(existingMigrated);
    const added = [];
    for (const id of unlocked){ if (!have.has(id)){ have.add(id); added.push(id); } }
    return { all: [...have], added };
  }

  // Только полученные бейджи, сгруппированные по цепочкам, в порядке цепочек.
  // Используется в детальной статистике, которую видят родитель и админ — без силуэтов.
  function ownedBadgesByChain(achievements){
    const owned = new Set(migrateLegacy(achievements));
    const result = [];
    for (const chain of CHAIN_ORDER){
      const inChain = CHAINS[chain]
        .map(t => BADGE_BY_ID[`${chain}_${t}`])
        .filter(b => owned.has(b.id));
      if (inChain.length) result.push({ chain, title: CHAIN_TITLES[chain], badges: inChain });
    }
    return result;
  }

  // Отвязать ребёнка: удаляет ТОЛЬКО parentLinks/{parentUid}/children/{childUid}.
  // Документ users/{childUid} и его поддокументы НЕ трогаются.
  function unlinkChild(db, parentUid, childUid){
    if (!db || !parentUid || !childUid) {
      return Promise.reject(new Error("unlinkChild: db/parentUid/childUid обязательны"));
    }
    return db.collection("parentLinks").doc(parentUid).collection("children").doc(childUid).delete();
  }

  // Видимые бейджи цепочки: все полученные + первый неполученный (замок). Остальные скрыты.
  function visibleChainBadges(chain, ownedSet){
    const list = CHAINS[chain].map(t => BADGE_BY_ID[`${chain}_${t}`]);
    const out = [];
    let lockedShown = false;
    for (const b of list){
      if (ownedSet.has(b.id)){ out.push({...b, owned: true}); }
      else if (!lockedShown){ out.push({...b, owned: false}); lockedShown = true; }
      else break; // всё после первого замка скрываем
    }
    return out;
  }

  // ── Серия дней ──
  function todayStr(){ return new Date().toISOString().slice(0, 10); }
  function computeStreak(lastActiveDate, prevStreak, today){
    today = today || todayStr();
    if (lastActiveDate === today) return prevStreak || 1;
    const t = new Date(today + "T00:00:00Z");
    const yesterday = new Date(t.getTime() - 86400000).toISOString().slice(0, 10);
    if (lastActiveDate === yesterday) return (prevStreak || 0) + 1;
    return 1;
  }

  // ── Верных за календарный день (сброс при новом дне) ──
  function updateDailyCorrect(prevCount, prevDate, today, addCorrect){
    today = today || todayStr();
    if (prevDate === today) return { dailyCorrect: (prevCount || 0) + addCorrect, dailyDate: today };
    return { dailyCorrect: addCorrect, dailyDate: today };
  }

  // ── Освоенные таблицы (все 9 примеров пройдены, точность ≥ 90%) ──
  function countTablesMastered(facts){
    let count = 0;
    for (const a of NUMS){
      let c = 0, w = 0, attempted = 0;
      for (const b of NUMS){
        const f = (facts || {})[`${a}x${b}`];
        if (f && f.c + f.w > 0){ c += f.c; w += f.w; attempted++; }
      }
      if (attempted === NUMS.length && c + w > 0 && c / (c + w) >= 0.9) count++;
    }
    return count;
  }

  // ── Выбор примера (адаптивный вес, без повтора подряд) ──
  function wt(f){ return !f || f.c + f.w === 0 ? 0.65 : Math.max(0.1, 1 - f.c / (f.c + f.w + 0.5)); }
  function pick(tbs, facts, lastFact, rng){
    rng = rng || Math.random;
    const pool = tbs.flatMap(a => NUMS.map(b => ({a, b, k:`${a}x${b}`})));
    const filtered = lastFact ? pool.filter(p => p.k !== lastFact.k) : pool;
    const usable = filtered.length > 0 ? filtered : pool;
    const ws = usable.map(p => wt(facts[p.k]));
    const sum = ws.reduce((s, w) => s + w, 0);
    let r = rng() * sum;
    for (let i = 0; i < usable.length; i++){ r -= ws[i]; if (r <= 0) return usable[i]; }
    return usable[usable.length - 1];
  }

  // ── Чистый расчёт всех обновлений по итогам сессии ──
  // profile — текущее состояние профиля (или {} для нового пользователя)
  // acc — накопленное в памяти за сессию:
  //   { startDate, startedAt, endedAt, factsDelta, factsFull, sCor, sTot, sXP, maxCombo, sTimes, tables }
  function computeSessionCommit(profile, acc){
    const p = profile || {};
    const completionBonus = sessionBonus(acc.sTot);
    const sessionXP = (acc.sXP || 0) + completionBonus;

    const prevTotalXP = p.totalXP || 0;
    const newTotalXP = prevTotalXP + sessionXP;
    const newTotalCorrect = (p.totalCorrect || 0) + (acc.sCor || 0);
    const newBest = Math.max(p.bestSessionXP || 0, sessionXP);
    const newMaxCombo = Math.max(p.maxCombo || 0, acc.maxCombo || 0);
    const isPerfect = (acc.sTot === 20 && acc.sCor === 20);
    const newPerfect = (p.perfectSessions || 0) + (isPerfect ? 1 : 0);
    const daily = updateDailyCorrect(p.dailyCorrect, p.dailyDate, acc.startDate, acc.sCor || 0);
    const tablesMastered = countTablesMastered(acc.factsFull || {});

    const stats = {
      maxCombo: newMaxCombo, streakDays: p.streakDays || 1, totalCorrect: newTotalCorrect,
      totalXP: newTotalXP, perfectSessions: newPerfect, dailyCorrect: daily.dailyCorrect, tablesMastered
    };
    const ownedBefore = migrateLegacy(p.achievements);
    const unlocked = computeUnlockedBadges(stats);
    const { all, added } = mergeOwned(ownedBefore, unlocked);

    const times = acc.sTimes || [];
    const avgTime = times.length ? Math.round(times.reduce((a,b)=>a+b,0)/times.length*10)/10 : null;
    const minTime = times.length ? Math.round(Math.min(...times)*10)/10 : null;
    const maxTime = times.length ? Math.round(Math.max(...times)*10)/10 : null;

    const session = {
      date: acc.startedAt,
      dur: Math.max(0, Math.round(((acc.endedAt || acc.startedAt) - acc.startedAt) / 1000)),
      correct: acc.sCor || 0, total: acc.sTot || 0,
      tables: [...(acc.tables || [])],
      avgTime, minTime, maxTime, xp: sessionXP
    };

    const profileUpdates = {
      totalXP: newTotalXP, bestSessionXP: newBest, totalCorrect: newTotalCorrect,
      maxCombo: newMaxCombo, perfectSessions: newPerfect,
      dailyCorrect: daily.dailyCorrect, dailyDate: daily.dailyDate,
      tablesMastered, achievements: all
    };

    return {
      session, profileUpdates,
      factsUpdates: acc.factsDelta || {},
      sessionXP, completionBonus,
      newAchievements: added,
      leveledUp: isLevelUp(prevTotalXP, newTotalXP),
      newRank: getRank(newTotalXP).cur,
      newTotalXP,
    };
  }

  // Начальные настройки выбора тренировки: берём из профиля, иначе дефолты.
  // Невалидные/устаревшие значения отбрасываются.
  function pickInitialSettings(profile, defaults){
    defaults = defaults || { tables: [2,3,4,5], sessionLength: 20 };
    const lt = profile && profile.lastTables;
    let tables = null;
    if (Array.isArray(lt) && lt.length > 0){
      const filtered = lt.filter(n => Number.isInteger(n) && n >= 2 && n <= 10);
      // убираем дубликаты, сохраняя порядок
      const seen = new Set();
      tables = filtered.filter(n => seen.has(n) ? false : (seen.add(n), true));
    }
    if (!tables || tables.length === 0) tables = [...defaults.tables];

    const ls = profile && profile.lastSessionLength;
    const sessionLength = SES_OPTS.includes(ls) ? ls : defaults.sessionLength;

    return { tables, sessionLength };
  }

  // ── Режим изучения таблиц ──
  // Озвучка строки: "5 на 6, 30" — без слова "равно".
  // Запятая даёт естественную короткую паузу в SpeechSynthesis вместо слова "равно".
  function speechText(a, b){ return `${a} на ${b}, ${a * b}`; }

  // Полный столбик таблицы умножения для множителя a (b от 1 до 10).
  function tableRows(a){
    const rows = [];
    for (let b = 1; b <= 10; b++) rows.push({ a, b, p: a * b });
    return rows;
  }

  // Из списка голосов SpeechSynthesis выбираем русский. Если нет — null (не валим приложение).
  function pickRussianVoice(voices){
    if (!Array.isArray(voices) || voices.length === 0) return null;
    // Приоритет: ru-RU > любой ru-*
    const exact = voices.find(v => v && typeof v.lang === "string" && v.lang.toLowerCase() === "ru-ru");
    if (exact) return exact;
    const ru = voices.find(v => v && typeof v.lang === "string" && v.lang.toLowerCase().startsWith("ru"));
    return ru || null;
  }

  // Защёлка: первый вызов commit() возвращает true, остальные — false
  function makeSaveGate(){
    let saved = false;
    return {
      isSaved(){ return saved; },
      commit(){ if (saved) return false; saved = true; return true; },
      reset(){ saved = false; }
    };
  }

  const GAME = {
    NUMS, SES_OPTS, RANKS, rankIndex, getRank, isLevelUp,
    comboMultiplier, nextCombo, computeAnswerXP, sessionBonus,
    CHAINS, CHAIN_ORDER, CHAIN_TITLES, BADGES, BADGE_BY_ID,
    computeUnlockedBadges, migrateLegacy, mergeOwned, visibleChainBadges, ownedBadgesByChain,
    todayStr, computeStreak, updateDailyCorrect, countTablesMastered,
    wt, pick, unlinkChild,
    computeSessionCommit, makeSaveGate, pickInitialSettings,
    speechText, tableRows, pickRussianVoice,
  };
  global.GAME = GAME;
  if (typeof module !== "undefined" && module.exports) module.exports = GAME;
})(typeof window !== "undefined" ? window : globalThis);
</script>


<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

const auth = window._auth;

const gen6 = () => String(Math.floor(100000 + Math.random() * 900000));

const G = window.GAME;
const { getRank, isLevelUp, computeAnswerXP, comboMultiplier, nextCombo, sessionBonus,
        CHAIN_ORDER, CHAIN_TITLES, BADGE_BY_ID, computeUnlockedBadges, migrateLegacy,
        mergeOwned, visibleChainBadges, ownedBadgesByChain, todayStr, computeStreak, updateDailyCorrect,
        countTablesMastered, pick, computeSessionCommit, makeSaveGate,
        pickInitialSettings, unlinkChild,
        speechText, tableRows, pickRussianVoice } = G;

const hc = f => {
  if (!f || f.c+f.w===0) return {bg:"#E5E7EB", tx:"#9CA3AF"};
  const a = f.c/(f.c+f.w);
  if (a >= 0.85) return {bg:"#4ADE80", tx:"#166534"};
  if (a >= 0.65) return {bg:"#86EFAC", tx:"#14532D"};
  if (a >= 0.40) return {bg:"#FCA5A5", tx:"#7F1D1D"};
  return {bg:"#F87171", tx:"#7F1D1D"};
};

const fmtD = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short", hour:"2-digit", minute:"2-digit"});
const fmtDay = ts => new Date(ts).toLocaleDateString("ru-RU", {day:"numeric", month:"short"});
const fmtS = s => s < 60 ? `${s}с` : `${Math.floor(s/60)}м ${s%60}с`;

// ─── FIRESTORE I/O ───────────────────────────────────────
async function loadUserData(uid) {
  const userDoc = await db.collection("users").doc(uid).get();
  if (!userDoc.exists) return null;
  const profile = userDoc.data();
  const factsSnap = await db.collection("users").doc(uid).collection("facts").get();
  const facts = {};
  factsSnap.forEach(d => facts[d.id] = d.data());
  const sessSnap = await db.collection("users").doc(uid).collection("sessions").orderBy("date", "desc").limit(50).get();
  const sessions = [];
  sessSnap.forEach(d => sessions.push({id: d.id, ...d.data()}));
  return { uid, profile, facts, sessions };
}

async function ensureInviteCode(uid, profile) {
  if (profile.inviteCode) return profile.inviteCode;
  for (let attempt = 0; attempt < 6; attempt++) {
    const code = gen6();
    const ref = db.collection("inviteCodes").doc(code);
    try {
      const exists = await ref.get();
      if (exists.exists) continue;
      await ref.set({ childUid: uid, childName: profile.name, createdAt: Date.now(), used: false });
      await db.collection("users").doc(uid).update({ inviteCode: code });
      return code;
    } catch(e) {}
  }
  return null;
}

async function linkParentToChildByCode(parentUid, code) {
  const ref = db.collection("inviteCodes").doc(code);
  const snap = await ref.get();
  if (!snap.exists) return { ok: false, error: "Код не найден" };
  const { childUid, childName } = snap.data();
  if (!childUid || !childName) return { ok: false, error: "Код устарел, попроси у ребёнка новый" };
  await db.collection("parentLinks").doc(parentUid).collection("children").doc(childUid).set({
    name: childName, linkedAt: Date.now()
  });
  await ref.update({ used: true, lastLinkedAt: Date.now() });
  return { ok: true, name: childName };
}

// ─── APP ─────────────────────────────────────────────────
const W = {width:"100%", maxWidth:420, boxSizing:"border-box"};
// base — скроллящийся экран; padding учитывает safe-area-inset для устройств с чёлкой / нижней полоской жестов
const base = {minHeight:"100dvh", background:"#F5F3FF", display:"flex", flexDirection:"column", alignItems:"center",
  padding:"max(24px, env(safe-area-inset-top)) 16px max(48px, env(safe-area-inset-bottom))", boxSizing:"border-box"};

function App() {
  const [authState, setAuthState] = useState("loading");
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);

  useEffect(() => {
    const unsub = auth.onAuthStateChanged(async u => {
      if (!u) { setAuthState("guest"); setUser(null); setProfile(null); return; }
      try {
        const doc = await db.collection("users").doc(u.uid).get();
        if (!doc.exists) { await auth.signOut(); setAuthState("guest"); return; }
        const p = doc.data();
        setUser(u); setProfile(p);
        setAuthState(p.role || "child");
      } catch(e) {
        console.error(e); setAuthState("guest");
      }
    });
    return () => unsub();
  }, []);

  const logout = () => auth.signOut();

  if (authState === "loading") return (
    <div style={{...base, justifyContent:"center"}}>
      <div style={{fontSize:18, color:"#6B7280"}}>Загрузка…</div>
    </div>
  );

  if (authState === "guest") return <AuthScreen />;
  if (authState === "child") return <ChildApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "parent") return <ParentApp user={user} profile={profile} onLogout={logout} />;
  if (authState === "admin") return <AdminApp user={user} profile={profile} onLogout={logout} />;
  return null;
}

function AuthScreen() {

  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr("");
    const n = name.trim();
    if (!n) { setErr("Введите имя"); return; }
    if (pass.length < 6) { setErr("Пароль минимум 6 символов"); return; }
    setBusy(true);
    try {
      const isAdminLogin = n.toLowerCase() === ADMIN_NAME && pass === ADMIN_PASS;
      const email = nameToEmail(n);
      if (tab === "login") {
        if (isAdminLogin) {
          try { await auth.signInWithEmailAndPassword(email, pass); }
          catch(e) {
            if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential" || e.code === "auth/invalid-login-credentials") {
              const cred = await auth.createUserWithEmailAndPassword(email, pass);
              await db.collection("users").doc(cred.user.uid).set({
                name: n, role: "admin", createdAt: Date.now()
              });
            } else throw e;
          }
        } else {
          await auth.signInWithEmailAndPassword(email, pass);
        }
      } else {
        if (n.toLowerCase() === ADMIN_NAME) { setErr("Имя 'admin' зарезервировано"); setBusy(false); return; }
        const cred = await auth.createUserWithEmailAndPassword(email, pass);
        const profile = { name: n, role, createdAt: Date.now() };
        await db.collection("users").doc(cred.user.uid).set(profile);
        if (role === "child") {
          await ensureInviteCode(cred.user.uid, profile);

        "auth/invalid-credential": "Неверное имя или пароль",
        "auth/invalid-login-credentials": "Неверное имя или пароль",
        "auth/weak-password": "Слабый пароль",
        "auth/invalid-email": "Недопустимое имя"
      };
      setErr(map[e.code] || e.message || "Ошибка");

    setBusy(false);
  };

  return (
    <div style={base}>

      <p style={{fontSize:14, color:"#6B7280", margin:"0 0 24px"}}>Умная тренировка</p>

      <div style={{...W, display:"flex", marginBottom:18, background:"#fff", borderRadius:12, padding:4, border:"1.5px solid #E5E7EB"}}>
        {["login","register"].map(t => (
          <button key={t} onClick={() => { setTab(t); setErr(""); }}
            style={{flex:1, height:42, borderRadius:9, border:"none", background: tab===t ? PU : "transparent", color: tab===t ? "#fff" : "#6B7280", fontSize:15, fontWeight:600, cursor:"pointer"}}>
            {t === "login" ? "Войти" : "Создать аккаунт"}
          </button>
        ))}
      </div>

      <div style={{...W, marginBottom:14}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Имя</div>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="Вася"
          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      <div style={{...W, marginBottom: tab === "register" ? 14 : 18}}>
        <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Пароль</div>

          style={{width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #D1D5DB", fontSize:16, outline:"none", background:"#fff"}} />
      </div>

      {tab === "register" && (
        <div style={{...W, marginBottom:18}}>
          <div style={{fontSize:13, color:"#6B7280", marginBottom:7}}>Кто ты?</div>
          <div style={{display:"flex", gap:9}}>
            {[["child","Я ребёнок"], ["parent","Я родитель"]].map(([v,l]) => {
              const sel = role === v;
              return (
                <button key={v} onClick={() => setRole(v)}
                  style={{flex:1, height:48, borderRadius:13, border: sel ? `2.5px solid ${PU}` : "1.5px solid #D1D5DB", background: sel ? PL : "#fff", color: sel ? PU : "#6B7280", fontWeight: sel ? 700 : 500, fontSize:15, cursor:"pointer"}}>
                  {l}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {err && <div style={{...W, color:RD, fontSize:14, marginBottom:12, textAlign:"center"}}>{err}</div>}

      <button onClick={submit} disabled={busy}
        style={{...W, height:56, borderRadius:16, background: busy ? "#9CA3AF" : PU, color:"#fff", fontSize:18, fontWeight:700, border:"none", cursor: busy ? "default" : "pointer"}}>
        {busy ? "..." : (tab === "login" ? "Войти" : "Создать аккаунт")}
      </button>
    </div>
  );
}

// ─── HEADER ──────────────────────────────────────────────
function Header({ name, badge, onLogout, onSettings }) {

// ─── CHILD APP ───────────────────────────────────────────
function ChildApp({ user, profile, onLogout }) {

  // ── Режим изучения таблиц + Web Speech ──
  const [studyTable, setStudyTable] = useState(2);

  useEffect(() => {
